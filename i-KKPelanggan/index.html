<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kajian Pasaran Pelanggan IMEN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <iframe
    id="survey-frame"
    src="https://script.google.com/macros/s/AKfycbz1BqWcJLm81Ug27QybGQzGbs-cbxd_-ebmJJm647WBc-RpVJqujQyFE8dBeBulVFD_hw/exec"
    allow="downloads"
    allowfullscreen>
  </iframe>

  <script>
    // ── PDF download bridge ──────────────────────────────────
    // Browsers block downloads triggered inside cross-origin iframes.
    // The GAS app posts a message here; the parent page (this file)
    // lives on the same origin as itself, so it CAN trigger the download.
    window.addEventListener("message", function(event) {
      // Only handle our specific message type
      if (!event.data || event.data.type !== "IMEN_PDF_DOWNLOAD") return;

      var url      = event.data.url;
      var filename = event.data.filename || "Laporan_IMEN.pdf";

      var a = document.createElement("a");
      a.href     = url;
      a.download = filename;
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();
      setTimeout(function() {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 1000);
    });
  </script>

</body>
</html>
