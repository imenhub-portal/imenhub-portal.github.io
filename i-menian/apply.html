<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>i-Menian | Applicant Registration</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #f2f2f7;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- Points at the GitHub-Pages copy of the app (same origin as this file),
         NOT at the Apps Script /exec URL it used to load. /exec serves this very
         same index.html — it just fetches it from GitHub first — so going direct
         removes a whole hop from every applicant's load:
           before: apply.html → /exec → UrlFetchApp pulls 185 KB from GitHub
                   → HtmlService sandbox iframe → app
           after:  apply.html → app
         It also means the app runs in GitHub-Pages mode, where the <head> early
         fetch for getInitialData applies (native google.script.run mode skips it),
         and localStorage is first-party so the cached instant paint works. -->
    <iframe
        src="./index.html?role=applicant"
        allow="geolocation; microphone; camera">
    </iframe>
</body>
</html>
