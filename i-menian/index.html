                    {/* ── Logs panel ── */}
                    {expanded && (
                        <div className="p-5 bg-gray-900 text-left border-t border-gray-800 rounded-b-[18px]">
                            {app.NDA_Status && (() => {
                                const fmtTs = (iso) => { if (!iso) return null; const d = new Date(iso); return isNaN(d.getTime()) ? null : d.toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); };
                                const ndaLabel = ({'not_required':'Not required','not_submitted':'Not yet signed','pending_registration':'Agreed — routes after approval','pending_sv':'Awaiting supervisor','pending_director':'Awaiting Director','approved':'Fully authorized','purged':'Cancelled'})[app.NDA_Status] || app.NDA_Status;
                                return (
                                    <div className="mb-4 rounded-lg border border-indigo-500/30 bg-indigo-500/5 p-3">
                                        <p className="text-[9px] text-indigo-300 font-bold uppercase tracking-widest mb-2 flex items-center gap-2"><Icons.IdCard className="w-3 h-3"/> NDA — {ndaLabel}</p>
                                        {app.NDA_Status === 'not_required'
                                            ? <p className="text-[10px] font-mono text-gray-400">Not required — staff or returning applicant.</p>
                                            : app.NDA_Status === 'purged'
                                            ? <p className="text-[10px] font-mono text-gray-400">Cancelled — application was rejected; the pending NDA was purged.</p>
                                            : <div className="space-y-1.5">
                                                {app.NDA_Status === 'pending_registration' && <p className="text-[10px] font-mono text-gray-500 mb-1">Supervisor &amp; Director are notified only after the form is approved and the ADMS ID is assigned.</p>}
                                                {[['Applicant signed', app.NDA_Applicant_At], ['Supervisor endorsed', app.NDA_SV_At], ['Director approved', app.NDA_Director_At]].map(([lbl, at], i) => (
                                                    <div key={i} className="flex justify-between items-center text-[10px] font-mono">
                                                        <span className="text-gray-400">{lbl}</span>
                                                        <span className={at ? 'text-green-400' : 'text-gray-600'}>{fmtTs(at) || 'pending'}</span>
                                                    </div>
                                                ))}
                                              </div>}
                                    </div>
                                );
                            })()}
                            <p className="text-[9px] text-gray-500 font-bold uppercase tracking-widest mb-3 flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div> System Logs</p>
                            <div className="space-y-2">
                                {JSON.parse(app.Logs || "[]").map((l, i) => <p key={i} className="text-[10px] font-mono text-gray-300">{l}</p>)}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const DetailRow = ({ label, value }) => <div><p className="text-[10px] text-gray-400 uppercase font-bold">{label}</p><p className="text-sm font-bold">{value || 'N/A'}</p></div>;

        /* =============================================
           NDA pop-up (applicant signs before submission)
           Bundled fallback text mirrors getNdaContent() on the server;
           the live deployment overrides it via google.script.run.
           ============================================= */
        const NDA_CONTENT = {
            formNo: 'UKM-IMEN-NDA', effectiveDate: '15/06/2025', classification: 'TERHAD',
            title: 'CONFIDENTIAL DISCLOSURE AND LIMITED USE AGREEMENT',
            ismsNote: 'This is a legally binding agreement. By signing it digitally below, the INDIVIDUAL confirms that he or she has read, understood and agrees to be bound by all the terms herein. A digital signature carries the same legal effect as a handwritten signature.',
            preamble: 'This Confidential Disclosure and Limited Use Agreement is made between the abovementioned INDIVIDUAL and the Institute of Microengineering and Nanoelectronics (IMEN). The UNIVERSITY refers to Universiti Kebangsaan Malaysia.',
            agreeLine: 'The INDIVIDUAL and IMEN here forth agree on the following terms:',
            clauses: [
                'The UNIVERSITY is the owner of technology developed at IMEN.',
                'The INDIVIDUAL will conduct research activities under the supervision of a project leader who represents the UNIVERSITY as the owner of technology, or supervisors appointed by IMEN.',
                'The INDIVIDUAL is not allowed to disclose any findings of the research conducted at IMEN to any outside parties without the agreement of his or her project leader or supervisors.',
                'The INDIVIDUAL is not allowed to issue statements, whether written or oral, to any print or electronic media without the agreement of his or her project leader or supervisors.',
                'The INDIVIDUAL may only publish findings of the research conducted at IMEN with the agreement of his or her project leader or supervisors.',
                'The INDIVIDUAL may only present findings of the research conducted at IMEN at conferences, seminars or other forums with the agreement of his or her project leader or supervisors.',
                'The INDIVIDUAL, if registered as a post-graduate student with the UNIVERSITY, may use the findings of the research conducted at IMEN for the purpose of completing a thesis under the supervision of his or her project leader or supervisors.',
                'The UNIVERSITY has exclusive intellectual property (IP) rights to the findings of the research conducted at IMEN and is the only party that may apply for patents, copyrights, registered industrial designs, trade marks or other IP related items pertaining to the research findings.',
                'The INDIVIDUAL shall not violate the IP rights of the UNIVERSITY even after he or she has completed his/her research at IMEN.'
            ],
            logo: ''
        };

        const NdaModal = ({ form, db, onApprove, onCancel }) => {
            const [content, setContent] = useState(NDA_CONTENT);
            const [ic, setIc] = useState('');
            const [icError, setIcError] = useState(false);
            const [checks, setChecks] = useState({});        // per-term acknowledgement
            const [checkError, setCheckError] = useState(false);
            useEffect(() => {
                if (typeof google !== 'undefined') {
                    google.script.run.withSuccessHandler(c => { if (c && c.clauses) setContent(c); }).withFailureHandler(()=>{}).getNdaContent();
                }
            }, []);
            const project = (form.projectName || '').trim();
            const allChecked = content.clauses.length > 0 && content.clauses.every((_, i) => checks[i]);
            const canSubmit = !!ic.trim() && allChecked;
            const approve = () => {
                if (!ic.trim()) { setIcError(true); return; }
                if (!allChecked) { setCheckError(true); return; }
                onApprove(ic.trim());
            };
            return (
                <div className="modal-bg animate-ios" style={{alignItems:'flex-start', overflowY:'auto', padding:'24px', zIndex:1000}}>
                    <div className="bg-white" style={{borderRadius:'24px', maxWidth:'720px', width:'100%', maxHeight:'92vh', display:'flex', flexDirection:'column', boxShadow:'0 24px 80px rgba(0,0,0,0.18)'}}>
                        <div style={{overflowY:'auto', padding:'32px 36px', textAlign:'left', color:'#1c1c1e'}}>
                            <p style={{fontSize:'12px', color:'#b91c1c', fontStyle:'italic', margin:'0 0 16px'}}>{content.ismsNote}</p>
                            <table style={{width:'100%', borderCollapse:'collapse', marginBottom:'22px', fontSize:'12px'}}><tbody><tr>
                                <td style={{border:'1px solid #cbd5e1', padding:'10px', width:'92px', textAlign:'center'}}>
                                    {content.logo ? <img src={content.logo} style={{maxWidth:'80px', height:'auto'}} alt="UKM" /> : <span style={{fontWeight:800, color:'#1e3a8a'}}>UKM</span>}
                                </td>
                                <td style={{border:'1px solid #cbd5e1', padding:'10px', fontWeight:700}}>{content.formNo}<br/><span style={{fontWeight:400, color:'#64748b'}}>PERJANJIAN KERAHSIAAN (NDA)</span></td>
                                <td style={{border:'1px solid #cbd5e1', padding:'10px', textAlign:'right'}}>Tarikh Kuatkuasa:<br/><b>{content.effectiveDate}</b><br/><span style={{display:'inline-block', marginTop:'6px', border:'1px solid #1c1c1e', padding:'2px 10px', fontWeight:700}}>{content.classification}</span></td>
                            </tr></tbody></table>
                            <h2 style={{textAlign:'center', fontSize:'16px', margin:'8px 0 18px', letterSpacing:'0.3px'}}>{content.title}</h2>
                            <div style={{display:'flex', gap:'12px', alignItems:'baseline', marginBottom:'12px'}}>
                                <span style={{width:'170px', color:'#475569', fontSize:'13px', flexShrink:0}}>Name / Nama</span>
                                <span style={{flex:1, borderBottom:'1px dashed #94a3b8', fontWeight:700, fontSize:'13px'}}>{form.name || '—'}</span>
                            </div>
                            <div style={{display:'flex', gap:'12px', alignItems:'baseline', marginBottom:'20px'}}>
                                <span style={{width:'170px', color:'#475569', fontSize:'13px', flexShrink:0}}>Project / Perkara</span>
                                <span style={{flex:1, borderBottom:'1px dashed #94a3b8', fontSize:'13px', fontWeight: project ? 500 : 400, fontStyle: project ? 'normal' : 'italic', color: project ? '#1c1c1e' : '#9ca3af'}}>{project || 'e.g. Fabrication of a MEMS-based pressure sensor'}</span>
                            </div>
                            <p style={{fontSize:'13.5px', lineHeight:1.6, margin:'0 0 12px'}}>{content.preamble}</p>
                            <p style={{fontSize:'13.5px', fontWeight:700, margin:'0 0 6px'}}>{content.agreeLine}</p>
                            <p style={{fontSize:'12px', color:'#64748b', margin:'0 0 12px'}}>Please tick each term to confirm you have read and agree. / Sila tanda setiap terma untuk mengesahkan anda telah membaca dan bersetuju.</p>
                            <div style={{margin:'0 0 6px'}}>
                                {content.clauses.map((t, i) => (
                                    <label key={i} style={{display:'flex', gap:'10px', alignItems:'flex-start', cursor:'pointer', marginBottom:'10px', fontSize:'13.5px', lineHeight:1.55, color:'#1c1c1e'}}>
                                        <input type="checkbox" checked={!!checks[i]} onChange={e=>{ const v=e.target.checked; setChecks(c=>({...c,[i]:v})); setCheckError(false); }} style={{marginTop:'3px', width:'16px', height:'16px', accentColor:'#1e3a8a', flexShrink:0}} />
                                        <span><b style={{marginRight:'4px'}}>{i+1}.</b>{t}</span>
                                    </label>
                                ))}
                            </div>
                            {checkError && <p style={{fontSize:'11px', color:'#ef4444', margin:'0 0 6px', fontWeight:600}}>Please tick all terms before agreeing. / Sila tanda semua terma sebelum bersetuju.</p>}
                            <div style={{marginTop:'14px', paddingTop:'16px', borderTop:'1px solid #e2e8f0'}}>
                                <p style={{fontSize:'11px', fontWeight:800, letterSpacing:'0.5px', color:'#94a3b8', textTransform:'uppercase', margin:'0 0 8px'}}>Applicant / Pemohon</p>
                                <div style={{fontWeight:700, fontSize:'14px', color:'#0f172a'}}>{form.name || '—'}</div>
                                <div style={{marginTop:'8px', maxWidth:'340px'}}>
                                    <label className="reg-label">IC / Passport No.*</label>
                                    <input className="reg-input" style={icError ? {borderColor:'#ef4444'} : {}} value={ic} onChange={e=>{ setIc(e.target.value); setIcError(false); }} placeholder="e.g. 990101-14-5678 / A12345678" />
                                    {icError && <p style={{fontSize:'11px', color:'#ef4444', marginTop:'4px', fontWeight:600}}>Please enter your IC / Passport number.</p>}
                                </div>
                            </div>
                        </div>
                        <div style={{borderTop:'1px solid #eee', padding:'16px 24px', display:'flex', gap:'12px', flexShrink:0}}>
                            <button onClick={onCancel} style={{flex:1, padding:'14px', borderRadius:'14px', fontWeight:700, fontSize:'13px', color:'#94a3b8', background:'#f8fafc', border:'1px solid #e2e8f0', cursor:'pointer'}}>Cancel</button>
                            <button onClick={approve} disabled={!canSubmit} className="btn-primary" style={{flex:1, padding:'14px', opacity: canSubmit ? 1 : 0.55, cursor: canSubmit ? 'pointer' : 'not-allowed'}}>Agree / Setuju</button>
                        </div>
                    </div>
                </div>
            );
        };

        /* =============================================
           ApplicationForm
           ============================================= */
        const ApplicationForm = ({ db, setActiveTab, showToast, refreshData }) => {
            const [success, setSuccess] = useState(false);
            const [submitting, setSubmitting] = useState(false);
            const [confirmed, setConfirmed] = useState(false);   // confirm box ticked → form held/locked
            const [phase, setPhase] = useState('idle');          // idle | precheck | nda | assessment | ready
            const [flags, setFlags] = useState(null);            // { needsNda, needsAssessment, isStaff, isReturning, admsId }
            const [nda, setNda] = useState({ approved: false, ic: '' });
            const [assessment, setAssessment] = useState(null);  // { score, total, report }
            const [returning, setReturning] = useState(null);    // {name, photo} from a prior registration
            const [returnPrompt, setReturnPrompt] = useState({ show: false }); // "returning or new?" choice
            const [asNew, setAsNew] = useState(false);           // matched applicant chose to apply as new
            const [form, setForm] = useState({
                name: '', studentId: '', email: '', phone: '',
                labId: '', supervisorName: '', projectName: '',
                startDate: '', endDate: '', category: '', affiliation: '', equipment: '', photo: ''
            });

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 400;
                        let width = img.width, height = img.height;
                        if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } }
                        else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        setForm(f => ({...f, photo: canvas.toDataURL('image/jpeg', 0.85)}));
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const finalCategory = form.category === "IMEN's Staff only" ? "Staff" : form.category;
            const labName = (db.labs.find(l => l.ID == form.labId) || {}).Name || '';
            const fmtD = d => { const dt = new Date(d); return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); };
            const duration = (form.startDate && form.endDate) ? `${fmtD(form.startDate)} – ${fmtD(form.endDate)}` : '';

            const resetGate = () => { setConfirmed(false); setPhase('idle'); setFlags(null); setNda({ approved: false, ic: '' }); setAssessment(null); setReturnPrompt({ show: false }); setAsNew(false); };

            // "Welcome back" — when the applicant leaves the email/matric field, check the
            // registry for THEIR own record and, if found, pre-load their photo and offer
            // their registered name. Keyed on their own identifier, so no data is exposed.
            const checkReturning = () => {
                if (confirmed || typeof google === 'undefined') return;
                if (!form.email && !form.studentId) return;
                google.script.run
                    .withSuccessHandler(res => {
                        if (res && res.found) {
                            setReturning({ name: res.name || '', photo: res.photo || '' });
                            if (res.photo) setForm(f => f.photo ? f : ({ ...f, photo: res.photo }));
                        }
                    })
                    .withFailureHandler(() => {})
                    .lookupReturningApplicant({ email: form.email, studentId: form.studentId });
            };

            const validateForm = () => {
                if (!form.name || !form.email || !form.labId || !form.category || !form.projectName || !form.startDate || !form.endDate || !form.equipment) return false;
                if (form.category !== "IMEN's Staff only" && !form.supervisorName) return false;
                return true;
            };

            // Ticking the confirm box holds (locks) the form and starts the gating flow.
            const onConfirmToggle = (checked) => {
                if (!checked) { resetGate(); return; }
                if (!validateForm()) { showToast('Please complete all required fields first.', 'error'); return; }
                setConfirmed(true);
                setPhase('precheck');
                const applyFlags = (res) => {
                    const f = res || { needsNda: true, needsAssessment: true, hasPhoto: false };
                    setFlags(f);
                    // "Returning" is only a SUGGESTION — always ask FIRST, before any photo
                    // or step gating. (The photo for a returning applicant is reused from the
                    // database once they confirm; demanding it up front would hide this dialog.)
                    if (f.isReturning) { setReturnPrompt({ show: true }); setPhase('choose'); return; }
                    // New / staff path: a photo is needed only if none on file and none uploaded.
                    if (!f.hasPhoto && !form.photo) {
                        showToast('Please add your applicant photo before continuing.', 'error');
                        resetGate();
                        return;
                    }
                    if (f.needsNda) setPhase('nda');
                    else if (f.needsAssessment) setPhase('assessment');
                    else {
                        setPhase('ready');                  // staff → unlock immediately
                        showToast('Staff applicant — the NDA & assessment are not required. You can submit directly.', 'success');
                    }
                };
                if (typeof google === 'undefined') { applyFlags({ needsNda: true, needsAssessment: true }); return; }
                google.script.run
                    .withSuccessHandler(applyFlags)
                    .withFailureHandler(() => { showToast('Could not verify records — please try again.', 'error'); resetGate(); })
                    .precheckApplicant({ name: form.name, email: form.email, studentId: form.studentId, category: finalCategory });
            };

            const onNdaApprove = (icValue) => {
                setNda({ approved: true, ic: icValue });
                setPhase((flags && flags.needsAssessment) ? 'assessment' : 'ready');
            };

            const onAssessmentPass = (score, total, report) => {
                setAssessment({ score, total, report });
                setPhase('ready');
                showToast('Assessment passed (' + score + '/' + total + ') — you can now submit your application.', 'success');
            };

            // Returning suggestion — applicant's choice
            const chooseReturning = () => {
                setAsNew(false);
                setReturnPrompt({ show: false });
                setPhase('ready');
                showToast('Welcome back — continuing as a returning applicant.', 'success');
            };
            const chooseNew = () => {
                // Applying as new → a photo is required (won't reuse the on-file one).
                if (!(flags && flags.hasPhoto) && !form.photo) {
                    setReturnPrompt({ show: false });
                    showToast('Please add your applicant photo before continuing.', 'error');
                    resetGate();
                    return;
                }
                setAsNew(true);
                setFlags(f => ({ ...(f || {}), needsNda: true, needsAssessment: true }));
                setReturnPrompt({ show: false });
                setPhase('nda');
            };

            const finalSubmit = () => {
                if (phase !== 'ready' || submitting) return;
                setSubmitting(true);
                const payload = {
                    ...form, duration, category: finalCategory, labName,
                    ic: nda.ic, ndaApproved: nda.approved, asNew: asNew,
                    score: assessment ? assessment.score : 0,
                    total: assessment ? assessment.total : 0,
                    report: assessment ? assessment.report : []
                };
                // NOTE: do NOT call refreshData() here — it flips the app to the
                // full-screen loader and unmounts this form, wiping the success screen.
                // The refresh happens when the applicant taps "Track Application Status".
                const done = () => { setSubmitting(false); setSuccess(true); };
                if (typeof google === 'undefined') { setTimeout(done, 400); return; }
                google.script.run
                    .withSuccessHandler(done)
                    .withFailureHandler(err => { setSubmitting(false); showToast('Submit failed: ' + err.message, 'error'); })
                    .submitFullApplication(payload);
            };

            if (success) return (
                <div className="reg-success">
                    <div className="reg-success-card">
                        <div className="reg-success-icon">
                            <svg className="w-8 h-8 text-[#1e3a8a]" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
                            </svg>
                        </div>
                        <div className="reg-success-title">Submitted</div>
                        <p style={{color:'#9ca3af', fontSize:'14px', marginBottom:'32px', lineHeight:'1.6'}}>
                            Your application has been sent for PIC &amp; Coordinator review. You'll be notified by email on each stage.
                        </p>
                        <button onClick={() => { refreshData && refreshData(); setActiveTab('dashboard'); }} className="reg-submit-btn" style={{marginTop: 0}}>
                            Track Application Status
                        </button>
                    </div>
                </div>
            );

            if (phase === 'assessment') {
                return <AssessmentSession embedded showToast={showToast} onPass={onAssessmentPass} onCancel={resetGate} />;
            }

            return (
                <div style={{margin: '0 -24px', marginTop: '-40px'}}>
                    {phase === 'nda' && <NdaModal form={form} db={db} onApprove={onNdaApprove} onCancel={resetGate} />}
                    {phase === 'precheck' && <div className="modal-bg animate-ios"><div className="loader"></div></div>}
                    {returnPrompt.show && (
                        <div className="modal-bg animate-ios" style={{zIndex:60}}>
                            <div style={{background:'#fff', borderRadius:'18px', maxWidth:'420px', width:'calc(100% - 40px)', padding:'26px 24px', boxShadow:'0 24px 60px rgba(15,23,42,.28)', textAlign:'center'}}>
                                <div style={{width:'52px', height:'52px', borderRadius:'50%', background:'#eff6ff', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 14px', fontSize:'26px'}}>👋</div>
                                <h3 style={{margin:'0 0 3px', fontSize:'16px', fontWeight:800, color:'#0f172a'}}>Have you applied to i-Menian before?</h3>
                                <p style={{margin:'0 0 14px', fontSize:'13px', fontWeight:700, color:'#64748b'}}>Pernahkah anda memohon ke i-Menian sebelum ini?</p>
                                <p style={{margin:'0 0 4px', fontSize:'12.5px', lineHeight:1.5, color:'#475569'}}>
                                    Your details match someone already in our records{returning && returning.name ? <span> (<strong>{returning.name}</strong>)</span> : null} — perhaps from a <strong>different lab or project</strong>. You'll still complete this application; we just need to know which is true.
                                </p>
                                <p style={{margin:'0 0 18px', fontSize:'11.5px', lineHeight:1.5, color:'#94a3b8'}}>
                                    Maklumat anda sepadan dengan rekod sedia ada — mungkin daripada makmal atau projek lain. Anda tetap perlu melengkapkan permohonan ini.
                                </p>
                                <div style={{display:'flex', flexDirection:'column', gap:'10px'}}>
                                    <button type="button" onClick={chooseReturning} style={{width:'100%', padding:'11px 12px', borderRadius:'12px', border:'none', background:'#1e3a8a', color:'#fff', cursor:'pointer', lineHeight:1.3}}>
                                        <div style={{fontWeight:700, fontSize:'13px'}}>Yes — I've applied to i-Menian before</div>
                                        <div style={{fontWeight:500, fontSize:'11px', opacity:.85}}>Ya — saya pernah memohon ke i-Menian</div>
                                    </button>
                                    <button type="button" onClick={chooseNew} style={{width:'100%', padding:'11px 12px', borderRadius:'12px', border:'1px solid #cbd5e1', background:'#fff', color:'#334155', cursor:'pointer', lineHeight:1.3}}>
                                        <div style={{fontWeight:700, fontSize:'13px'}}>No — this is my first time</div>
                                        <div style={{fontWeight:500, fontSize:'11px', color:'#94a3b8'}}>Tidak — ini kali pertama saya</div>
                                    </button>
                                </div>
                                <button type="button" onClick={resetGate} style={{marginTop:'14px', background:'none', border:'none', color:'#94a3b8', fontSize:'12px', cursor:'pointer'}}>Cancel / Batal</button>
                            </div>
                        </div>
                    )}
                    <div className="reg-page">

                        {/* ── LEFT HERO PANEL ── */}
                        <div className="reg-hero">
                            <div>
                                <div className="reg-tags">
                                    <span className="reg-tag-label">Access Type</span>
                                    <span className="reg-tag active">Research</span>
                                    <span className="reg-tag">Internship</span>
                                    <span className="reg-tag">IMEN's Staff only</span>
                                    <span className="reg-tag-more">+more</span>
                                </div>
                                <div className="reg-headline">
                                    Lab Access That<br/>
                                    <span className="accent">Starts Here.</span>
                                </div>
                                <p className="reg-subtext">
                                    Complete your registration to gain access to IMEN facilities. Your application will be reviewed by the Staff PIC and Lab Coordinator.
                                </p>
                                <div className="reg-cta-pill">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
                                    i-MENIAN Portal
                                </div>
                                <div className="reg-preview-card" style={{marginTop: '32px'}}>
                                    <p style={{fontSize:'9px', fontWeight:'800', textTransform:'uppercase', letterSpacing:'0.12em', color:'#3b82f6', marginBottom:'12px'}}>
                                        Approval Pipeline
                                    </p>
                                    <div className="reg-preview-steps" style={{display:'flex', alignItems:'center', flexWrap:'wrap', gap:'4px'}}>
                                        <span className="reg-step-chip active">NDA</span>
                                        <span style={{color:'#94a3b8', fontSize:'12px', fontWeight:'700'}}>›</span>
                                        <span className="reg-step-chip idle">Assessment</span>
                                        <span style={{color:'#94a3b8', fontSize:'12px', fontWeight:'700'}}>›</span>
                                        <span className="reg-step-chip idle">Submit</span>
                                        <span style={{color:'#94a3b8', fontSize:'12px', fontWeight:'700'}}>›</span>
                                        <span className="reg-step-chip idle">PIC</span>
                                        <span style={{color:'#94a3b8', fontSize:'12px', fontWeight:'700'}}>›</span>
                                        <span className="reg-step-chip idle">HOL</span>
                                        <span style={{color:'#94a3b8', fontSize:'12px', fontWeight:'700'}}>›</span>
                                        <span className="reg-step-chip idle">Access</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* ── RIGHT FORM PANEL ── */}
                        <div className="reg-form-panel">
                            <div className="reg-form-card">
                                <div style={{marginBottom:'28px'}}>
                                    <div className="reg-form-title">Lab Entry Registration</div>
                                    <div className="reg-form-sub">Fill in your details to apply for facility access</div>
                                </div>

                                {returning && !confirmed && (
                                    <div style={{marginBottom:'24px', padding:'14px 16px', background:'#eff6ff', border:'1px solid #bfdbfe', borderRadius:'14px', display:'flex', gap:'12px', alignItems:'center'}}>
                                        {returning.photo && <img src={returning.photo} style={{width:'40px', height:'40px', borderRadius:'50%', objectFit:'cover', flexShrink:0, border:'1px solid #bfdbfe'}} alt="" />}
                                        <div style={{flex:1}}>
                                            <p style={{fontSize:'12px', fontWeight:700, color:'#1e3a8a', margin:'0 0 2px'}}>Welcome back!</p>
                                            <p style={{fontSize:'11px', color:'#475569', margin:0, lineHeight:1.5}}>We found your previous registration{returning.photo ? ' and loaded your photo on file' : ''}. When you confirm your details, we'll ask you to verify this.</p>
                                            {returning.name && form.name !== returning.name && (
                                                <button type="button" onClick={()=>setForm(f=>({...f, name: returning.name}))} style={{marginTop:'8px', fontSize:'11px', fontWeight:700, color:'#fff', background:'#1e3a8a', border:'none', borderRadius:'8px', padding:'6px 12px', cursor:'pointer'}}>
                                                    Use my registered name: {returning.name}
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                )}
                                <form onSubmit={(e)=>{e.preventDefault(); finalSubmit();}}>
                                  <fieldset disabled={confirmed} style={{border:0, padding:0, margin:0, minInlineSize:'auto'}}>
                                    <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'10px', marginBottom:'28px'}}>
                                        <label style={{cursor:'pointer'}}>
                                            <div className="reg-photo-ring" style={{width:'88px', height:'88px'}}>
                                                {form.photo
                                                    ? <img src={form.photo} style={{width:'100%', height:'100%', objectFit:'cover'}} alt="Profile" />
                                                    : <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'4px'}}><Icons.Camera className="w-7 h-7" style={{color:'#93c5fd'}} /></div>
                                                }
                                            </div>
                                            <input type="file" accept="image/*" capture="environment" onChange={handleImageUpload} style={{display:'none'}} />
                                        </label>
                                        <span style={{fontSize:'10px', fontWeight:'700', textTransform:'uppercase', letterSpacing:'0.08em', color:'#3b82f6'}}>Applicant Photo</span>
                                        <span style={{fontSize:'10px', color:'#94a3b8', textAlign:'center', maxWidth:'260px', lineHeight:'1.4'}}>First-time applicants, please add a photo. Returning applicants — your photo on file is used automatically.</span>
                                    </div>

                                    <div className="reg-section-label">Personal Information</div>
                                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px', marginBottom:'16px'}}>
                                        <RegField label="Full Name" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} />
                                        <RegField label="Student ID / Passport (for international)" value={form.studentId} onChange={v=>setForm(f=>({...f,studentId:v}))} onBlur={checkReturning} optional note="Optional — your UKM student ID, or passport number for international applicants. Using the same ID each time helps us recognise you." />
                                    </div>
                                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px', marginBottom:'16px'}}>
                                        <RegField label="Email" type="email" value={form.email} onChange={v=>setForm(f=>({...f,email:v.toLowerCase()}))} onBlur={checkReturning} note="Not case-sensitive — but please double-check the spelling; all NDA, approval and status emails are sent here." />
                                        <RegField label="Phone" value={form.phone} onChange={v=>setForm(f=>({...f,phone:v}))} />
                                    </div>
                                    <div style={{marginBottom:'16px'}}>
                                        <RegField label="Institute / Faculty / Industry" value={form.affiliation} onChange={v=>setForm(f=>({...f,affiliation:v}))} placeholder="e.g. Faculty of Engineering, UKM / Petronas / MIMOS" />
                                    </div>

                                    <div className="reg-section-label">Facility &amp; Role</div>
                                    <div style={{marginBottom:'16px'}}>
                                        <RegSelect label="Facility" options={db.labs.map(l=>({id:l.ID, name:l.Name}))} value={form.labId} onChange={v=>setForm(f=>({...f,labId:v}))} />
                                    </div>
                                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px', marginBottom:'16px'}}>
                                        <RegSelect
                                            label="Category"
                                            options={[
                                                {id:'MSc Student', name:'MSc Student'},
                                                {id:'PhD Student', name:'PhD Student'},

                                                {id:'IMEN\'s Staff only', name:'IMEN\'s Staff only'},
                                                {id:'Internship', name:'Internship'},
                                                {id:'Research Attachment', name:'Research Attachment'},
                                                {id:'FYP', name:'FYP'},
                                                {id:'Sabbatical', name:'Sabbatical'},
                                                {id:'Industrial Attachment', name:'Industrial Attachment'},
                                                {id:'Research Officer', name:'Research Officer'}
                                            ]}

                                        <RegField label="End Date" type="date" value={form.endDate} onChange={v=>setForm(f=>({...f,endDate:v}))} />

                                    {/* ── Confirmation gate ── */}

                                        <span style={{fontSize:'12px', fontWeight:600, color:'#475569', lineHeight:1.5}}>I confirm that all the information provided above is true and correct. On confirming, I will be directed to sign the Non-Disclosure Agreement (NDA) and complete a short safety assessment before submitting. <span style={{fontWeight:400, color:'#94a3b8'}}>(Returning applicants and IMEN staff skip these steps.)</span></span>

                                    {phase === 'ready' && (
                                        <div style={{marginTop:'18px', padding:'14px 16px', background:'#f0fdf4', border:'1px solid #bbf7d0', borderRadius:'14px', display:'flex', gap:'10px', alignItems:'flex-start'}}>

                                                    : (flags && flags.isStaff)
                                                        ? 'As IMEN staff, the NDA and safety assessment are not required. Please continue with "Submit Application" below.'
                                                        : 'Your NDA has been signed and your safety assessment passed. Please continue with "Submit Application" below.'}

                                    {confirmed && !submitting && (
                                        <button type="button" onClick={resetGate} style={{display:'block', margin:'14px auto 0', fontSize:'11px', fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'0.06em', background:'none', border:'none', cursor:'pointer'}}>

        const RegField = ({ label, value, onChange, type="text", placeholder, disabled=false, onBlur, note, optional=false }) => (
            <div>
                <label className="reg-label">{label}</label>
                <input required={!optional} type={type} className="reg-input" value={value} onChange={e=>onChange(e.target.value)} onBlur={onBlur} placeholder={placeholder || label} disabled={disabled} />
                {note && <span style={{display:'block', fontSize:'10px', color:'#94a3b8', marginTop:'5px', lineHeight:1.45}}>{note}</span>}
            </div>
        );
        const RegSelect = ({ label, options, value, onChange, disabled=false }) => (
            <div>
                <label className="reg-label">{label}</label>
                <select required className="reg-input" value={value} onChange={e=>onChange(e.target.value)} disabled={disabled}>
                    <option value="">-- Select --</option>
                    {options.map(o=><option key={o.id} value={o.id}>{o.name}</option>)}
                </select>
            </div>
        );
        const InputField = ({ label, value, onChange, type="text" }) => <div className="text-left"><label className="text-[10px] font-bold text-gray-400 uppercase ml-1">{label}</label><input required type={type} className="ios-input font-bold" value={value} onChange={e=>onChange(e.target.value)} /></div>;
        const SelectField = ({ label, options, value, onChange }) => <div className="text-left"><label className="text-[10px] font-bold text-gray-400 uppercase ml-1">{label}</label><select required className="ios-input font-bold" value={value} onChange={e=>onChange(e.target.value)}><option value="">-- Select --</option>{options.map(o=><option key={o.id} value={o.id}>{o.name}</option>)}</select></div>;

        const AssessmentSession = ({ appId, onFinish, onCancel, showToast, embedded = false, onPass }) => {
            const [lang, setLang] = useState('EN');
            const [questions, setQuestions] = useState([]);
            const [answers, setAnswers] = useState({});
            const [loading, setLoading] = useState(true);
            const [failModal, setFailModal] = useState(false);
            const [completed, setCompleted] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);

            useEffect(() => {
                google.script.run.withSuccessHandler(q => {
                    setQuestions(q || []);
                    setLoading(false);
                }).getAssessmentQuestions();
            }, []);

            const handleAutofill = () => {
                const pin = prompt("Admin PIN Required:");
                if (!pin || typeof google === 'undefined') return;
                google.script.run.withSuccessHandler(res => {
                    if (res && (res === true || res.ok)) {
                        const ans = {}; questions.forEach(q => ans[q.id] = q.answer);
                        setAnswers(ans);
                        showToast("Admin: correct answers loaded", "success");
                    } else { showToast("Invalid PIN", "error"); }
                }).verifyAdminPin(pin);
            };

            const submit = () => {
                let score = 0;
                const total = questions.length;
                questions.forEach(q => { if (answers[q.id] === q.answer) score++; });
                if (score !== total) { setFailModal(true); showToast(`Failed: ${score}/${total} Correct. Review your answers.`, "error"); return; }
                const report = questions.map(q => ({ text_en: q.text_en, userSelection: `${answers[q.id]}. ${q.options_en[answers[q.id]]}` }));
                // Pre-submission (wizard) mode — hand the result back; no server write here.
                if (typeof onPass === 'function') { onPass(score, total, report); return; }
                // Legacy mode (kept for backward compatibility).
                setIsSubmitting(true);
                showToast("Submitting results...", "info");
                google.script.run
                    .withSuccessHandler(() => { setIsSubmitting(false); setCompleted(true); })
                    .withFailureHandler((err) => { setIsSubmitting(false); showToast("System Error: " + err.message, "error"); })
                    .submitAssessmentResults(appId, score, total, report);
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-white"><div className="loader"></div></div>;

            if (completed) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-white p-10 text-center animate-ios">
                    <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center text-green-500 mb-6"><svg className="w-10 h-10" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M4.5 12.75l6 6 9-13.5" /></svg></div>
                    <h1 className="text-3xl font-bold mb-4">Assessment Passed</h1>
                    <p className="text-gray-500 max-w-md mx-auto mb-8">Your results have been successfully recorded. You may now safely close this window.</p>
                    <button onClick={() => window.close()} className="px-8 py-3 bg-gray-100 rounded-xl font-bold text-sm text-gray-600 hover:bg-gray-200">Close Window</button>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#f2f2f7] p-6 pb-24 text-left relative">
                    <div style={{zIndex: 1000, position: 'relative'}}>
                        <ConfirmModal show={failModal} title="Assessment Not Passed" msg="You must answer ALL questions correctly to proceed. Please review your answers and try again." onConfirm={()=>setFailModal(false)} onCancel={()=>setFailModal(false)} />
                    </div>
                    <div className="max-w-3xl mx-auto space-y-10">
                        <div className="ios-card p-10 bg-white">
                            <div className="flex justify-between mb-6">
                                <div><h2 className="text-xl font-bold uppercase">Safety Assessment</h2><p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">100% Score Required</p></div>
                                <div className="bg-gray-100 p-1 rounded-xl">
                                    <button onClick={()=>setLang('EN')} className={`px-4 py-1.5 rounded-lg text-[11px] font-bold ${lang==='EN' ? 'bg-white shadow-sm text-[#007aff]' : 'text-gray-500'}`}>English</button>
                                    <button onClick={()=>setLang('MS')} className={`px-4 py-1.5 rounded-lg text-[11px] font-bold ${lang==='MS' ? 'bg-white shadow-sm text-[#007aff]' : 'text-gray-500'}`}>B. Melayu</button>
                                </div>
                            </div>
                            <div className="border-t pt-6 space-y-4 text-left">
                                <p className="text-xs font-bold uppercase text-[#007aff]">Objective</p>
                                <p className="text-sm text-gray-600 text-left">The objective is to validate applicant readiness for laboratory safety at IMEN. Answer every question correctly to proceed.</p>
                            </div>
                            <div className="w-full flex justify-between items-center mt-6">
                                {embedded && onCancel
                                    ? <button onClick={onCancel} className="text-[10px] font-bold text-gray-400 uppercase tracking-wider hover:text-gray-600">← Back to form</button>
                                    : <span></span>}
                                <button onClick={handleAutofill} className="text-[9px] font-bold text-rose-500 uppercase border border-rose-100 px-3 py-1 rounded-lg hover:bg-rose-50 transition-all shadow-sm">Autofill (Admin Debug)</button>
                            </div>
                        </div>

                        {questions.map((q, idx) => (
                            <div key={q.id} className="ios-card p-10 bg-white">
                                <div className="flex gap-4 mb-8">
                                    <span className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-xs font-bold">{idx + 1}</span>
                                    <p className="text-lg font-bold">{lang === 'EN' ? q.text_en : q.text_ms}</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {Object.entries(lang === 'EN' ? q.options_en : q.options_ms).map(([key, text]) => (
                                        <button key={key} onClick={() => setAnswers({...answers, [q.id]: key})} disabled={isSubmitting}
                                            className={`p-5 rounded-2xl text-left font-semibold border-2 transition-all ${answers[q.id] === key ? 'border-[#007aff] bg-blue-50 text-[#007aff]' : 'border-transparent bg-gray-50 text-gray-500'}`}>
                                            {key}. {text}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ))}

                        <div className="fixed bottom-0 left-0 w-full p-6 bg-white/80 backdrop-blur-xl border-t z-50">
                            <button onClick={submit} disabled={isSubmitting}
                                className={`max-w-3xl mx-auto w-full py-5 font-bold uppercase tracking-widest shadow-xl transition-all duration-300 ${!isSubmitting ? 'btn-primary' : 'bg-gray-300 text-gray-500 cursor-not-allowed rounded-2xl'}`}>
                                {isSubmitting ? 'Processing...' : 'Submit Session'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        /* =============================================
           AdminControlPanel
           ============================================= */
        const AdminControlPanel = ({ db, refreshData, showToast }) => {
            const [search, setSearch] = useState("");
            const [syncing, setSyncing] = useState(false);

            const handleSync = () => {
                setSyncing(true);
                google.script.run
                    .withSuccessHandler(staffRes => {
                        google.script.run
                            .withSuccessHandler(labRes => {
                                showToast(`Synced ${staffRes.count} staff & ${labRes.count} labs.`, "success");
                                setSyncing(false);
                                refreshData();
                            })
                            .withFailureHandler(err => {
                                showToast("Lab Sync Error: " + err.message, "error");
                                setSyncing(false);
                            })
                            .syncLabData();
                    })
                    .withFailureHandler(err => {
                        showToast("Staff Sync Error: " + err.message, "error");
                        setSyncing(false);
                    })
                    .syncStaffData();
            };

            const labList = db.labs.filter(l => l.Name.toLowerCase().includes(search.toLowerCase()));
            const handleUpdate = (id, staffId, type) => {
                google.script.run.withSuccessHandler(() => { showToast("Updated", "success"); refreshData(); }).assignRoleToLab(id, staffId, type, AUTH_TOKEN);

            return (

                                Sync Staff &amp; Labs
                            </button>
                            <input className="ios-input md:w-80" placeholder="Filter Facility..." value={search} onChange={e=>setSearch(e.target.value)} />
                        </div>
                    </div>
                    <div className="bg-white ios-card border overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-gray-50 text-[10px] font-bold uppercase text-gray-400 border-b">
                                <tr>
                                    <th className="px-8 py-4">Facility</th>
                                    <th className="px-8 py-4">Staff PIC</th>
                                    <th className="px-8 py-4">Lab Coordinator</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y">
                                {labList.map(lab => (
                                    <tr key={lab.ID}>
                                        <td className="px-8 py-6 font-bold uppercase text-sm">{lab.Name}</td>
                                        <td className="px-8 py-6">
                                            <select className="bg-gray-100 rounded-xl px-4 py-2 text-[10px] font-bold uppercase outline-none" value={lab.PIC_ID} onChange={e=>handleUpdate(lab.ID, e.target.value, 'PIC')}>
                                                <option value="">-- No PIC --</option>
                                                {db.staff.map(s => <option key={s.ID} value={s.ID}>{s.Name}</option>)}
                                            </select>
                                        </td>
                                        <td className="px-8 py-6">
                                            <select className="bg-gray-100 rounded-xl px-4 py-2 text-[10px] font-bold uppercase outline-none" value={lab.HOL_ID} onChange={e=>handleUpdate(lab.ID, e.target.value, 'HOL')}>
                                                <option value="">-- No HOL --</option>
                                                {db.staff.filter(s=>s.Role==='AKADEMIK').map(s => <option key={s.ID} value={s.ID}>{s.Name}</option>)}
                                            </select>
                                        </td>

                            </tbody>
                        </table>
                    </div>
                </div>

        };

        const LabUsersManager = ({ db, userRole, showToast, refreshData, labFilter, setLabFilter, staffLabName, staffLabNames }) => {
            const [search, setSearch] = useState("");
            const [actionLoading, setActionLoading] = useState(null);
            const [verifyModal, setVerifyModal] = useState({ show: false, userId: null });

            const executeVerifyAccess = () => {
                const userId = verifyModal.userId;
                setVerifyModal({ show: false, userId: null });
                setActionLoading(userId);
                google.script.run
                    .withSuccessHandler(() => {
                        showToast("Verification email sent", "success");
                        setActionLoading(null);
                        if (refreshData) refreshData();
                    })
                    .withFailureHandler(err => {
                        showToast("Error: " + err.message, "error");
                        setActionLoading(null);
                    })
                    .initiateAccessVerification(userId, AUTH_TOKEN);
            };

            const resolveLabName = (labVal) => {
                if (!labVal) return "—";
                const str = String(labVal).trim();
                const found = (db.labs || []).find(l => l.ID === str || l.Name === str);
                return found ? found.Name : str;
            };

            const fmtDate = (iso) => {
                if (!iso) return "—";
                try {
                    const d = new Date(iso);
                    if (isNaN(d.getTime())) return "—";
                    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
                } catch { return "—"; }
            };

            const fmtPhone = (val) => {
                if (val === null || val === undefined || val === "") return "—";
                let str = String(val).replace(/^'+/, '').trim().replace(/\.0+$/, '');
                if (!str || str === '0') return "—";
                if (/^\d+$/.test(str) && !str.startsWith('0')) str = '0' + str;
                return str;
            };

            const fmtMatric = (val) => {
                if (val === null || val === undefined || val === "") return "—";
                return String(val).replace(/^'+/, '').trim().replace(/\.0+$/, '') || "—";
            };

            const safeStr = (val) => String(val === null || val === undefined ? "" : val);

            // Find the most recent approved application photo for this user by email
            const getPhoto = (email) => {
                if (!email) return null;
                const apps = (db.applications || [])
                    .filter(a => safeStr(a.Email).toLowerCase() === safeStr(email).toLowerCase()
                              && a.Photo && safeStr(a.Photo).startsWith('data:image'))
                    .sort((a, b) => safeStr(b.Date).localeCompare(safeStr(a.Date)));
                return apps.length > 0 ? apps[0].Photo : null;
            };

            const filteredUsers = (db.lab_users || []).filter(u => {
                const term = search.toLowerCase().trim();
                const labNameRaw = resolveLabName(u.Lab);
                const labName = String(labNameRaw).toLowerCase().trim();
                
                const matchesLab = !labFilter || labFilter === 'all' || labName === String(labFilter).toLowerCase().trim();
                if (!matchesLab) return false;

                if (!term) return true;
                
                const phone   = fmtPhone(u.Phone).toLowerCase();
                const matric  = fmtMatric(u.MatriceNo).toLowerCase();
                const admsId  = safeStr(u.ADMS_ID).trim();
                return (
                    safeStr(u.Name).toLowerCase().includes(term) ||
                    matric.includes(term) ||
                    labName.includes(term) ||
                    safeStr(u.Email).toLowerCase().includes(term) ||
                    phone.includes(term) ||
                    (admsId !== "" && admsId !== "0" && admsId.toLowerCase().includes(term))
                );
            });

            return (
                <React.Fragment>
                    <ConfirmModal
                        show={verifyModal.show}
                        title="Review Access"
                        msg="Are you sure you want to review and potentially revoke this user's access? The user will receive an email notification to confirm their status."
                        onConfirm={executeVerifyAccess}
                        onCancel={() => setVerifyModal({ show: false, userId: null })}
                    />
                    <div className="ios-card bg-white border overflow-hidden text-left relative">
                        <div className="p-8 border-b flex flex-col md:flex-row justify-between items-center bg-gray-50 gap-4">
                        <div className="flex flex-col md:flex-row items-center md:items-end gap-4 text-left">
                            <div>
                                <h3 className="text-xl font-bold uppercase">Active Registry</h3>
                                <div className="mt-2 bg-white px-6 py-2 rounded-full border text-[10px] font-bold tracking-widest uppercase inline-block">{filteredUsers.length} Records</div>
                            </div>
                            {(userRole === 'pic' || userRole === 'hol' || userRole === 'admin') && (
                                (staffLabName && (userRole === 'pic' || userRole === 'hol'))
                                    ? <div className="flex items-center gap-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-1.5 max-w-[220px]">
                                          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#007aff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                                          <span className="text-xs font-bold text-blue-700 uppercase tracking-wide truncate">{staffLabName}</span>
                                      </div>
                                    : <select className="bg-white border rounded-lg px-3 py-1.5 text-xs font-bold shadow-sm max-w-[200px] truncate" value={labFilter || 'all'} onChange={e => setLabFilter(e.target.value)}>
                                          {/* Show ALL LABS only for admin / master-PIN (no restriction) */}
                                          {(!staffLabNames || staffLabNames.length === 0) && <option value="all">ALL LABS</option>}
                                          {(staffLabNames && staffLabNames.length > 0
                                              ? staffLabNames
                                              : Array.from(new Set((db.lab_users || []).map(u => resolveLabName(u.Lab)).filter(l => l && l !== '—'))).sort()
                                          ).map((lab, i) => (
                                              <option key={i} value={lab}>{lab}</option>
                                          ))}
                                      </select>
                            )}
                        </div>
                        <input className="ios-input md:w-72" placeholder="Search name, matric, lab, email or ADMS ID..." value={search} onChange={e=>setSearch(e.target.value)} />
                    </div>
                    <div className="overflow-x-auto custom-scrollbar pb-2">
                        <table className="w-full min-w-[760px]">
                            <thead className="bg-gray-50 text-[9px] text-gray-400 font-bold uppercase border-b tracking-wider">
                                <tr>
                                    <th className="px-5 py-5 text-center w-10">No.</th>
                                    <th className="px-6 py-5 text-left">Applicant</th>
                                    <th className="px-6 py-5 text-left">Matric / ADMS ID</th>
                                    <th className="px-4 py-5 text-left">Contact</th>
                                    <th className="px-6 py-5 text-left">Lab</th>
                                    <th className="px-6 py-5 text-left">Category</th>
                                    <th className="px-6 py-5 text-left">Date Registered</th>
                                    <th className="px-6 py-5 text-left">Status / Action</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-50">
                                {filteredUsers.length === 0 && (
                                    <tr><td colSpan="8" className="px-6 py-16 text-center text-gray-300 font-bold uppercase tracking-widest text-xs">No records found.</td></tr>
                                )}
                                {filteredUsers.map((u, idx) => {
                                    const labName = resolveLabName(u.Lab);
                                    const phone   = fmtPhone(u.Phone);
                                    const matric  = fmtMatric(u.MatriceNo);
                                    const hasAdms = u.ADMS_ID && safeStr(u.ADMS_ID).trim() !== "" && safeStr(u.ADMS_ID).trim() !== "0";
                                    const photo   = getPhoto(u.Email);
                                    const initial = u.Name ? String(u.Name).trim().charAt(0).toUpperCase() : '?';
                                    return (
                                        <tr key={u.ID || idx} className="hover:bg-gray-50/60 transition-colors">
                                            {/* No. */}
                                            <td className="px-5 py-4 text-center">
                                                <span className="text-[11px] font-bold text-gray-400">{idx + 1}</span>
                                            </td>
                                            {/* Applicant */}
                                            <td className="px-6 py-4">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-9 h-9 rounded-full overflow-hidden border border-gray-200 bg-gray-100 flex items-center justify-center shadow-sm shrink-0">
                                                        {photo
                                                            ? <img src={photo} className="w-full h-full object-cover" alt={u.Name} />
                                                            : <span className="text-xs font-bold text-gray-400">{initial}</span>
                                                        }
                                                    </div>
                                                    <div>
                                                        <p className="font-bold text-sm text-gray-900 uppercase leading-tight">{u.Name || "—"}</p>
                                                        {(u.Category === 'Staff' || u.Category === "IMEN's Staff only") && (
                                                            <p className="text-[10px] text-gray-400 font-bold mt-0.5 uppercase tracking-wide">Internal Role</p>
                                                        )}
                                                    </div>
                                                </div>
                                            </td>
                                            {/* Matric / ADMS */}
                                            <td className="px-6 py-4">
                                                <p className="font-mono text-xs font-bold text-[#007aff]">{matric}</p>
                                                {hasAdms && (
                                                    <div className="flex items-center gap-1 mt-1">
                                                        <Icons.IdCard className="w-3 h-3 text-indigo-400 shrink-0" />
                                                        <p className="font-mono text-[10px] font-bold text-indigo-600">{u.ADMS_ID}</p>
                                                    </div>
                                                )}
                                            </td>
                                            {/* Contact */}
                                            <td className="px-4 py-4">
                                                <p className="text-[11px] text-gray-700 font-medium break-all" title={u.Email}>{u.Email || "—"}</p>
                                                <p className="text-[11px] text-gray-500 font-medium mt-0.5">{phone}</p>
                                            </td>
                                            {/* Lab */}
                                            <td className="px-6 py-4">
                                                <span className="text-xs font-bold text-gray-800 uppercase leading-snug">{labName}</span>
                                            </td>
                                            {/* Category */}
                                            <td className="px-4 py-4 w-32">
                                                <span className="px-2 py-1 rounded-lg bg-gray-100 text-[9px] font-bold text-gray-500 uppercase tracking-wide whitespace-normal inline-block text-center leading-tight w-full">{u.Category || "—"}</span>
                                            </td>
                                            {/* Date Registered */}
                                            <td className="px-6 py-4">
                                                <p className="text-[11px] font-mono font-semibold text-gray-600">{fmtDate(u.AddedAt)}</p>
                                            </td>
                                            {/* Status / Action */}
                                            <td className="px-6 py-4">
                                                <div className="flex flex-col items-start gap-2">
                                                    <span className={`px-2.5 py-1 rounded-lg text-[9px] font-bold uppercase tracking-wide whitespace-nowrap ${u.Status === 'Active' ? 'bg-green-50 text-green-600' : u.Status === 'pending_verification' ? 'bg-orange-50 text-orange-600' : u.Status === 'Revoked' ? 'bg-rose-50 text-rose-600' : 'bg-gray-100 text-gray-500'}`}>
                                                        {u.Status === 'pending_verification' ? 'Pending Verify' : (u.Status || "Active")}
                                                    </span>
                                                    {(userRole === 'pic' || userRole === 'admin') && (!u.Status || u.Status === 'Active') && (
                                                        isProtectedUser(u.Name)
                                                            ? <span className="px-2 py-1 rounded text-[9px] font-bold uppercase tracking-wider text-gray-300 border border-gray-100 bg-gray-50 whitespace-nowrap" title="Permanent access — cannot be reviewed">Permanent Access</span>
                                                            : <button onClick={() => setVerifyModal({ show: true, userId: u.ID })} disabled={actionLoading === u.ID} className="px-2 py-1 bg-white border border-rose-200 hover:bg-rose-50 text-rose-500 rounded text-[9px] font-bold uppercase tracking-wider transition-colors disabled:opacity-50 whitespace-nowrap flex items-center gap-1 shadow-sm">
                                                                {actionLoading === u.ID ? 'Sending...' : 'Click to review access'}
                                                              </button>
                                                    )}
                                                </div>
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('lab-access-root'));
        root.render(<App />);
    </script>

    <!-- Bootstrap: compile the app with the CLASSIC JSX runtime.
         The default/automatic runtime injects `import ... from "react/jsx-runtime"`,
         which is illegal in a non-module script and blanks the page. Forcing classic
         (React.createElement) avoids that and is version-independent. -->
    <script>
      (function () {
        function boot() {
          // Babel now loads async, so it may arrive after this runs. React/ReactDOM
          // are still ordered blocking scripts, but they're checked too so the
          // transformed code can never eval before its globals exist.
          if (!window.Babel || !window.React || !window.ReactDOM) { setTimeout(boot, 50); return; }
          try {
            var src = document.getElementById('app-src').textContent;
            var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
            (0, eval)(out);
          } catch (e) {
            var r = document.getElementById('lab-access-root');
            if (r) r.innerHTML = '<div style="padding:40px;font-family:sans-serif;color:#b91c1c">The application failed to start: ' + (e && e.message ? e.message : e) + '</div>';
            throw e;
          }
        }
        boot();
      })();
    </script>
</body>
</html>
