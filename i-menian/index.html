    // ── GITHUB-PAGES MODE SHIM ────────────────────────────────────────────────
    // When THIS file is served from GitHub Pages, the native google.script.run
    // (provided only inside Google's sandbox) does not exist. This shim recreates
    // it on top of fetch() → the Apps Script JSON API (doPost in Code.gs), so every
    // existing google.script.run call works UNCHANGED in both environments.
    //   • On script.google.com (and the APK WebView) native google.script.run is
    //     present → this shim returns immediately and does nothing.
    //   • On a LOCAL dev server (localhost) it also returns → the mock block in
    //     <body> drives the offline preview as before.
    //   • On GitHub Pages it installs the fetch bridge.
    // NOTE: google.script.url has no bridge here — readUrlParams() (in the app)
    // falls back to window.location.search when it's absent.
    (function () {
        if (window.google && window.google.script && window.google.script.run) return; // native GAS
        var host = location.hostname;
        if (host === 'localhost' || host === '127.0.0.1' || host === '0.0.0.0' || host === '') return; // local preview → mock

        // ⚠️ VERIFY this is the CURRENT deployment: Apps Script ▸ Deploy ▸ Manage
        //    deployments ▸ (active) ▸ Web app URL. A stale ID = every call fails. ⚠️
        var API_URL = 'https://script.google.com/macros/s/AKfycbx7kSzb09RIJfuj4hL4t8TzLeAIvv54uuWiaIbLLomt_mN0mNWjV1Zs3nfnG2hK_ebwzg/exec';
        // Must match the doPost whitelist in Code.gs exactly.
        var API_FNS = ['getInitialData','getNdaContent','getAssessmentQuestions','getApplicationPhoto',
                       'getPhotosBatch','lookupReturningApplicant','precheckApplicant','verifyAdminPin',
                       'verifyStaffAccess','verifyEmailToken','submitFullApplication','submitAssessmentResults',
                       'updateApplicationStatus','saveAdmsId','assignRoleToLab','initiateAccessVerification',
                       'syncStaffData','syncLabData'];

        function makeRunner() {
            var onOk  = function () {};
            var onErr = function (e) { console.error('[API] ', e); };
            var runner = {
                withSuccessHandler: function (fn) { if (fn) onOk  = fn; return runner; },
                withFailureHandler: function (fn) { if (fn) onErr = fn; return runner; },
                withUserObject:     function ()   { return runner; }
            };
            API_FNS.forEach(function (name) {
                runner[name] = function () {
                    var args = Array.prototype.slice.call(arguments);
                    fetch(API_URL, {
                        method:  'POST',
                        // text/plain keeps this a CORS "simple request" (no preflight).
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body:    JSON.stringify({ fn: name, args: args })
                    })
                    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
                    .then(function (data) {
                        if (data && data.ok) onOk(data.result);
                        else onErr(new Error((data && data.error) || 'Unknown API error'));
                    })
                    .catch(function (e) { onErr(e); });
                };
            });
            return runner;
        }

        window.google = window.google || {};
        window.google.script = window.google.script || {};
        // Getter → every `google.script.run.…` expression gets a FRESH runner, so
        // two in-flight calls can never share/overwrite each other's handlers.
        Object.defineProperty(window.google.script, 'run', { get: makeRunner });

        // ── EARLY FETCH ──────────────────────────────────────────────────────
        // Kick off the slow getInitialData call NOW so the multi-second backend
        // work overlaps downloading React/Babel and transforming the JSX below,
        // instead of starting only after all of that finishes. The App's mount
        // effect consumes this promise instead of issuing its own first call.
        // The boot call ALWAYS uses an empty token (AUTH_TOKEN stays '' until a
        // verify handler sets it), so args must match that exactly — otherwise
        // the app would consume a payload it never asked for.
        window.__initialDataPromise = fetch(API_URL, {
            method:  'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body:    JSON.stringify({ fn: 'getInitialData', args: [''] })
        }).then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
        // Mark rejections handled until the app attaches its real handlers; the
        // stored promise still rejects normally for its consumer.
        window.__initialDataPromise.catch(function () {});
    })();

    <!-- Mock google.script.* for local preview only — has no effect inside GAS -->
    <script>
    if (typeof google === 'undefined') {
        var _mockData = {
            applications: [], lab_users: [], config: {},
            staff: [ {ID:'IMN_1', Name:'Dr. Ahmad Sample', Email:'ahmad@example.com', Role:'AKADEMIK'} ],
            labs: [ {ID:'LAB_1', Name:'Cleanroom Fabrication Lab', PIC_ID:'IMN_1', HOL_ID:'IMN_1'},
                    {ID:'LAB_2', Name:'Characterization Lab', PIC_ID:'IMN_1', HOL_ID:'IMN_1'} ],
            supervisors: [ {id:'Dr. Ahmad Sample', name:'Dr. Ahmad Sample'} ]
        };

        /* Build a chainable runner — each call to withSuccessHandler / withFailureHandler
           returns a fresh proxy that remembers the callbacks, and any other property
           access is treated as the actual RPC method invocation.                          */
        function _makeRunner(sCb, fCb) {
            return new Proxy({}, {
                get: function(_, name) {
                    if (name === 'withSuccessHandler') {
                        return function(cb) { return _makeRunner(cb, fCb); };
                    }
                    if (name === 'withFailureHandler') {
                        return function(cb) { return _makeRunner(sCb, cb); };
                    }
                    /* Anything else = RPC method */
                    return function() {
                        var _args = arguments;
                        setTimeout(function() {
                            try {
                                var result;
                                if (name === 'getInitialData')   result = _mockData;
                                else if (name === 'loadQuestions') result = [];
                                else if (name === 'verifyAdminPin') result = false;
                                else if (name === 'verifyStaffAccess') result = { ok: false }; // always denied in local preview (no DB access)
                                else if (name === 'verifyEmailToken')  result = { ok: false }; // always denied in local preview (no DB access)
                                else if (name === 'precheckApplicant')      { var _c=String((_args[0]||{}).category||''); var _st=/staff/i.test(_c); var _em=String((_args[0]||{}).email||'').toLowerCase(); var _ret=/return/.test(_em); result = _ret ? { isStaff:false, isReturning:true, admsId:'643', needsNda:false, needsAssessment:false, hasPhoto:true } : { isStaff:_st, isReturning:false, admsId:'', needsNda:!_st, needsAssessment:!_st, hasPhoto:false }; }
                                else if (name === 'lookupReturningApplicant'){ var _e=String((_args[0]||{}).email||'').toLowerCase(); result = /return/.test(_e) ? { found:true, name:'Ahmad bin Razali', photo:'' } : { found:false }; }
                                else if (name === 'submitFullApplication')  result = { success:true, id:'APP_PREVIEW' };
                                else if (name === 'getNdaContent')          result = null;  // NdaModal falls back to bundled NDA_CONTENT
                                else if (name === 'getAssessmentQuestions') result = [
                                    {id:'Q1', text_en:'Sample: What must you wear inside the cleanroom?', text_ms:'Contoh: Apakah yang perlu dipakai di dalam bilik bersih?', options_en:{A:'The proper PPE / cleanroom suit',B:'Slippers',C:'Shorts',D:'Nothing special'}, options_ms:{A:'PPE / sut bilik bersih yang betul',B:'Selipar',C:'Seluar pendek',D:'Tiada apa-apa khas'}, answer:'A'},
                                    {id:'Q2', text_en:'Sample: Who should you report a lab incident to?', text_ms:'Contoh: Kepada siapa anda perlu melaporkan insiden makmal?', options_en:{A:'The Lab PIC / safety officer',B:'No one',C:'Social media',D:'Just ignore it'}, options_ms:{A:'PIC / pegawai keselamatan makmal',B:'Tiada sesiapa',C:'Media sosial',D:'Abaikan sahaja'}, answer:'A'}
                                ];
                                else result = null;
                                if (sCb) sCb(result);
                            } catch(e) {
                                if (fCb) fCb(e);
                            }
                        }, 80);
                    };
                }
            });
        }

        window.google = {
            script: {
                run: _makeRunner(null, null),
                url: {
                    getLocation: function(cb) {
                        setTimeout(function(){ cb({ parameter:{}, hash:'' }); }, 40);
                    }
                }
            }
        };
    }
    </script>

    <script type="text/babel-app" id="app-src">
        const { useState, useEffect, useMemo, useRef } = React;

        // Read URL query params across ALL environments:
        //   • native GAS — the app runs in a sandboxed iframe, so the real query
        //     string lives on the OUTER url; google.script.url.getLocation reads it.
        //   • local preview — the mock provides the same getLocation (returns {}).
        //   • GitHub Pages — no google.script.url; read window.location.search.
        function readUrlParams(cb) {
            try {
                if (window.google && window.google.script && window.google.script.url
                    && typeof window.google.script.url.getLocation === 'function') {
                    window.google.script.url.getLocation(function (loc) { cb((loc && loc.parameter) || {}); });
                    return;
                }
            } catch (e) {}
            var p = {};
            try { new URLSearchParams(window.location.search).forEach(function (v, k) { p[k] = v; }); } catch (e) {}
            cb(p);
        }

        // Permanent access exceptions — these users cannot be subject to revocation.
        // Matching is case-insensitive partial match on distinctive name tokens.
        const PROTECTED_NAME_TOKENS = ['ahmad ashrif', 'shafii', 'hazde'];
        const isProtectedUser = (name) => {
            if (!name) return false;
            const lower = String(name).toLowerCase();
            return PROTECTED_NAME_TOKENS.some(token => lower.includes(token));
        };

        const Icons = {
            Back: (p) => <svg {...p} fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>,
            Search: (p) => <svg {...p} fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>,

        };

        const ConfirmModal = ({ show, title, msg, onConfirm, onCancel, onConfirmSkipVisit }) => {
            const [clicked, setClicked] = useState(false);

                if (clicked) return;

                if (clicked) return;

                            >

                                    className={`w-full py-4 rounded-2xl font-bold text-sm transition-all duration-200 flex items-center justify-center gap-2 ${clicked ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-[#34c759] text-white'}`}
                                >
                                    {clicked && <div className="w-4 h-4 border-2 border-gray-300 border-t-gray-500 rounded-full animate-spin"></div>}
                                    {clicked ? 'Processing…' : 'Confirm (No Visit)'}
                                </button>
                            )}

        const RejectModal = ({ show, onConfirm, onCancel }) => {
            const [reason, setReason] = useState("");
            const [clicked, setClicked] = useState(false);
            if (!show) return null;
            const handleConfirm = () => {
                if (clicked || !reason.trim()) return;
                setClicked(true);
                onConfirm(reason);
            };
            return (
                <div className="modal-bg animate-ios">
                    <div className="bg-white rounded-[32px] w-full max-w-sm p-8 shadow-2xl text-center">
                        <h3 className="text-xl font-bold mb-4 text-[#ff3b30]">Reject Application</h3>
                        <p className="text-gray-500 text-xs mb-2 text-left font-bold uppercase">Reason for Rejection</p>
                        <textarea className="ios-input h-32 mb-8" placeholder="Please state the reason..." value={reason} onChange={e=>setReason(e.target.value)} autoFocus disabled={clicked}></textarea>
                        <div className="flex flex-col gap-3">
                            <button
                                onClick={handleConfirm}
                                disabled={!reason.trim() || clicked}
                                className={`w-full py-4 rounded-2xl font-bold text-sm transition-all duration-200 flex items-center justify-center gap-2 ${clicked ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-[#ff3b30] text-white'} disabled:opacity-50`}
                            >
                                {clicked && <div className="w-4 h-4 border-2 border-gray-300 border-t-gray-500 rounded-full animate-spin"></div>}
                                {clicked ? 'Processing…' : 'Confirm Rejection'}
                            </button>
                            <button onClick={onCancel} disabled={clicked} className="w-full py-4 rounded-2xl font-bold text-sm text-gray-400 disabled:opacity-30 transition-opacity">Cancel</button>
                        </div>
                    </div>
                </div>
            );
        };

        /* ─────────────────────────────────────────────────────────────────────
           Security utilities
           ───────────────────────────────────────────────────────────────────── */

        // Strip any HTML / special chars before sending data to GAS
        const _sanitize = (v) => String(v ?? '')
            .replace(/<[^>]*>/g, '')          // no HTML tags
            .replace(/[<>"'`\\;{}()]/g, '')   // no injection chars
            .trim()
            .substring(0, 512);               // hard cap on length

        // Layer 2 session token — set on login, sent with every privileged GAS call.
        // Empty for applicants/anonymous. Module-scoped so all components can read it.
        let AUTH_TOKEN = '';

        // Wrap every GAS runner call so inputs are always sanitised
        const safeRun = (fn) => typeof google !== 'undefined' ? fn() : null;

        /* ─────────────────────────────────────────────────────────────────────
           Staff Login Modal
           — No hints about what the credential is.
           — Three red dots = wrong input (zero text clue).
           — Five failures → locked for this session.
           ───────────────────────────────────────────────────────────────────── */
        const StaffLoginModal = ({ credential, setCredential, onSubmit, onClose, hasError, verifying }) => (
            <div className="modal-bg animate-ios">
                <div style={{background:'rgba(255,255,255,0.94)',backdropFilter:'blur(32px)',WebkitBackdropFilter:'blur(32px)',borderRadius:'32px',border:'1px solid rgba(255,255,255,0.9)',boxShadow:'0 24px 80px rgba(0,0,0,0.16)'}} className="w-full max-w-sm p-10 text-center">

                    {/* Lock icon */}
                    <div style={{width:'52px',height:'52px',borderRadius:'50%',background:'rgba(0,122,255,0.08)',border:'1px solid rgba(0,122,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}>
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#007AFF" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2"/>
                            <path d="M7 11V7a5 5 0 0110 0v4"/>
                        </svg>
                    </div>

                    <h3 className="text-xl font-bold mb-6">Restricted Access</h3>

                    {/* Error message — no hint about credential type */}
                    <div style={{height:'22px',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:'10px'}}>
                        {hasError && (
                            <p style={{fontSize:'12px',fontWeight:'600',color:'#ff3b30',letterSpacing:'0.02em'}}>
                                Credential not recognised.
                            </p>
                        )}
                    </div>

                    {/* Credential input — wrapped in form so browser can offer to save */}
                    <form onSubmit={e => { e.preventDefault(); onSubmit(); }} autoComplete="on">
                        {/* Hidden username field — required for browser password manager to save the pair */}
                        <input type="text" autoComplete="username" style={{display:'none'}} readOnly tabIndex="-1" />

                        <input
                            type="password"
                            className="w-full ios-input p-5 mb-8"
                            style={{textAlign:'center',fontSize:'16px',letterSpacing:'0.22em'}}
                            value={credential}
                            onChange={e => { setCredential(e.target.value); }}
                            autoFocus
                            autoComplete="current-password"
                            autoCorrect="off"
                            spellCheck="false"
                        />

                        <div className="flex gap-4">
                            <button type="button" onClick={onClose} disabled={verifying} className="flex-1 py-4 font-bold text-gray-400 disabled:opacity-40">Abort</button>
                            <button type="submit" disabled={!credential.trim() || verifying}
                                    className="flex-1 btn-primary py-4 disabled:opacity-40 flex items-center justify-center gap-2">
                                {verifying
                                    ? <><div className="w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"/><span>Verifying…</span></>
                                    : 'Verify'}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        );

        // ── REFERENCE-DATA CACHE (stale-while-revalidate) ────────────────────
        // Repeat visits paint the landing page from this cache instead of waiting
        // on the backend, then the live payload silently replaces it.
        //
        // ONLY the two non-personal collections are persisted: `labs` and
        // `supervisors`. `applications`, `staff` and `lab_users` carry applicant
        // PII (Name / Email / Phone) and are NEVER written to disk — they always
        // come from the live fetch, exactly as before. That matches the backend's
        // existing PDPA stance (Code.gs strips IC before it reaches the browser);
        // localStorage would otherwise leave the applicant registry sitting on
        // any shared lab PC long after the tab closed.
        //
        // Display-only: every write still goes straight to Apps Script.
        const REF_CACHE_KEY = 'imenian_ref_v1';

        function readRefCache() {
            try {
                const raw = localStorage.getItem(REF_CACHE_KEY);
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                if (!parsed || parsed.v !== 1 || !parsed.data) return null;
                if (!Array.isArray(parsed.data.labs) || !Array.isArray(parsed.data.supervisors)) return null;
                return parsed.data;
            } catch (e) { return null; }
        }

        function writeRefCache(data) {
            try {
                if (!data || !Array.isArray(data.labs)) return;
                localStorage.setItem(REF_CACHE_KEY, JSON.stringify({
                    v: 1,
                    savedAt: Date.now(),
                    data: { labs: data.labs, supervisors: data.supervisors || [] }
                }));
            } catch (e) {
                // Quota exceeded / storage disabled — caching must never break the app
                try { localStorage.removeItem(REF_CACHE_KEY); } catch (e2) {}
            }
        }

        // Non-blocking "Refreshing…" pill shown while cached data is being revalidated.
        // Imperative DOM rather than JSX so it cannot perturb the app's render tree.
        function showRefreshBadge(show) {
            let badge = document.getElementById('data-refresh-badge');
            if (show) {
                if (!badge) {
                    badge = document.createElement('div');
                    badge.id = 'data-refresh-badge';
                    badge.style.cssText = 'position:fixed;bottom:16px;right:16px;z-index:70;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.95);border:1px solid rgba(0,0,0,.06);box-shadow:0 4px 14px rgba(0,0,0,.08);border-radius:999px;padding:7px 14px;font-size:12px;font-weight:500;color:#8e8e93';
                    badge.innerHTML = '<span style="width:12px;height:12px;border:2px solid #e5e5ea;border-top-color:#007aff;border-radius:50%;display:inline-block;animation:spin 1s linear infinite"></span><span>Refreshing…</span>';
                    document.body.appendChild(badge);
                }
            } else if (badge) {
                badge.remove();
            }
        }

        const App = () => {
            const [viewMode, setViewMode] = useState('landing');
            const [userRole, setUserRole] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [labFilter, setLabFilter] = useState("all");
            const [db, setDb] = useState({ staff: [], labs: [], applications: [], lab_users: [], supervisors: [] });
            const [isLoading, setIsLoading] = useState(true);
            const [toast, setToast] = useState(null);
            const [showStatusHint, setShowStatusHint] = useState(true);
            const [adminPin, setAdminPin] = useState("");
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            // ── Staff auth ──
            const [showStaffLogin, setShowStaffLogin] = useState(false);
            const [staffLoginRole, setStaffLoginRole] = useState(null);
            const [staffCredential, setStaffCredential] = useState('');
            const [staffLoginError, setStaffLoginError] = useState(false);   // true = show error text
            const [staffVerifying, setStaffVerifying] = useState(false);     // true = spinner
            const [staffLabName, setStaffLabName]   = useState(null);   // single lab (fixed badge) — null = show dropdown
            const [staffLabNames, setStaffLabNames] = useState([]);    // all labs assigned to this PIC/HOL (empty = no restriction)
            const [assessmentTarget, setAssessmentTarget] = useState(null);
            const [assessmentLocked, setAssessmentLocked] = useState(null);
            const showToast = (msg, type = 'info') => { setToast({ msg, type }); setTimeout(() => setToast(null), 4000); };
            const refreshData = () => { if (typeof google === 'undefined') return; setIsLoading(true); google.script.run.withSuccessHandler((data) => { setDb(data); writeRefCache(data); setIsLoading(false); }).withFailureHandler(()=>setIsLoading(false)).getInitialData(AUTH_TOKEN); };

            // ── Staff auth helpers ──
            const openStaffLogin = (role) => {
                setStaffLoginRole(role);
                setStaffCredential('');
                setStaffLoginError(false);
                // Reset lockout only if starting fresh (not if already locked from a previous attempt)
                setShowStaffLogin(true);
            };

            const verifyStaffLogin = () => {
                if (staffVerifying || !staffCredential.trim()) return;
                if (typeof google === 'undefined') { showToast('Staff auth only works on the live deployment.', 'error'); return; }

                const clean = _sanitize(staffCredential);
                setStaffVerifying(true);
                setStaffLoginError(false);

                const grant = (labs, token) => {
                    AUTH_TOKEN = token || '';
                    setShowStaffLogin(false);
                    setUserRole(staffLoginRole);
                    setViewMode('app');
                    setActiveTab('dashboard');
                    setStaffCredential('');
                    setStaffLoginError(false);
                    if (labs && labs.length > 1) { setStaffLabNames(labs); setStaffLabName(null); setLabFilter(labs[0]); }
                    else if (labs && labs.length === 1) { setStaffLabNames(labs); setStaffLabName(labs[0]); setLabFilter(labs[0]); }
                    else { setStaffLabName(null); setStaffLabNames([]); setLabFilter('all'); }
                    refreshData();
                };
                const onFail = () => { setStaffVerifying(false); setStaffCredential(''); setStaffLoginError(true); };
                const timeoutId = setTimeout(onFail, 12000);

                // Try the master admin PIN first — verified on the SERVER (no PIN in the browser).
                google.script.run
                    .withSuccessHandler(adminRes => {
                        if (adminRes && (adminRes === true || adminRes.ok)) {
                            clearTimeout(timeoutId); setStaffVerifying(false);
                            grant([], adminRes.token);      // master PIN → unrestricted
                            return;
                        }
                        // Not a master PIN → verify as a staff email.
                        google.script.run
                            .withSuccessHandler(res => {
                                clearTimeout(timeoutId); setStaffVerifying(false);
                                if (res && res.ok) grant(res.labNames || (res.labName ? [res.labName] : []), res.token);
                                else onFail();
                            })
                            .withFailureHandler(() => { clearTimeout(timeoutId); onFail(); })
                            .verifyStaffAccess(clean, staffLoginRole);
                    })
                    .withFailureHandler(() => { clearTimeout(timeoutId); onFail(); })
                    .verifyAdminPin(clean);
            };

            useEffect(() => {
                if (typeof google === 'undefined') { setIsLoading(false); return; }

                // One-shot: the <head> early fetch already issued this exact call
                // (GitHub Pages mode). Native GAS has no such promise → normal call.
                const earlyData = window.__initialDataPromise;
                window.__initialDataPromise = null;

                readUrlParams((params) => {
                    const applyInitialData = (data) => {
                        setDb(data || { staff: [], labs: [], applications: [], lab_users: [], supervisors: [] });
                        if (data) writeRefCache(data);
                        if (params.appId) {
                            const target = data.applications.find(a => a.ID === params.appId);
                            if (target) {
                                if (target.Status === 'pending_assessment') {
                                    setAssessmentTarget(target);
                                } else if (target.Status === 'pending_access' || target.Status === 'approved') {
                                    setAssessmentLocked({ title: "Assessment Completed", msg: "You have already passed the safety assessment for this application. Your record is securely saved.", type: "success" });
                                } else {
                                    setAssessmentLocked({ title: "Access Denied", msg: "The safety assessment is currently not active for this application status.", type: "error" });
                                }
                            } else {
                                setAssessmentLocked({ title: "Not Found", msg: "The requested application ID does not exist in the registry.", type: "error" });
                            }
                        } else if (params.role === 'applicant') {
                            setUserRole('applicant'); setViewMode('app'); setActiveTab('apply');
                        } else if (params.role === 'pic' || params.role === 'hol') {
                            if (params.token) {
                                // Email link with token — auto-login, no password needed
                                google.script.run
                                    .withSuccessHandler(res => {
                                        if (res && res.ok) {
                                            AUTH_TOKEN = res.token || '';
                                            setUserRole(res.role || params.role);
                                            setViewMode('app');
                                            setActiveTab('dashboard');
                                            refreshData();
                                            const labs = res.labNames || (res.labName ? [res.labName] : []);
                                            if (labs.length > 1) {
                                                setStaffLabNames(labs);
                                                setStaffLabName(null);
                                                setLabFilter(labs[0]);
                                            } else if (labs.length === 1) {
                                                setStaffLabNames(labs);
                                                setStaffLabName(labs[0]);
                                                setLabFilter(labs[0]);
                                            }
                                        } else {
                                            // Token expired/invalid — fall back to manual login
                                            openStaffLogin(params.role);
                                            if (params.lab) setLabFilter(params.lab);
                                        }
                                        setIsLoading(false);
                                    })
                                    .withFailureHandler(() => {
                                        openStaffLogin(params.role);
                                        if (params.lab) setLabFilter(params.lab);
                                        setIsLoading(false);
                                    })
                                    .verifyEmailToken(params.token);
                                return; // setIsLoading handled in callbacks above
                            }
                            // No token — require manual credential
                            openStaffLogin(params.role);
                            if (params.lab) setLabFilter(params.lab);
                        } else if (params.role) {
                            setUserRole(params.role); setViewMode('app'); setActiveTab('dashboard');
                            if (params.lab) setLabFilter(params.lab);
                        }
                        setIsLoading(false);
                        showRefreshBadge(false);
                    };

                    // Stale-while-revalidate: paint immediately from cached
                    // reference data whenever the destination can be decided
                    // WITHOUT live data, then let the live payload swap in.
                    //   • no params      → the landing (role picker)
                    //   • role=applicant → the apply form, whose only data needs
                    //     are the labs + supervisors dropdowns, both cached. This
                    //     is apply.html's entry point, so it's the path that most
                    //     benefits from an instant repeat-visit paint.
                    // Excluded (must wait for live data — never route on cached
                    // content): ?appId= (assessment lookup in `applications`,
                    // which is empty in the cache) and role=pic/hol (needs token
                    // or credential verification before showing the dashboard).
                    if (!params.appId && (!params.role || params.role === 'applicant')) {
                        const cached = readRefCache();
                        if (cached) {
                            setDb({ staff: [], labs: cached.labs, applications: [], lab_users: [], supervisors: cached.supervisors });
                            if (params.role === 'applicant') { setUserRole('applicant'); setViewMode('app'); setActiveTab('apply'); }
                            setIsLoading(false);
                            showRefreshBadge(true);
                        }
                    }

                    if (earlyData) {
                        earlyData
                            .then((res) => {
                                if (res && res.ok) applyInitialData(res.result);
                                else { showRefreshBadge(false); console.error('[API] ', (res && res.error) || 'Unknown API error'); }
                            })
                            .catch((e) => { showRefreshBadge(false); console.error('[API] ', e); });
                    } else {
                        google.script.run.withSuccessHandler(applyInitialData).getInitialData(AUTH_TOKEN);
                    }
                });
            }, []);

                                google.script.run.withSuccessHandler((res) => {
                                    if (res && (res === true || res.ok)) { AUTH_TOKEN = res.token || ''; setUserRole('admin'); setViewMode('app'); setShowAdminLogin(false); refreshData(); }

        const BentoGridLanding = ({ onSelectRole, showAdminLogin, setShowAdminLogin, adminPin, setAdminPin, verifyAdmin }) => (
            <div className="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden" style={{background:'linear-gradient(145deg,#eef3ff 0%,#f8f9ff 45%,#edfaf4 100%)'}}>

                {/* ── Decorative gradient blobs ── */}
                <div style={{position:'absolute',top:'-140px',left:'-100px',width:'560px',height:'560px',borderRadius:'50%',background:'radial-gradient(circle,rgba(0,122,255,0.13) 0%,transparent 70%)',filter:'blur(48px)',pointerEvents:'none',zIndex:0}}/>
                <div style={{position:'absolute',bottom:'-120px',right:'-80px',width:'500px',height:'500px',borderRadius:'50%',background:'radial-gradient(circle,rgba(88,86,214,0.11) 0%,transparent 70%)',filter:'blur(48px)',pointerEvents:'none',zIndex:0}}/>
                <div style={{position:'absolute',top:'55%',left:'30%',width:'360px',height:'360px',borderRadius:'50%',background:'radial-gradient(circle,rgba(52,199,89,0.09) 0%,transparent 70%)',filter:'blur(48px)',pointerEvents:'none',zIndex:0}}/>

                {/* ── Header ── */}
                <div className="text-center mb-12 animate-ios" style={{zIndex:1,width:'100%',maxWidth:'860px'}}>

                        <span style={{width:'7px',height:'7px',borderRadius:'50%',background:'#007AFF',display:'block',boxShadow:'0 0 6px rgba(0,122,255,0.6)'}}></span>
                        <span style={{fontSize:'10px',fontWeight:'700',letterSpacing:'2.5px',textTransform:'uppercase',color:'#007AFF'}}>IMEN Lab Access System</span>
                    </div>
                    <h1 style={{fontSize:'clamp(52px,7vw,76px)',fontWeight:'900',letterSpacing:'-3px',lineHeight:'0.95',background:'linear-gradient(125deg,#0a0a0a 0%,#1a1a4e 45%,#0055D4 80%,#007AFF 100%)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text',marginBottom:'14px'}}>i-Menian</h1>
                    <p style={{fontSize:'13px',color:'#8E8E93',fontWeight:'400',lineHeight:'1.6'}}>Intelligent laboratory access management system.</p>
                    <p style={{fontSize:'12px',color:'#AEAEB2',fontWeight:'400',marginTop:'4px'}}>Select your role in order to get started</p>

                {/* ── Bento Grid ── */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-5 max-w-5xl w-full relative" style={{zIndex:1}}>

                    {/* Staff column */}
                    <div className="flex flex-col gap-5">

                        <LandingCard role="hol" title="Lab Coordinator" desc="Final authorization &amp; oversight" icon={<Icons.User className="w-6 h-6"/>} accent="#FF9500" onClick={onSelectRole} />
                    </div>

                    {/* Admin — dark glass card */}
                    <div onClick={() => onSelectRole('admin')} className="group hover:scale-[1.02] transition-all duration-200 cursor-pointer text-left flex flex-col justify-between"
                        style={{background:'rgba(20,20,28,0.82)',backdropFilter:'blur(28px)',WebkitBackdropFilter:'blur(28px)',border:'1px solid rgba(255,255,255,0.07)',borderRadius:'24px',padding:'32px',boxShadow:'0 8px 40px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.06)'}}>
                        <div style={{width:'48px',height:'48px',borderRadius:'14px',background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.1)',display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(255,255,255,0.85)'}}>

                            <h3 style={{fontSize:'20px',fontWeight:'800',color:'#FFFFFF',letterSpacing:'-0.4px',marginBottom:'5px'}}>Control Center</h3>
                            <p style={{fontSize:'13px',color:'rgba(255,255,255,0.38)',lineHeight:'1.5'}}>Registry &amp; system management</p>
                        </div>
                        <div className="group-hover:translate-x-1 transition-transform" style={{marginTop:'28px',display:'flex',alignItems:'center',gap:'6px',color:'#007AFF',fontSize:'10px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'1px'}}>
                            Initialize <Icons.ArrowRight className="w-3 h-3"/>
                        </div>
                    </div>
                </div>

                {/* ── Handbook pill ── */}
                <a href="https://imenhub-portal.github.io/i-menian/flow" target="_blank" rel="noopener"
                   style={{position:'fixed',bottom:'28px',left:'28px',zIndex:200,display:'flex',alignItems:'center',gap:'9px',
                           background:'rgba(255,255,255,0.72)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',
                           border:'1px solid rgba(255,255,255,0.9)',borderRadius:'100px',
                           padding:'10px 18px 10px 12px',
                           boxShadow:'0 4px 20px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04)',
                           textDecoration:'none',cursor:'pointer',transition:'all .22s ease'}}
                   onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.92)';e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 8px 28px rgba(0,0,0,0.12),0 2px 6px rgba(0,0,0,0.06)';}}
                   onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,0.72)';e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='0 4px 20px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04)';}}>
                    <span style={{width:'32px',height:'32px',borderRadius:'50%',background:'linear-gradient(135deg,#1a6fff,#0040cc)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'0 3px 10px rgba(0,80,255,0.3)'}}>
                        <Icons.AppIcon className="w-4 h-4" style={{color:'white'}}/>
                    </span>
                    <span style={{display:'flex',flexDirection:'column',lineHeight:'1.25'}}>
                        <span style={{fontSize:'11px',fontWeight:'700',color:'#1C1C1E',letterSpacing:'-.1px'}}>User Handbook</span>
                        <span style={{fontSize:'10px',color:'#8E8E93',fontWeight:'400'}}>Read before applying</span>
                    </span>
                    <Icons.ArrowRight className="w-3 h-3" style={{marginLeft:'2px',flexShrink:0,color:'#8E8E93'}}/>
                </a>

                {/* ── Admin PIN Modal ── */}
                {showAdminLogin && (
                    <div className="modal-bg animate-ios">
                        <div style={{background:'rgba(255,255,255,0.92)',backdropFilter:'blur(32px)',WebkitBackdropFilter:'blur(32px)',borderRadius:'32px',border:'1px solid rgba(255,255,255,0.9)',boxShadow:'0 24px 80px rgba(0,0,0,0.14)'}} className="w-full max-w-sm p-10 text-center">
                            <h3 className="text-xl font-bold mb-8">Verification Required</h3>
                            <input type="password" maxLength="6" className="w-full text-center text-4xl tracking-[0.8em] ios-input p-5 mb-10" value={adminPin} onChange={e=>setAdminPin(e.target.value)} onKeyDown={e=>e.key==='Enter' && verifyAdmin()} autoFocus />
                            <div className="flex gap-4"><button onClick={()=>setShowAdminLogin(false)} className="flex-1 py-4 font-bold text-gray-400">Abort</button><button onClick={verifyAdmin} className="flex-1 btn-primary py-4">Authorize</button></div>
                        </div>
                    </div>
                )}
            </div>
        );

        const CARD_GRADIENTS = {
            '#007AFF': 'linear-gradient(145deg,#1a6fff 0%,#0040cc 55%,#002fa3 100%)',
            '#34C759': 'linear-gradient(145deg,#2ecc71 0%,#18a34a 55%,#0f7a34 100%)',
            '#FF9500': 'linear-gradient(145deg,#ff9f0a 0%,#e06b00 55%,#b84f00 100%)',
        };
        const CARD_SHADOWS = {
            '#007AFF': '0 8px 32px rgba(0,80,255,0.35),0 2px 8px rgba(0,40,180,0.2)',
            '#34C759': '0 8px 32px rgba(20,180,80,0.35),0 2px 8px rgba(10,120,50,0.2)',
            '#FF9500': '0 8px 32px rgba(255,140,0,0.35),0 2px 8px rgba(180,80,0,0.2)',
        };

        const LandingCard = ({ role, title, desc, icon, accent, onClick, primary }) => (
            <div onClick={() => onClick(role)}
                className={`group hover:scale-[1.02] transition-all duration-200 cursor-pointer text-left flex flex-col justify-between ${primary ? 'md:h-full' : ''}`}
                style={{background: CARD_GRADIENTS[accent] || `linear-gradient(145deg,${accent},${accent}cc)`, border:'1px solid rgba(255,255,255,0.18)', borderRadius:'24px', padding:'32px', boxShadow: CARD_SHADOWS[accent] || `0 8px 32px ${accent}55`, ...(primary ? {} : {height:'200px'})}}>
                <div style={{width:'48px',height:'48px',borderRadius:'14px',background:'rgba(255,255,255,0.18)',border:'1px solid rgba(255,255,255,0.25)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 14px rgba(0,0,0,0.15)',color:'rgba(255,255,255,0.95)'}}>
                    {icon}
                </div>
                <div style={{marginTop:'auto',paddingTop:'24px'}}>
                    <h3 style={{fontSize:'20px',fontWeight:'800',color:'#fff',letterSpacing:'-0.4px',marginBottom:'5px'}}>{title}</h3>
                    <p style={{fontSize:'13px',color:'rgba(255,255,255,0.7)',lineHeight:'1.5'}}>{desc}</p>
                </div>
                <div className="group-hover:translate-x-1 transition-transform" style={{marginTop:'24px',display:'flex',alignItems:'center',gap:'6px',color:'rgba(255,255,255,0.9)',fontSize:'10px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'1px'}}>
                    Enter <Icons.ArrowRight className="w-3 h-3"/>
                </div>
            </div>
        );

        const Dashboard = ({ db, userRole, showToast, refreshData, startAssessment, labFilter, setLabFilter, staffLabName, staffLabNames }) => {
            const [search, setSearch] = useState("");
            const [procId, setProcId] = useState(null);
            const [photoMap, setPhotoMap]         = useState({});
            const [loadingPhotos, setLoadingPhotos] = useState(false);
            const [photosDone, setPhotosDone]     = useState(0);
            const [photosTotal, setPhotosTotal]   = useState(0);

            const loadAllPhotos = () => {
                if (loadingPhotos || typeof google === 'undefined') return;
                const total = (db.applications || []).length;
                if (!total) return;
                const BATCH = 30, CONCUR = 3;
                const totalBatches = Math.ceil(total / BATCH);
                let batchIdx = 0, completedRows = 0;
                setLoadingPhotos(true); setPhotosDone(0); setPhotosTotal(total);
                function runNext() {
                    if (batchIdx >= totalBatches) return;
                    const myBatch = batchIdx++;
                    const startRow = myBatch * BATCH + 1;
                    const onDone = (result) => {
                        if (result) setPhotoMap(prev => ({ ...prev, ...result }));
                        completedRows += BATCH;
                        const done = Math.min(completedRows, total);
                        setPhotosDone(done);
                        if (completedRows >= total) setLoadingPhotos(false);
                        runNext();
                    };
                    google.script.run
                        .withSuccessHandler(onDone)
                        .withFailureHandler(() => onDone(null))
                        .getPhotosBatch(startRow, BATCH, AUTH_TOKEN);
                }
                for (let c = 0; c < Math.min(CONCUR, totalBatches); c++) runNext();
            };
            // ── PIC / HOL: track which app IDs we've already requested ──────────
            const requestedPhotos = useRef(new Set());

            const [confirmModal, setConfirmModal] = useState({ show: false, appId: null, status: null, admsId: null });
            const [rejectModal, setRejectModal] = useState({ show: false, appId: null });
            const [showCompleted, setShowCompleted] = useState(false);
            const [showRejected, setShowRejected] = useState(false);

            const filtered = useMemo(() => {
                const term = search.toLowerCase().trim();
                return db.applications.filter(app => {
                    const matchesSearch = userRole === 'applicant'
                        ? (String(app.StudentID || "").toLowerCase() === term || String(app.Email || "").toLowerCase() === term)
                        : (
                            String(app.Name || "").toLowerCase().includes(term) ||
                            String(app.LabName || "").toLowerCase().includes(term) ||
                            // ✅ NEW: ADMS_ID is searchable
                            (String(app.ADMS_ID || "").trim() !== "" && String(app.ADMS_ID || "").toLowerCase().includes(term))
                          );
                    const labNameRaw = app.LabName || "";
                    const matchesLab = !labFilter || labFilter === 'all' || String(labNameRaw).toLowerCase().trim() === String(labFilter).toLowerCase().trim();
                    // Three buckets:
                    //  • Active      — in-progress (pending_*), plus admin's approved-without-ADMS_ID
                    //                  (kept visible so the officer can assign without opening a toggle).
                    //  • Completed   — approved (admin: approved WITH ADMS_ID). Behind "Show Completed".
                    //  • Rejected    — rejected + auto_cancelled. Behind "Show Rejected / Cancelled".
                    const isRejected = (app.Status === 'rejected' || app.Status === 'auto_cancelled');
                    const isCompleted = userRole === 'admin'
                        ? (app.Status === 'approved' && !!String(app.ADMS_ID || '').trim())
                        : (app.Status === 'approved');
                    const isActive = !isRejected && !isCompleted;
                    const matchesHistory = userRole === 'applicant' ? true
                        : (isActive || (isCompleted && showCompleted) || (isRejected && showRejected));
                    if (userRole === 'applicant' && term.length < 3) return false;
                    return matchesSearch && matchesLab && matchesHistory;
                });
            }, [db.applications, search, userRole, labFilter, showCompleted, showRejected]);

            // ── PIC / HOL: auto-load photos for their filtered apps only ─────────
            useEffect(() => {
                if ((userRole !== 'pic' && userRole !== 'hol') || typeof google === 'undefined' || !filtered.length) return;
                filtered.forEach(app => {
                    const id = app.ID;
                    if (!id || requestedPhotos.current.has(id) || photoMap[id]) return;
                    requestedPhotos.current.add(id);
                    google.script.run
                        .withSuccessHandler(photo => {
                            if (photo) setPhotoMap(prev => ({ ...prev, [id]: photo }));
                        })
                        .withFailureHandler(() => {})
                        .getApplicationPhoto(id, AUTH_TOKEN);
                });
            }, [filtered, userRole]);

            const executeStatusUpdate = (appId, newStatus, reason = "", skipVisit = false) => {
                setProcId(appId);
                const roleLabel = userRole === 'pic' ? 'PIC' : (userRole === 'hol' ? 'Coordinator' : 'Admin');
                google.script.run
                    .withSuccessHandler(() => {
                        showToast(newStatus === 'rejected' ? "Rejected & Emailed" : "Synced", newStatus === 'rejected' ? "error" : "success");
                        setProcId(null);
                        setConfirmModal({show:false});
                        setRejectModal({show:false});
                        refreshData();
                    })
                    .withFailureHandler((err) => {
                        showToast("Error: " + err.message, "error");
                        setProcId(null);
                    })
                    .updateApplicationStatus(appId, newStatus, `Approved by ${roleLabel}`, reason, skipVisit, AUTH_TOKEN);
            };

            return (
                <div className="space-y-10">
                    <ConfirmModal
                        show={confirmModal.show}
                        title="Confirm Update"
                        msg={confirmModal.admsId ? `Returning applicant — ADMS ID already linked (${confirmModal.admsId}). Select registration type.` : "Authorize this phase?"}
                        onConfirm={()=>executeStatusUpdate(confirmModal.appId, confirmModal.status)}
                        onCancel={()=>setConfirmModal({show:false})}

        /* =============================================

            // ── ADMS ID save handler ───────────────────────────────────────────

                google.script.run
                    .withSuccessHandler(() => {

            return (
                <div className={`bg-white rounded-[20px] border border-gray-100 overflow-hidden shadow-sm hover:shadow-md transition-all relative border-l-4 ${currentStatus.border} flex flex-col text-left`}>

                            </div>
                        </div>

                        {/* ── Applicant assessment button ── */}
                        {app.Status === 'pending_assessment' && userRole === 'applicant' && (
                            <button onClick={() => startAssessment(app)} className="w-full py-4 mt-5 bg-purple-600 text-white rounded-2xl font-bold text-sm shadow-md hover:bg-purple-700 transition-colors">Start Assessment</button>
                        )}

                        {/* ── ADMIN: ADMS ID assignment panel (shown on 'approved' cards) ── */}

                                {!showAdmsInput ? (

                                    <button onClick={()=>onApprove(app.ID, 'pending_hol')} className="px-5 py-2.5 bg-[#007aff] hover:bg-blue-600 text-white rounded-xl font-bold text-[10px] uppercase tracking-wide shadow-sm transition-colors">Approve</button>
                                </>

                            {userRole === 'hol' && app.Status === 'pending_hol' && (

                                    <button onClick={()=>onApprove(app.ID, 'pending_access')} className="px-5 py-2.5 bg-[#007aff] hover:bg-blue-600 text-white rounded-xl font-bold text-[10px] uppercase tracking-wide shadow-sm transition-colors">Approve</button>
                                </>
                            )}
                            {userRole === 'admin' && app.Status === 'pending_access' && (
                                <button onClick={()=>onApprove(app.ID, 'approved', app.ADMS_ID)} className="px-6 py-2.5 bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl font-bold text-[10px] uppercase tracking-wide shadow-sm transition-colors">Register &amp; Notify Applicant</button>
                            )}
