<script>
// ── GITHUB-PAGES MODE SHIM ────────────────────────────────────────────────
// Served from GitHub Pages there is no google.script.run (only Google's
// sandbox provides it), so this rebuilds it on top of fetch() against the
// Apps Script JSON API (doPost in Code.gs). Every existing
// google.script.run call then works UNCHANGED in both environments.
// On script.google.com the native object already exists and this does nothing.
(function () {
  if (window.google && window.google.script && window.google.script.run) return; // native GAS

  var API_URL = 'https://script.google.com/macros/s/AKfycbwjO97_YWugdYIRpV6bT3Uv4uTbmM6Ob1axw9ASpk668ugB40O1DAxzBn2jTRp9rLxKTg/exec';
  var API_FNS = ['startResumableUpload', 'processForm', 'updatePosterStatus',
                 'deleteRow', 'getAdminData', 'checkUserStatus'];

  function makeRunner() {
    var onOk  = function () {};
    var onErr = function (e) { console.error('[API] ', e); };
    var runner = {
      withSuccessHandler: function (fn) { if (fn) onOk  = fn; return runner; },
      withFailureHandler: function (fn) { if (fn) onErr = fn; return runner; },
      withUserObject:     function ()   { return runner; }
    };
    API_FNS.forEach(function (name) {
      runner[name] = function () {
        var args = Array.prototype.slice.call(arguments);
        fetch(API_URL, {
          method:  'POST',
          // text/plain keeps this a CORS "simple request" (no preflight,
          // which Apps Script cannot answer).
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body:    JSON.stringify({ fn: name, args: args })
        })
        .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(function (data) {
          if (data && data.ok) onOk(data.result);
          else onErr(new Error((data && data.error) || 'Unknown API error'));
        })
        .catch(function (e) { onErr(e); });
      };
    });
    return runner;
  }

  window.google = window.google || {};
  window.google.script = window.google.script || {};
  // Getter → each `google.script.run.…` expression gets a FRESH runner, so
  // concurrent calls cannot overwrite each other's handlers.
  Object.defineProperty(window.google.script, 'run', { get: makeRunner });
})();
</script>

<script>
// ══════════════════════════════════════════
//  UTILITIES
// ══════════════════════════════════════════
// Escape user-controlled data before innerHTML — form input and sheet
// cells are attacker-controlled; without this a crafted <script> in the
// "nama" field would run in every browser that renders it.
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function sw(n) {
  document.querySelectorAll('.tab').forEach(function(t,i){ t.classList.toggle('active', i===n); });
  document.querySelectorAll('.section').forEach(function(s,i){ s.classList.toggle('active', i===n); });
}
function ld(on) { document.getElementById('loader').style.display = on ? 'flex' : 'none'; }
function fmtMB(b) { return (b/1024/1024).toFixed(2) + ' MB'; }

function calcPrice() {
  var s = document.getElementById('size').value;
  var m = document.getElementById('media').value;
  var u = parseInt(document.getElementById('unit').value) || 1;
  document.getElementById('optPlain').disabled = (s === 'A0');
  if (s === 'A0' && m === 'Plain Paper') { document.getElementById('media').value = 'High Glossy'; m = 'High Glossy'; }
  var p = (m === 'High Glossy') ? (s === 'A1' ? 50 : 80) : 30;
  document.getElementById('priceDisplay').innerText = (p * u).toFixed(2);
  document.getElementById('hh').value = p;
}

function toggleGeran(el) {
  var inp = document.getElementById('inpGeran');
  if (el.value === 'Geran') { inp.style.display = 'block'; inp.required = true; }
  else { inp.style.display = 'none'; inp.value = ''; inp.required = false; }
}

function onFileChosen(input) {
  var f = input.files[0];
  if (!f) return;
  var el = document.getElementById('uzChosen');
  el.style.display = 'block';
  el.innerText = '📎 ' + f.name + ' (' + fmtMB(f.size) + ')'; // innerText — not parsed as HTML, safe
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progStatus').innerText = '';
}

// Drag-and-drop highlight
(function(){
  var uz = document.getElementById('uploadZone');
  uz.addEventListener('dragover', function(e){ e.preventDefault(); uz.classList.add('drag'); });
  uz.addEventListener('dragleave', function(){ uz.classList.remove('drag'); });
  uz.addEventListener('drop', function(){ uz.classList.remove('drag'); });
})();

// ══════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════
var _mCb = null;
function showModal(title, msg, type, cb) {
  var icons = { success:'✅', error:'⚠️', confirm:'❓', prompt:'✏️' };
  document.getElementById('mIcon').innerText  = icons[type] || '🔔';
  document.getElementById('mTitle').innerText = title;
  document.getElementById('mMsg').innerText   = msg;
  var inp  = document.getElementById('mInput');
  var bCan = document.getElementById('mBtnCancel');
  var bOk  = document.getElementById('mBtnOk');
  inp.style.display = 'none'; bCan.style.display = 'none';
  bOk.innerText = 'OK'; inp.value = ''; _mCb = cb || null;
  if (type === 'confirm') { bCan.style.display = 'block'; bOk.innerText = 'Ya, Teruskan'; }
  else if (type === 'prompt') { bCan.style.display = 'block'; inp.style.display = 'block'; bOk.innerText = 'Hantar'; setTimeout(function(){ inp.focus(); }, 120); }
  var m = document.getElementById('cModal');
  m.style.display = 'flex';
  setTimeout(function(){ m.classList.add('show'); }, 10);
}
function closeM() {
  var m = document.getElementById('cModal');
  m.classList.remove('show');
  setTimeout(function(){ m.style.display = 'none'; }, 300);
}
function confirmM() {
  var inp = document.getElementById('mInput');
  if (inp.style.display === 'block' && !inp.value.trim()) { inp.style.borderColor = 'red'; return; }
  inp.style.borderColor = '#e2e8f0';
  closeM();
  if (_mCb) _mCb(inp.value.trim());
}
function myAlert(msg, isErr)  { showModal(isErr ? 'Ralat' : 'Berjaya ✅', msg, isErr ? 'error' : 'success'); }
function myConfirm(msg, cb)   { showModal('Pengesahan', msg, 'confirm', cb); }
function myPrompt(msg, cb)    { showModal('Maklumat Diperlukan', msg, 'prompt', cb); }

// ══════════════════════════════════════════
//  DIRECT-TO-DRIVE RESUMABLE UPLOAD
//
//  The old version base64'd the whole file through Apps Script in 500KB
//  chunks parked in CacheService. That could not carry a print-quality
//  poster: it read the ENTIRE file into memory via readAsArrayBuffer
//  (enough to kill a phone tab on its own), base64 inflated it by 33%,
//  CacheService evicted pieces at will, and Apps Script capped out at
//  ~50MB when reassembling anyway.
//
//  Now: the server opens a Drive resumable session and returns only the
//  session URI; the browser PUTs the File object straight to Google.
//  The browser streams it — never held in memory, never base64'd, and
//  Apps Script never touches the bytes. 100MB+ is fine.
// ══════════════════════════════════════════
var MAX_FILE_MB = 300; // generous ceiling; raise freely — no longer architectural

function submitForm(f) {
  var fileInput = document.getElementById('fileInput');
  if (!fileInput.files[0]) { myAlert('Sila pilih fail untuk dimuat naik!', true); return; }

  var file = fileInput.files[0];
  if (file.size > MAX_FILE_MB * 1024 * 1024) {
    myAlert('Fail terlalu besar (' + fmtMB(file.size) + '). Had maksimum ialah ' + MAX_FILE_MB + ' MB.', true);
    return;
  }
  if (file.size === 0) { myAlert('Fail kosong. Sila pilih fail lain.', true); return; }

  var btn = document.getElementById('submitBtn');
  btn.disabled  = true;
  btn.innerText = '⏳ Sedang memuat naik...';

  var wrap  = document.getElementById('progressWrap');
  var fill  = document.getElementById('progressFill');
  var pDone = document.getElementById('progChunk');
  var pPct  = document.getElementById('progPct');
  var pSize = document.getElementById('progSize');
  var pStat = document.getElementById('progStatus');

  wrap.style.display = 'block';
  fill.style.width   = '0%';
  pPct.innerText     = '0%';
  pDone.innerText    = '0 MB';
  pSize.innerText    = fmtMB(file.size);
  pStat.style.color  = '#0f172a';
  pStat.innerText    = 'Menyediakan muat naik...';

  var ui = { fill: fill, pDone: pDone, pPct: pPct, pStat: pStat, btn: btn };

  // Step 1 — ask the server to open a Drive resumable session.
  google.script.run
    .withFailureHandler(function(err) { uploadFailed(ui, 'Gagal menyediakan muat naik: ' + err); })
    .withSuccessHandler(function(res) {
      if (!res || !res.ok) { uploadFailed(ui, (res && res.error) || 'Ralat tidak diketahui'); return; }
      putFileToDrive(res.sessionUri, file, f, ui);
    })
    // Origin is passed so Google returns a session that is CORS-enabled for
    // this page; without it the file transfers fully and the response is then
    // blocked, which surfaces as a "connection dropped" error at 100%.
    .startResumableUpload(file.name, file.type || 'application/octet-stream', window.location.origin);
}

// Step 2 — stream the file straight to Google's upload endpoint.
// XMLHttpRequest (not fetch) because only XHR reports upload progress.
function putFileToDrive(sessionUri, file, formEl, ui) {
  var xhr = new XMLHttpRequest();
  xhr.open('PUT', sessionUri, true);
  xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');

  // Tracks whether the body finished transferring. If it did and we STILL land
  // in onerror, the bytes arrived and it was the response that got blocked —
  // a different fault from a genuine mid-transfer drop, so say so plainly.
  var sentFully = false;

  xhr.upload.onprogress = function(e) {
    if (!e.lengthComputable) return;
    var pct = Math.round((e.loaded / e.total) * 100);
    if (e.loaded >= e.total) sentFully = true;
    ui.fill.style.width = pct + '%';
    ui.pPct.innerText   = pct + '%';
    ui.pDone.innerText  = fmtMB(e.loaded);
    ui.pStat.innerText  = '⬆️ Memuat naik... ' + pct + '%';
  };

  xhr.onload = function() {
    if (xhr.status !== 200 && xhr.status !== 201) {
      uploadFailed(ui, 'Muat naik gagal (HTTP ' + xhr.status + '). ' + (xhr.responseText || ''));
      return;
    }
    var fileId;
    try {
      fileId = JSON.parse(xhr.responseText).id;
    } catch (err) {
      uploadFailed(ui, 'Respons Drive tidak difahami.');
      return;
    }
    if (!fileId) { uploadFailed(ui, 'Drive tidak memulangkan ID fail.'); return; }

    ui.fill.style.width = '100%';
    ui.pPct.innerText   = '100%';
    ui.pDone.innerText  = fmtMB(file.size);
    ui.pStat.style.color = '#15803d';
    ui.pStat.innerText   = '✅ Fail berjaya dimuat naik! Menyimpan data...';

    saveBooking(formEl, file, fileId, ui);
  };

  xhr.onerror = function() {
    uploadFailed(ui, sentFully
      ? 'Fail sampai ke Drive tetapi respons disekat (CORS). Pastikan Code.gs terkini telah di-deploy sebagai versi baharu.'
      : 'Sambungan terputus semasa muat naik. Sila cuba semula.');
  };
  xhr.ontimeout = function() { uploadFailed(ui, 'Muat naik tamat masa. Sila cuba semula.'); };

  xhr.send(file); // the File object streams; it is never loaded into memory
}

// Step 3 — file is in Drive, now write the booking row.
function saveBooking(formEl, file, fileId, ui) {
  var data = {
    nama        : formEl.nama.value,
    tel         : formEl.tel.value,
    email       : formEl.email.value,
    ukmper      : formEl.ukmper.value,
    ptj         : formEl.ptj.value,
    tujuan      : formEl.tujuan.value,
    size        : formEl.size.value,
    media       : formEl.media.value,
    unit        : formEl.unit.value,
    harga_hidden: formEl.harga_hidden.value,
    bayaran     : formEl.bayaran.value,
    no_geran    : formEl.no_geran ? formEl.no_geran.value : '',
    fileId      : fileId,
    fileMime    : file.type
  };

  google.script.run
    .withFailureHandler(function(e) { ld(false); uploadFailed(ui, e.toString()); })
    .withSuccessHandler(function(r) {
      ld(false);
      myAlert(r.message, r.status === 'error');
      if (r.status !== 'error') {
        formEl.reset();
        document.getElementById('fileInput').value = '';
        document.getElementById('uzChosen').style.display    = 'none';
        document.getElementById('progressWrap').style.display = 'none';
        document.getElementById('inpGeran').style.display     = 'none';
        calcPrice();
      }
      resetBtn(ui.btn);
    })
    .processForm(data);
}

function uploadFailed(ui, msg) {
  ui.pStat.style.color = '#b91c1c';
  ui.pStat.innerText   = '❌ ' + msg;
  myAlert(msg, true);
  resetBtn(ui.btn);
}

function resetBtn(btn) {
  btn.disabled  = false;
  btn.innerText = '🚀 HANTAR TEMPAHAN';
}

// ══════════════════════════════════════════
//  CHECK STATUS
// ══════════════════════════════════════════
function checkStatus() {
  var q = document.getElementById('chkIn').value.trim();
  if (!q) { myAlert('Sila masukkan UKMPer / No. Matrik atau emel.', true); return; }
  ld(true);
  google.script.run
    .withFailureHandler(function(e){ ld(false); myAlert(e.toString(), true); })
    .withSuccessHandler(function(r){
      ld(false);
      var h = '';
      if (!r.length) {
        h = '<div style="text-align:center;color:#64748b;padding:30px;font-size:14px;">Tiada rekod dijumpai.</div>';
      } else {
        r.forEach(function(x){
          var cls = x.status === 'Dalam Proses' ? 'badge-process'
                  : x.status === 'Dah Boleh Collect' ? 'badge-success'
                  : x.status === 'Ditolak' ? 'badge-reject' : 'badge-pending';
          var extra = x.status === 'Ditolak'
            ? '<br><small style="color:#b91c1c;margin-top:4px;display:block;">Sebab: ' + esc(x.alasan) + '</small>' : '';
          h += '<div style="background:white;padding:16px;border-radius:12px;margin-bottom:10px;border:1px solid #e2e8f0;">' +
               '<div style="font-weight:700;margin-bottom:6px;">' + esc(x.tajuk) + '</div>' +
               '<span class="badge ' + cls + '">' + esc(x.status) + '</span>' + extra + '</div>';
        });
      }
      document.getElementById('res').innerHTML = h;
    })
    .checkUserStatus(q);
}

// ══════════════════════════════════════════
//  ADMIN
// ══════════════════════════════════════════
// Held after a successful login so admin actions can authenticate too.
// updatePosterStatus/deleteRow are reachable over the public JSON API, so
// they must prove admin rights themselves — the password prompt alone is
// only a UI gate, not a lock.
var _adminPass = '';

function loadAdmin() {
  ld(true);
  _adminPass = document.getElementById('pass').value;
  google.script.run
    .withFailureHandler(function(e){ ld(false); myAlert(e.toString(), true); })
    .withSuccessHandler(function(d){
      ld(false);
      if (d === 'UNAUTHORIZED') { myAlert('Kata laluan salah!', true); return; }

      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('dash').style.display     = 'block';

      var h = '<tr><th>#</th><th>Pemohon</th><th>Saiz/Media</th><th>Harga</th><th>Status</th><th>Bayaran</th><th>Tindakan</th></tr>';
      var cT=0, cP=0, cPr=0, cS=0;

      for (var i = 1; i < d.length; i++) {
        cT++;
        var id    = d[i][0];
        var st    = d[i][11];
        var cls   = 'badge-pending';
        if      (st === 'Dalam Proses')      { cls = 'badge-process'; cPr++; }
        else if (st === 'Dah Boleh Collect') { cls = 'badge-success'; cS++; }
        else if (st === 'Ditolak')           { cls = 'badge-reject'; }
        else                                  { cP++; }

        // — Harga (unit × qty = total) —
        var unitP  = parseFloat(d[i][8])  || 0;
        var qty    = parseInt(d[i][16],10) || 1;
        var tot    = (unitP * qty).toFixed(2);

        // — Bayaran column: show Cash badge or Geran + no —
        var method  = d[i][9];
        var noGeran = d[i][14];
        var bayaranCell = '';
        if (String(method).toLowerCase() === 'cash') {
          bayaranCell = '<span style="background:#f0fdf4;color:#15803d;border:1px solid #86efac;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:800;display:inline-block;">💵 Cash</span>';
        } else {
          var gn = (noGeran && noGeran !== '-' && noGeran !== '') ? esc(noGeran) : '-';
          bayaranCell = '<span style="background:#eff6ff;color:#1d4ed8;border:1px solid #93c5fd;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:800;display:inline-block;">🎓 Geran</span>' +
                        '<br><small style="color:#475569;font-size:11px;">' + gn + '</small>';
        }

        var eid = id.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        // — Tajuk: truncate + click-to-reveal —
        var tajukRaw = String(d[i][15] || '');
        var MAXLEN = 48;
        var tajukShort = tajukRaw.length > MAXLEN ? tajukRaw.slice(0, MAXLEN) + '…' : tajukRaw;
        var tajukCell  = '';
        if (tajukRaw.length > MAXLEN) {
          tajukCell = '<div>' +
            '<span class="tajuk-short" onclick="toggleTajuk(' + i + ')" title="Klik untuk lihat tajuk penuh">' + esc(tajukShort) + '</span>' +
            ' <span id="tjt-' + i + '" class="tajuk-toggle" onclick="toggleTajuk(' + i + ')">Lagi...</span>' +
          '</div>' +
          '<div id="tjf-' + i + '" class="tajuk-full">' + esc(tajukRaw) + '</div>';
        } else {
          tajukCell = '<div style="font-size:12px;color:#475569;line-height:1.5;max-width:180px;word-break:break-word;">' + esc(tajukRaw) + '</div>';
        }

        h += '<tr>' +
          '<td style="color:#94a3b8;font-weight:700;">' + i + '</td>' +
          '<td><div style="font-weight:700;">' + esc(d[i][2]) + '</div>' +
              tajukCell +
              '<div style="font-size:10px;color:#94a3b8;margin-top:2px;">' + esc(d[i][1]) + '</div></td>' +
          '<td><b>' + esc(d[i][6]) + '</b><br><small style="color:#64748b;">' + esc(d[i][7]) + ' ×' + esc(d[i][16]) + '</small></td>' +
          '<td><b>RM ' + tot + '</b><br><small style="color:#94a3b8;">@RM' + unitP + ' ×' + qty + '</small></td>' +
          '<td><span class="badge ' + cls + '">' + esc(st) + '</span></td>' +
          '<td>' + bayaranCell + '</td>' +
          '<td>' +
            '<div class="act-group" title="Ubah Status">' +
              '<button class="act-btn act-btn-blue"  onclick="updStatus(\'' + eid + '\',\'Dalam Proses\',\'\')" title="Tanda Dalam Proses">🔄</button>' +
              '<button class="act-btn act-btn-green" onclick="updStatus(\'' + eid + '\',\'Dah Boleh Collect\',\'\')" title="Tanda Siap — Dah Boleh Collect">✅</button>' +
              '<button class="act-btn act-btn-red"   onclick="rejectRow(\'' + eid + '\')" title="Tolak Permohonan">❌</button>' +
              '<span class="act-sep"></span>' +
              '<a href="' + esc(d[i][10]) + '" target="_blank" class="act-btn act-btn-file" title="Lihat Fail Poster">📄</a>' +
              '<button class="act-btn act-btn-del" onclick="delRow(\'' + eid + '\')" title="Padam Rekod Kekal">✕</button>' +
            '</div>' +
          '</td></tr>';
      }

      document.getElementById('tbl').innerHTML = h;
      document.getElementById('cTot').innerText = cT;
      document.getElementById('cP').innerText   = cP;
      document.getElementById('cPr').innerText  = cPr;
      document.getElementById('cS').innerText   = cS;
    })
    .getAdminData(document.getElementById('pass').value);
}

function updStatus(id, status, reason) {
  ld(true);
  google.script.run
    .withFailureHandler(function(e){ ld(false); myAlert(e.toString(), true); })
    .withSuccessHandler(function(res){ ld(false); if (res.startsWith('ERROR')) myAlert(res, true); else loadAdmin(); })
    .updatePosterStatus(id, status, reason, _adminPass);
}

function rejectRow(id) {
  myPrompt('Nyatakan sebab penolakan (wajib):', function(reason){ if (reason) updStatus(id, 'Ditolak', reason); });
}

function delRow(id) {
  myConfirm('Padam rekod ini secara kekal?', function(){
    ld(true);
    google.script.run
      .withFailureHandler(function(e){ ld(false); myAlert(e.toString(), true); })
      .withSuccessHandler(function(res){ ld(false); if (res.startsWith('ERROR')) myAlert(res, true); else loadAdmin(); })
      .deleteRow(id, _adminPass);
  });
}

function toggleTajuk(rowIdx) {
  var full = document.getElementById('tjf-' + rowIdx);
  var link = document.getElementById('tjt-' + rowIdx);
  if (!full) return;
  var isOpen = full.classList.contains('open');
  if (isOpen) { full.classList.remove('open'); if (link) link.innerText = 'Lagi...'; }
  else        { full.classList.add('open');    if (link) link.innerText = 'Tutup'; }
}

function filterTable() {
  var v  = document.getElementById('sAdm').value.toUpperCase();
  var tr = document.getElementById('tbl').getElementsByTagName('tr');
  for (var i = 1; i < tr.length; i++) {
    var td = tr[i].getElementsByTagName('td')[1];
    if (td) tr[i].style.display = td.innerText.toUpperCase().indexOf(v) > -1 ? '' : 'none';
  }
}
</script>
