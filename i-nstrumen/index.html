<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://script.google.com">
    <title>i-Nstrumen | IMEN UKM</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background-color: #f4f7f6; }
        #loading-screen { position: fixed; inset: 0; background: #ffffff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; padding: 24px; }
        .spinner { border: 8px solid #f3f3f3; border-top: 8px solid #005596; border-radius: 50%;
            width: 60px; height: 60px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { margin-top: 20px; font-size: 1.2rem; color: #333; }
        .fallback { margin-top: 18px; }
        .fallback a { display: inline-block; padding: 12px 22px; background: #005596; color: #fff;
            text-decoration: none; border-radius: 8px; font-size: 0.95rem; font-weight: bold; }
        .hint { margin-top: 14px; font-size: 0.85rem; color: #94a3b8; max-width: 320px; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">Membuka i-Nstrumen...</div>
        <div class="fallback"><a id="app-link" href="#">Tekan di sini jika tidak terbuka</a></div>
        <div class="hint">Sila log masuk akaun Google UKM anda jika diminta.</div>
    </div>

    <script>
        // TOP-LEVEL redirect (NOT an iframe) — this is what avoids the
        // "cannot be embedded" block AND lets Google's login page load normally.
        var APP = "https://script.google.com/macros/s/AKfycbw1PrhjSzHsd__rxbEcXZp4iyF4v9e41pVYg1j7ewo6ocnPNw3CsdTt-j7UFb0NM-0l/exec";
        // Always pin the primary Google account (multi-account Drive-access workaround),
        // then append any ?lab=...&view=... deep-link params as &extra.
        var extra  = window.location.search ? window.location.search.replace(/^\?/, '&') : "";
        var target = APP + "?authuser=0" + extra;
        document.getElementById('app-link').href = target;
        window.location.replace(target);
    </script>
</body>
</html>
