    <script>
    // ── GITHUB-PAGES MODE SHIM ────────────────────────────────────────────────
    // When this exact file is served from GitHub Pages, google.script.run does
    // not exist (only Google's own sandbox provides it). This shim recreates it
    // on top of fetch() calls to the Apps Script JSON API (doPost in Code.gs),
    // so every existing google.script.run call in this file works UNCHANGED in
    // both environments. On script.google.com (and inside the APK WebView) the
    // native google.script.run is present and this shim does nothing.
    (function () {
        if (window.google && window.google.script && window.google.script.run) return; // native GAS

        var API_URL = 'https://script.google.com/macros/s/AKfycbw1PrhjSzHsd__rxbEcXZp4iyF4v9e41pVYg1j7ewo6ocnPNw3CsdTt-j7UFb0NM-0l/exec';
        var API_FNS = ['getInitialData', 'handleFrontendAction', 'fetchUpdates'];

        function makeRunner() {
            var onOk  = function () {};
            var onErr = function (e) { console.error('[i-Nstrumen API] ', e); };
            var runner = {
                withSuccessHandler: function (fn) { if (fn) onOk  = fn; return runner; },
                withFailureHandler: function (fn) { if (fn) onErr = fn; return runner; },
                withUserObject:     function ()   { return runner; }
            };
            API_FNS.forEach(function (name) {
                runner[name] = function () {
                    var args = Array.prototype.slice.call(arguments);
                    fetch(API_URL, {
                        method:  'POST',
                        // text/plain keeps this a CORS "simple request" (no preflight,
                        // which Apps Script cannot answer). doPost JSON-parses the body.
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body:    JSON.stringify({ fn: name, args: args })
                    })
                    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
                    .then(function (data) {
                        if (data && data.ok) onOk(data.result);
                        else onErr(new Error((data && data.error) || 'Unknown API error'));
                    })
                    .catch(function (e) { onErr(e); });
                };
            });
            return runner;
        }

        window.google = window.google || {};
        window.google.script = window.google.script || {};
        // Getter → every `google.script.run.…` expression gets a FRESH runner,
        // so two in-flight calls can never share/overwrite each other's handlers.
        Object.defineProperty(window.google.script, 'run', { get: makeRunner });

        // ── EARLY FETCH ──────────────────────────────────────────────────────
        // Kick off the slow getInitialData call NOW, so the 2-3s backend work
        // overlaps with parsing the rest of this file and the CDN scripts below
        // instead of running after them. initSystem() consumes this promise.
        // (Only runs in GitHub Pages mode — native GAS returned early above.)
        window.__initialDataPromise = fetch(API_URL, {
            method:  'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body:    JSON.stringify({ fn: 'getInitialData', args: [] })
        }).then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
        // Mark rejections as handled until initSystem attaches the real handlers
        // (prevents console "unhandled rejection" noise; the stored promise still
        // rejects normally for its consumer).
        window.__initialDataPromise.catch(function () {});
    })();
    </script>

    <script>
        // --- CONSTANTS & CONFIG ---
        const MAINTENANCE_PIN = "023775";
        
        // Initial Default Labs (Can be edited in state)
        const INITIAL_LAB_LIST = [
            "Artificial Kidney", "Biosensor & Lab-On-Chip", "Cleanroom", "MEMS/NEMS", 
            "Microfluidics", "MINES", "MIPAC", "Nanophotonics", "OPEL", 
            "Quantum Electronics", "Carbon Electronics", "Semiconductor", "Thin Film"
        ];

// --- STATE MANAGEMENT ---
        let state = {
            isLoading: true,
            currentView: 'Home', 
            selectedLab: null,
            isLockedMode: false,
            adminTab: 'pending',
            reportTab: 'monthly',
            calendarViewDate: new Date(),
            
            labs: [], 
            systemConfig: {
                officialEmail: 'loading...',
                coordinators: [],
                techStaff: []
            },

            adminAuthenticated: false,
            picEmail: null,
            picName: null,
            picLabs: [],
            picSelectedLab: 'All',

            adminHistoryFilter: 'All',
            adminHistoryMonth: new Date().toISOString().slice(0, 7),
            equipmentSearch: '',
            labSearch: '',
            lastArchive: null,

            tempProcessConfig: [], 
            tempMaterialConfig: [],
            reportResults: null,
            reportSelectedLab: null,
            reportSelectedEq: 'All',
            reportSelectedYear: new Date().getFullYear(),
            reportSelectedMonth: new Date().getMonth(),

            logs: [],
            equipment: [],
            bookings: [],
            activityLogView:        'week', // 'week' | 'month' | 'year'
            weeklyActivityOffset:    0,     // 0 = current week,  -1 = prev week …
            monthlyActivityOffset:   0,     // 0 = current month, -1 = prev month …
            yearlyActivityOffset:    0,     // 0 = current year,  -1 = prev year …
            bookingScheduleOffset:   0,     // 0 = current month, -1 = prev month …

            demoMode: false,                // PRESENTATION MODE: unlocks all gated views,
                                            // but BLOCKS every database write. Session-only
                                            // (resets on reload). Enabled via header toggle.
        };

        // --- HELPER UTILS ---
        const getById = (id) => document.getElementById(id);

        // ── LAZY PDF LIBRARY LOADER ─────────────────────────────────────────
        // pdfmake + its ~1MB embedded-font blob used to block first paint; they
        // now load on the first PDF export only. Memoized — later exports reuse
        // the already-loaded library instantly.
        let _pdfMakePromise = null;
        function ensurePdfMake() {
            if (window.pdfMake && window.pdfMake.vfs) return Promise.resolve();
            if (_pdfMakePromise) return _pdfMakePromise;
            const loadScript = (src) => new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = src;
                s.onload = resolve;
                s.onerror = () => reject(new Error('Failed to load ' + src));
                document.head.appendChild(s);
            });
            showToast('Preparing PDF engine…', 'info');
            _pdfMakePromise = loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.9/pdfmake.min.js')
                .then(() => loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.9/vfs_fonts.js'))
                .catch(e => { _pdfMakePromise = null; throw e; }); // allow retry after a network failure
            return _pdfMakePromise;
        }

        function checkUrlParams() {
            // Priority: Server Injected Params -> Client URL Params
            // This ensures links work even if iframe strips the URL
            let labParam = (typeof SERVER_PARAMS !== 'undefined' && SERVER_PARAMS.lab) ? SERVER_PARAMS.lab : new URLSearchParams(window.location.search).get('lab');
            let viewParam = (typeof SERVER_PARAMS !== 'undefined' && SERVER_PARAMS.view) ? SERVER_PARAMS.view : new URLSearchParams(window.location.search).get('view');

            // Decode if necessary (sometimes URLs come in encoded)
            if (labParam) labParam = decodeURIComponent(labParam);

            if (labParam && state.labs.includes(labParam)) {
                state.selectedLab = labParam;
                state.isLockedMode = true;
                if (viewParam === 'admin') state.currentView = 'Admin';
                else if (viewParam === 'monitoring') state.currentView = 'Monitoring';
                else state.currentView = 'LabView';
            }
        }

        function getCoordinatorForLab(labName) {
            return state.systemConfig.coordinators.find(c => c.lab === labName);
        }

        // PIC BYPASS — returns true if the given email matches any lab coordinator
        function isPicEmail(email) {
            if (!email) return false;
            const normalized = email.trim().toLowerCase();
            return state.systemConfig.coordinators.some(c => c.email && c.email.trim().toLowerCase() === normalized);
        }

        // Called live as the user types their email in the booking form
        function onBookingEmailInput(input) {
            const email = input.value.trim();
            const dateInput = document.querySelector('#booking-form input[name="date"]');
            const hintEl  = document.getElementById('booking-date-hint');
            const badge   = document.getElementById('pic-bypass-badge');
            if (!dateInput) return;

            if (isPicEmail(email)) {
                // PIC detected — unlock date to today
                dateInput.min = localDayStr(new Date());
                if (hintEl)  hintEl.classList.add('hidden');
                if (badge)   badge.classList.remove('hidden');
            } else {
                // Regular user — restore 2-day minimum
                const minDateObj = new Date();
                minDateObj.setDate(minDateObj.getDate() + 2);
                dateInput.min = localDayStr(minDateObj);
                if (hintEl)  hintEl.classList.remove('hidden');
                if (badge)   badge.classList.add('hidden');
            }
        }

        function getCalibrationStatus(dateStr) {
            if (!dateStr) return { diffDays: 0, color: 'text-slate-400 bg-slate-50 border-slate-200', percent: 0, statusText: 'Not Set' };
            
            const now = new Date();
            const due = new Date(dateStr);
            const diffTime = due - now;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            // Assume 6 month cycle for bar visual (approx 180 days)
            const cycle = 180;
            const percent = Math.max(0, Math.min(100, (diffDays / cycle) * 100));

            if (diffDays < 0) return { diffDays, color: 'text-red-600 bg-red-50 border-red-100', barColor: 'bg-red-500', percent: 100, statusText: `Expired (${Math.abs(diffDays)} days)` };
            if (diffDays < 30) return { diffDays, color: 'text-amber-600 bg-amber-50 border-amber-100', barColor: 'bg-amber-500', percent: percent, statusText: `${diffDays} days left` };
            return { diffDays, color: 'text-emerald-600 bg-emerald-50 border-emerald-100', barColor: 'bg-emerald-500', percent: percent, statusText: `${diffDays} days left` };
        }

        // Convert a duration label (e.g. "Full Day", "2 Hours", "8am-1pm") into hours.
        function _durationToHours(d) {
            if (!d) return 0;
            if (d.includes('Full') || d === '1 Day') return 9; // 8am-5pm
            if (d === '2 Days') return 18;
            if (d === '8am-1pm') return 5;
            if (d === '2pm-5pm' || d === '1pm-5pm') return 3;
            return parseInt(d) || 0; // e.g. "1 Hour", "2 Hours", "4 Hours"
        }

        function getTotalUsageHours(eqName) {
            let total = 0;
            state.logs.forEach(l => {
                if(l.equipmentName === eqName && l.action === 'Usage' && l.duration) {
                    total += _durationToHours(l.duration);
                }
            });
            return total;
        }

        

        function goBack() {
            if (state.isLockedMode) return;
            if (state.currentView === 'LabView' && state.selectedLab) {
                state.selectedLab = null;
                renderApp();
            } else {
                setView('Home');
            }
        }

        function formatDateTime(isoString) {
            if (!isoString) return '-';
            const date = new Date(isoString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
		
		// --- TIME HELPERS ---

        // LOCAL calendar date (YYYY-MM-DD) for any date-ish value.
        // Never use toISOString() for day-matching — it converts to UTC (−8h for
        // Malaysia), shifting midnight dates / early-morning check-ins to the
        // previous day and causing false "no check-in" flags.
        function localDayStr(v) {
            const d = (v instanceof Date) ? v : new Date(v);
            if (isNaN(d.getTime())) return String(v || '').split('T')[0];
            const p = n => String(n).padStart(2, '0');
            return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
        }

        // DISPLAY-ONLY: pretty booking date, e.g. "Wed, 1 Jul 2026".
        // Parses the Y-M-D digits directly (no Date-string parsing → no timezone
        // shift) and never mutates the underlying b.date value that the
        // conflict-check / calendar / no-show logic depend on.
        function formatBookingDate(dateStr) {
            const raw = String(dateStr || '').split('T')[0];
            const [y, m, d] = raw.split('-').map(Number);
            if (!y || !m || !d) return raw || '-';
            return new Date(y, m - 1, d).toLocaleDateString([], { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
        }

        // Does log entry l belong to the person who made booking b?
        // Email match first (stable across name-spelling differences), then
        // normalized name fallback. MUST stay in sync with the same logic in
        // Code.gs sendWeeklyNoShowReminder, so on-screen no-show rows and the
        // Friday reminder emails never disagree.
        function _sameBookingUser(l, b) {
            const n = s => (s || '').toString().trim().toLowerCase();
            const be = n(b.userEmail), le = n(l.userEmail);
            if (be && le && be === le) return true;
            const bn = n(b.userName), ln = n(l.userName);
            return !!bn && bn === ln;
        }

        function getDurationMs(durationStr) {
            if (!durationStr) return 0;
            if (durationStr === 'Full Day') return 8 * 60 * 60 * 1000;
            const hours = parseInt(durationStr); 
            return (isNaN(hours) ? 0 : hours) * 60 * 60 * 1000;
        }

        function getSessionEndTime(timestamp, durationStr) {
            const start = new Date(timestamp);
            if (durationStr === '1 Day') {
                const end = new Date(start);
                end.setHours(17, 0, 0, 0); 
                return end;
            }
            if (durationStr === '2 Days') {
                const end = new Date(start);
                end.setDate(end.getDate() + 1);
                end.setHours(17, 0, 0, 0);
                return end;
            }
            const ms = getDurationMs(durationStr);
            return new Date(start.getTime() + ms);
        }

        function calculateUsageProgress(startTime, durationStr) {
            if (!startTime || !durationStr) return { percent: 0, text: '' };
            const now = new Date();
            const start = new Date(startTime);
            const end = getSessionEndTime(startTime, durationStr);
            const totalMs = end - start;
            const elapsedMs = now - start;
            if (now >= end) return { percent: 100, text: 'Finished' };
            let percent = Math.min(100, Math.max(0, (elapsedMs / totalMs) * 100));
            const remainingMs = end - now;
            const remainingMins = Math.ceil(remainingMs / 60000);
            let text = '';
            if (remainingMins > 60) {
                const h = Math.floor(remainingMins / 60);
                const m = remainingMins % 60;
                text = `${h}h ${m}m left`;
            } else {
                text = `${remainingMins}m left`;
            }
            return { percent, text };
        }

        // --- TOAST & DIALOG SYSTEM ---
        function showToast(message, type = 'success') {
            const container = getById('toast-container');
            const toast = document.createElement('div');
            
            let bgClass = 'bg-slate-800';
            let icon = 'ph-check-circle';
            
            if (type === 'success') { bgClass = 'bg-emerald-600'; icon = 'ph-check-circle'; }
            if (type === 'error') { bgClass = 'bg-red-600'; icon = 'ph-warning-circle'; }
            if (type === 'info') { bgClass = 'bg-brand-600'; icon = 'ph-info'; }

            toast.className = `pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-lg text-white shadow-lg shadow-black/20 text-sm font-medium animate-slide-in ${bgClass}`;
            toast.innerHTML = `<i class="ph-fill ${icon} text-lg"></i> <span>${message}</span>`;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove('animate-slide-in');
                toast.classList.add('animate-fade-out');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Builds a clean "download" dialog body: a big clickable download icon that
        // saves the file, with a fallback hint. Returned flattened to a single line so
        // showDialog's newline→<br> pass can never inject a <br> inside a tag.
        function buildDownloadDialog(dataUri, filename, readyMsg) {
            const html = `
                <div class="text-center">
                    <div class="mb-5 text-emerald-600 font-medium text-sm">${readyMsg}</div>
                    <a href="${dataUri}" download="${filename}" title="Click to save" class="group inline-flex flex-col items-center gap-3 no-underline">
                        <span class="w-20 h-20 rounded-full bg-indigo-600 group-hover:bg-indigo-700 text-white flex items-center justify-center shadow-lg shadow-indigo-600/30 transition-all duration-200 group-hover:scale-105"><i class="ph-bold ph-download-simple text-4xl"></i></span>
                        <span class="text-sm font-bold text-indigo-700 group-hover:text-indigo-800">Click to Save File</span>
                    </a>
                    <p class="mt-4 text-xs text-slate-400">Download didn't start? Right-click the icon → "Save Link As…"</p>
                </div>`;
            return html.replace(/\s*\n\s*/g, ' ');   // flatten — no raw newlines reach showDialog
        }

        function showDialog(message, type = 'alert', onConfirm = null) {
            const overlay = getById('dialog-overlay');
            const box = getById('dialog-box');
            const title = getById('dialog-title');
            const msg = getById('dialog-message');
            const actions = getById('dialog-actions');
            const inputContainer = getById('dialog-input-container');
            const input = getById('dialog-input');

            msg.innerHTML = message.replace(/\n/g, '<br>');
            actions.innerHTML = '';
            inputContainer.classList.add('hidden');
            input.value = '';

            if (type === 'confirm') {
                title.innerText = 'Confirm Action';
                const cancelBtn = createBtn('Cancel', closeDialog, 'text-slate-600 hover:bg-slate-50 border');
                const confirmBtn = createBtn('Proceed', () => { closeDialog(); if(onConfirm) onConfirm(); }, 'bg-brand-600 text-white hover:bg-brand-700');
                actions.append(cancelBtn, confirmBtn);
            } else if (type === 'prompt') {
                title.innerText = 'Action Required';
                inputContainer.classList.remove('hidden');
                const cancelBtn = createBtn('Cancel', closeDialog, 'text-slate-600 hover:bg-slate-50 border');
                const submitBtn = createBtn('Submit', () => { 
                    const val = input.value;
                    if(!val) return showToast("Input required", "error");
                    closeDialog(); 
                    if(onConfirm) onConfirm(val); 
                }, 'bg-red-600 text-white hover:bg-red-700');
                actions.append(cancelBtn, submitBtn);
            } else {
                title.innerText = 'System Notification';
                const okBtn = createBtn('Okay', closeDialog, 'bg-slate-800 text-white hover:bg-slate-700 w-full');
                actions.append(okBtn);
            }

            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            requestAnimationFrame(() => {
                overlay.classList.remove('opacity-0');
                box.classList.remove('scale-95'); box.classList.add('scale-100');
            });
        }

		function exportEquipmentCSV() {
            // 1. Filter Data (match the current view)
            let data = state.selectedLab
                ? state.equipment.filter(e => e.lab === state.selectedLab)
                : state.equipment;
            if (state.equipmentSearch) {
                const term = state.equipmentSearch.toLowerCase();
                data = data.filter(e =>
                    (e.name || '').toLowerCase().includes(term) ||
                    (e.lab  || '').toLowerCase().includes(term)
                );
            }

            if (data.length === 0) {
                showToast("No equipment to export", "error");
                return;
            }

            // 2. Define full headers
            const headers = [
                "Equipment Name", "Asset ID", "Lab", "Status",
                "Access Mode", "Tracking Unit",
                "Calibration Due", "Maintenance Reason",
                "Process Capabilities", "Description"
            ];

            // Helper: CSV-safe cell (escape double-quotes, wrap in quotes)
            const safe = v => `"${(v || '').toString().replace(/"/g, '""')}"`;

            // 3. Map data rows — include full description + capabilities
            const rows = data.map(e => {
                const caps = Array.isArray(e.processCapabilities)
                    ? e.processCapabilities.map(c => c.name || '').filter(Boolean).join('; ')
                    : (e.processCapabilities || '');
                return [
                    safe(e.name),
                    safe(e.assetId || '-'),
                    safe(e.lab),
                    safe(e.status),
                    safe(e.accessMode),
                    safe(e.trackingUnit),
                    safe(e.calibrationDate || '-'),
                    safe(e.maintenanceReason || '-'),
                    safe(caps),
                    safe(e.description)
                ].join(",");
            });

            // 4. Build data URI and show download dialog
            const csvContent = [headers.join(","), ...rows].join("\n");
            const filename = `IMEN_Inventory_${localDayStr(new Date())}.csv`;
            const dataUri = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csvContent);

            showDialog(buildDownloadDialog(dataUri, filename, `Equipment inventory ready — ${data.length} item(s)`), 'alert');
        }

                <div class="sticky bottom-0 bg-slate-100 pt-2 pb-1">
                    <div class="flex gap-2">
                        <input type="text" id="chat-input"
                            placeholder="e.g. I need to deposit gold on glass substrate…"
                            autocomplete="off"
                            onkeydown="if(event.key==='Enter')sendChatMessage()"
                            class="flex-1 pl-4 pr-4 py-3 rounded-2xl border border-slate-200 bg-white focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 text-sm text-slate-700 placeholder-slate-400 outline-none transition-all shadow-sm">
                        <button onclick="sendChatMessage()" id="chat-send-btn"
                            class="w-12 h-12 rounded-2xl bg-indigo-600 hover:bg-indigo-500 text-white flex items-center justify-center shadow-lg shadow-indigo-200 transition active:scale-95 flex-shrink-0">
                            <i class="ph-bold ph-paper-plane-tilt text-lg"></i>
                        </button>
                    </div>
                    <p class="text-center text-[9px] text-slate-400 mt-1.5">AI suggestions are for reference — always verify with lab PIC before booking.</p>
                </div>
            </div>`;
        }

        function renderLabSelector() {
            const tiles = state.labs.map(lab => `
                <div onclick="selectLab('${lab}')" class="p-4 bg-slate-50 border border-slate-100 rounded-xl hover:bg-white hover:shadow-lg hover:border-blue-200 transition cursor-pointer flex items-center justify-between group">
                    <span class="font-medium text-slate-700 group-hover:text-blue-700">${lab}</span>
                    <i class="ph-bold ph-caret-right text-slate-300 group-hover:text-blue-500"></i>
                </div>
            `).join('');

            return `
                <div class="fade-in max-w-4xl mx-auto">
                    <div class="text-center mb-8">
                        <h2 class="text-2xl font-bold text-slate-800">Select Laboratory</h2>
                        <p class="text-slate-500">Choose a facility to view equipment and log activities.</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                        ${tiles}
                    </div>
                </div>
            `;
        }

        function renderLabPortal() {
            // Apply Search Filter
            let filteredEq = state.equipment.filter(e => e.lab === state.selectedLab);
            if (state.labSearch) {
                const term = state.labSearch.toLowerCase();
                filteredEq = filteredEq.filter(e => e.name.toLowerCase().includes(term));
            }
            
            // iOS Style Search Bar - Optimized for Mobile
            const searchBarHtml = `
                <div class="relative w-full md:w-72 group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="ph-bold ph-magnifying-glass text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                    </div>
                    <input type="text" placeholder="Search equipment..." value="${state.labSearch}" oninput="handleSearch(this.value, 'lab')"
                        class="w-full pl-11 pr-4 py-3 sm:py-2.5 bg-white/80 backdrop-blur-sm border border-slate-200 rounded-2xl text-base sm:text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200/50 transition-all shadow-sm">
                </div>
            `;

            const cards = filteredEq.map(eq => {
                const isMaintenance = eq.status === 'Maintenance';
                const isAttention   = eq.status === 'Attention';
                const maintInfo     = parseMaintenanceInfo(eq);

                // Per-process status aggregates (new system)
                const _caps = Array.isArray(eq.processCapabilities) ? eq.processCapabilities : [];
                const _hasProcMaint    = _caps.some(c => c.status === 'maintenance');
                const _hasProcDisabled = _caps.some(c => c.status === 'disabled');
                const _hasProcAttention= _caps.some(c => c.status === 'attention');
                // isPartialMaintenance: backward-compat JSON OR new per-process flags
                const isPartialMaintenance = !isMaintenance && (maintInfo.isPartial || _hasProcMaint);
                const hasDisabledProcesses = !isMaintenance && _hasProcDisabled && !_hasProcMaint;
                const hasAttentionProcesses= !isMaintenance && _hasProcAttention && !_hasProcMaint;

                // Active session Check
                const recentLog = state.logs.find(l => {
                    if (l.equipmentId !== eq.id || l.action !== 'Usage' || l.sessionEnded) return false;
                    const endTime = getSessionEndTime(l.timestamp, l.duration);
                    return new Date() < endTime;
                });
                const isInUse = !!recentLog;

                let statusBadge = '';

                // Responsive Badges — priority: full maint > partial maint > attention > disabled > in-use > active
                if (isMaintenance) {
                    statusBadge = `<div class="absolute top-3 right-3 sm:top-4 sm:right-4 px-2.5 py-1 rounded-full text-[10px] font-bold bg-red-500/90 text-white backdrop-blur-md shadow-lg border border-white/20">Maintenance</div>`;
                } else if (isPartialMaintenance) {
                    const mCnt = _caps.filter(c => c.status === 'maintenance').length || (maintInfo.processes || []).length;
                    statusBadge = `<div class="absolute top-3 right-3 sm:top-4 sm:right-4 px-2.5 py-1 rounded-full text-[10px] font-bold bg-orange-500/90 text-white backdrop-blur-md shadow-lg border border-white/20 flex items-center gap-1"><i class="ph-fill ph-warning"></i> ${mCnt} Process${mCnt!==1?'es':''} Down</div>`;
                } else if (isAttention || hasAttentionProcesses) {
                    statusBadge = `<div class="absolute top-3 right-3 sm:top-4 sm:right-4 px-2.5 py-1 rounded-full text-[10px] font-bold bg-amber-500/90 text-white backdrop-blur-md shadow-lg border border-white/20 flex items-center gap-1"><i class="ph-fill ph-warning"></i> Attention</div>`;
                } else if (hasDisabledProcesses) {
                    const dCnt = _caps.filter(c => c.status === 'disabled').length;
                    statusBadge = `<div class="absolute top-3 right-3 sm:top-4 sm:right-4 px-2.5 py-1 rounded-full text-[10px] font-bold bg-slate-500/80 text-white backdrop-blur-md shadow-lg border border-white/20 flex items-center gap-1"><i class="ph-fill ph-prohibit"></i> ${dCnt} Unavailable</div>`;
                } else if (isInUse) {
                    statusBadge = `<div class="absolute top-3 right-3 sm:top-4 sm:right-4 px-2.5 py-1 rounded-full text-[10px] font-bold bg-emerald-500/90 text-white backdrop-blur-md shadow-lg border border-white/20 flex items-center gap-2"><span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-white"></span></span> In Use</div>`;
                } else {
                    statusBadge = `<div class="absolute top-3 right-3 sm:top-4 sm:right-4 px-2.5 py-1 rounded-full text-[10px] font-bold bg-black/30 text-white backdrop-blur-md shadow-lg border border-white/10">${eq.status}</div>`;
                }
                
                const mode = eq.accessMode || 'both';
                const effectivelyDown = isMaintenance || isFullyDown(eq);
                const showStart = !effectivelyDown && !isInUse;
                const showBook = !effectivelyDown && (mode === 'booking' || mode === 'both');
                
                return `
                <div class="bg-white rounded-2xl sm:rounded-[2rem] border border-slate-200 shadow-md shadow-slate-300/50 overflow-hidden hover:shadow-xl hover:shadow-blue-500/10 transition-all duration-300 flex flex-row sm:flex-col items-stretch h-full group hover:-translate-y-1 relative">
                    <div class="relative w-28 shrink-0 sm:w-auto sm:shrink h-auto sm:h-56 xl:h-40 2xl:h-36 bg-gradient-to-br from-slate-100 to-slate-200 overflow-hidden">
                        <div class="absolute inset-0 flex items-center justify-center text-slate-300">
                            <i class="ph-duotone ph-image text-4xl sm:text-6xl"></i>
                        </div>
                        ${eq.imageUrl ? `<img src="${eq.imageUrl}" alt="" loading="lazy" onerror="this.style.display='none'" class="relative w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">` : ''}
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900/60 via-transparent to-transparent"></div>
                        ${statusBadge}
                        <div class="absolute bottom-2 left-2 sm:bottom-5 sm:left-6">
                             <p class="text-white/90 text-[9px] sm:text-xs font-mono tracking-wider bg-black/30 backdrop-blur-sm px-1.5 py-0.5 sm:px-2 sm:py-1 rounded-md sm:rounded-lg border border-white/10 w-fit">${eq.assetId}</p>
                        </div>
                    </div>

                    <div class="p-3 sm:p-6 xl:p-4 flex-grow flex flex-col min-w-0">
                        <div class="mb-2 sm:mb-4">
                            <h3 class="text-sm sm:text-lg xl:text-base font-bold text-slate-800 mb-1 leading-tight">${eq.name}</h3>

                            <!-- Collapsible description (hidden on mobile list view) -->
                            <div id="eq-desc-wrap-${eq.id}"
                                 data-expanded="0"
                                 class="hidden sm:block overflow-hidden transition-all duration-300 ease-in-out"
                                 style="max-height:4rem">
                                <p class="text-[11px] text-slate-500 leading-relaxed">${eq.description || '—'}</p>
                            </div>
                            ${eq.description && eq.description.length > 120 ? `
                            <button onclick="toggleEquipDesc('${eq.id}')"
                                class="mt-1 hidden sm:flex items-center gap-0.5 text-[10px] font-semibold text-indigo-500 hover:text-indigo-700 transition">
                                <span id="eq-desc-btn-${eq.id}">Show details</span>
                                <i id="eq-desc-icon-${eq.id}" class="ph-bold ph-caret-down text-[9px] transition-transform duration-300"></i>
                            </button>` : ''}
                        </div>
                        
                        ${isInUse ? `
                            <div class="bg-emerald-50/50 p-3 sm:p-4 rounded-2xl border border-emerald-100 mb-4 sm:mb-5">
                                <div class="flex items-center gap-2 text-xs text-emerald-800 font-bold mb-1"><div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div> Current Session</div>
                                <div class="text-xs text-emerald-600 font-medium">${recentLog.userName}</div>
                                <div class="text-[10px] text-emerald-500 mt-0.5">Started: ${new Date(recentLog.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                            </div>
                        ` : ''}

                        ${isMaintenance ? `
                            <div class="bg-red-50/50 p-3 sm:p-4 rounded-2xl border border-red-100 mb-4 sm:mb-5">
                                <div class="flex items-center gap-2 text-red-800 text-xs font-bold mb-1"><i class="ph-fill ph-warning"></i> Equipment Down</div>
                                <p class="text-red-600 text-xs">${eq.maintenanceReason || 'Under repair'}</p>
                            </div>
                        ` : isPartialMaintenance ? `
                            <div class="bg-orange-50/70 p-3 sm:p-4 rounded-2xl border border-orange-100 mb-4 sm:mb-5">
                                <div class="flex items-center gap-2 text-orange-800 text-xs font-bold mb-1"><i class="ph-fill ph-warning"></i> Partial Maintenance</div>
                                <p class="text-orange-700 text-xs mb-1.5">${maintInfo.reason || 'Some processes under repair'}</p>
                                <div class="flex flex-wrap gap-1">
                                    ${maintInfo.processes.map(p => `<span class="px-1.5 py-0.5 bg-red-100 text-red-700 text-[9px] font-bold rounded border border-red-200"><i class="ph-fill ph-wrench"></i> ${p}</span>`).join('')}
                                </div>
                                ${getAvailableProcesses(eq).length > 0 ? `<p class="text-orange-600 text-[10px] mt-1.5 font-medium">✓ Available: ${getAvailableProcesses(eq).join(', ')}</p>` : ''}
                            </div>
                        ` : ''}

                        <div class="flex flex-wrap items-stretch gap-2 sm:gap-3 mt-auto">
                            ${showStart ? `
                            <button onclick="openModal('${eq.id}', 'Usage')" class="grow basis-0 min-w-0 py-2 sm:py-3 px-2.5 sm:px-4 xl:px-2 rounded-lg sm:rounded-xl bg-blue-600 text-white font-semibold text-xs sm:text-sm xl:text-xs whitespace-nowrap hover:bg-blue-700 transition shadow-lg shadow-blue-200/50 active:scale-95 flex items-center justify-center gap-1.5">
                                <i class="ph-bold ph-play"></i> ${mode === 'booking' ? 'Check-in' : 'Start'}
                            </button>
                            ` : ''}

                            ${showBook ? `
                            <button onclick="openModal('${eq.id}', 'Book')" class="grow basis-0 min-w-0 py-2 sm:py-3 px-2.5 sm:px-4 xl:px-2 rounded-lg sm:rounded-xl bg-slate-50 border border-slate-200 text-slate-700 font-semibold text-xs sm:text-sm xl:text-xs whitespace-nowrap hover:bg-white hover:border-slate-300 transition active:scale-95">
                                Book
                            </button>
                            ` : ''}

                            <button onclick="openModal('${eq.id}', 'Report')" title="Report Issue" aria-label="Report Issue" class="basis-auto sm:basis-full grow-0 py-2 sm:py-3 px-2.5 sm:px-4 rounded-lg sm:rounded-xl bg-white border border-slate-200 text-slate-500 font-semibold text-xs sm:text-sm xl:text-xs whitespace-nowrap hover:text-red-600 hover:bg-red-50 hover:border-red-100 transition active:scale-95 flex items-center justify-center gap-1.5">
                                <i class="ph-bold ph-warning-circle"></i> <span class="hidden sm:inline">Report Issue</span>
                            </button>

                            <button onclick="openCancelBooking('${eq.id}')" title="Cancel Booking" aria-label="Cancel Booking" class="basis-auto sm:basis-full grow-0 py-2 sm:py-3 px-2.5 sm:px-4 rounded-lg sm:rounded-xl bg-white border border-slate-200 text-slate-500 font-semibold text-xs sm:text-sm xl:text-xs whitespace-nowrap hover:text-orange-600 hover:bg-orange-50 hover:border-orange-100 transition active:scale-95 flex items-center justify-center gap-1.5">
                                <i class="ph-bold ph-x-circle"></i> <span class="hidden sm:inline">Cancel Booking</span>
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');

            // --- ACTIVITY LOG LOGIC (Week / Month / Year) ---
            const _actView = state.activityLogView || 'week';

            // ── Week range (Mon–Sun) ──
            const _wkNow = new Date();
            const _wkDay = _wkNow.getDay();
            const _wkStart = new Date(_wkNow);
            _wkStart.setDate(_wkNow.getDate() - ((_wkDay + 6) % 7) + state.weeklyActivityOffset * 7);
            _wkStart.setHours(0, 0, 0, 0);
            const _wkEnd = new Date(_wkStart);
            _wkEnd.setDate(_wkStart.getDate() + 6);
            _wkEnd.setHours(23, 59, 59, 999);
            const _isCurrentWeek = state.weeklyActivityOffset === 0;
            const _weekLabel = (() => {
                const fmt  = d => d.toLocaleDateString([], { month: 'short', day: 'numeric' });
                const fmtY = d => d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
                return `${fmt(_wkStart)} – ${fmtY(_wkEnd)}`;
            })();

            // ── Month range (1st–last day) ──
            const _moTarget = new Date(new Date().getFullYear(), new Date().getMonth() + state.monthlyActivityOffset, 1);
            const _moStart  = new Date(_moTarget.getFullYear(), _moTarget.getMonth(), 1);
            _moStart.setHours(0, 0, 0, 0);
            const _moEnd    = new Date(_moTarget.getFullYear(), _moTarget.getMonth() + 1, 0);
            _moEnd.setHours(23, 59, 59, 999);
            const _isCurrentMonth = state.monthlyActivityOffset === 0;
            const _monthLabel = _moStart.toLocaleDateString([], { month: 'long', year: 'numeric' });

            // ── Year range (Jan 1 – Dec 31) ──
            const _yrTarget = new Date().getFullYear() + state.yearlyActivityOffset;
            const _yrStart  = new Date(_yrTarget, 0, 1);  _yrStart.setHours(0, 0, 0, 0);
            const _yrEnd    = new Date(_yrTarget, 11, 31); _yrEnd.setHours(23, 59, 59, 999);
            const _isCurrentYear = state.yearlyActivityOffset === 0;
            const _yearLabel = String(_yrTarget);

            // ── Active range ──
            const _logStart = _actView === 'month' ? _moStart : _actView === 'year' ? _yrStart : _wkStart;
            const _logEnd   = _actView === 'month' ? _moEnd   : _actView === 'year' ? _yrEnd   : _wkEnd;

            const labLogs = state.logs
                .filter(l =>
                    l.lab === state.selectedLab &&
                    l.action !== 'Flagged' &&
                    new Date(l.timestamp) >= _logStart &&
                    new Date(l.timestamp) <= _logEnd
                )
                .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            // --- NO-SHOW BOOKING DETECTION ---
            // Find approved bookings whose slot has ended but the user never checked in
            const _nowTs = new Date();
            const _noShowBookings = state.bookings.filter(b => {
                if (b.lab !== state.selectedLab || b.status !== 'Approved') return false;
                const bDateStr = b.date.split('T')[0];
                const [byr, bmo, bdy] = bDateStr.split('-').map(Number);
                const bDate = new Date(byr, bmo - 1, bdy);
                // Must fall inside the active period
                if (bDate < _logStart || bDate > _logEnd) return false;
                // Slot must have already ended
                const [, slotEndH] = getSlotHours(b.duration);
                const slotEndTime = new Date(byr, bmo - 1, bdy, slotEndH, 0, 0, 0);
                if (_nowTs <= slotEndTime) return false;
                // Check if ANY matching log entry exists for that user + equipment + date
                const checkedIn = state.logs.some(l =>
                    l.equipmentName === b.equipmentName &&
                    l.lab === b.lab &&
                    _sameBookingUser(l, b) &&
                    localDayStr(l.timestamp) === bDateStr &&
                    (l.action === 'Usage' || l.action === 'Check-in' || l.action === 'Booking')
                );
                return !checkedIn;
            });

            // Merge logs + no-shows into one sorted list
            const _allActivityRows = [
                ...labLogs.map(l => ({ ...l, _rowType: 'log' })),
                ..._noShowBookings.map(b => {
                    const bDateStr = b.date.split('T')[0];
                    const [, slotEndH] = getSlotHours(b.duration);
                    // Timestamp at slot-end so sorting places it correctly in chronology
                    const ts = new Date(bDateStr + 'T' + String(slotEndH).padStart(2,'0') + ':00:00');
                    return {
                        _rowType:      'noshow',
                        userName:      b.userName,
                        equipmentName: b.equipmentName,
                        lab:           b.lab,
                        timestamp:     ts.toISOString(),
                        duration:      b.duration,
                        materials:     '-',
                        samples:       '-',
                        action:        'Booked',
                        issueDetails:  null,
                        _process:      b.process || '-',
                        _affiliation:  b.affiliation || '-',
                        _bDateStr:     bDateStr,
                    };
                })
            ].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            const _todayStr = localDayStr(new Date());
            const logRows = _allActivityRows.length > 0
                ? _allActivityRows.map(l => {
                    const isNoShow    = l._rowType === 'noshow';
                    const initials    = l.userName.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
                    const isReport    = l.action === 'Report' || l.action === 'Issue';
                    const isRejection = l.action === 'Rejected';
                    const isToday     = localDayStr(l.timestamp) === _todayStr;

                    const dateTimeStr = new Date(l.timestamp).toLocaleDateString([], {month:'short', day:'numeric'})
                                      + ' ' + new Date(l.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

                    // ── NO-SHOW ROW (booked but never checked in) ──
                    if (isNoShow) {
                        const nsToday = l._bDateStr === _todayStr;
                        return `
                        <tr class="border-b last:border-0 transition bg-red-50/50 border-red-100 hover:bg-red-50">
                            <!-- USER & TIME -->
                            <td class="py-3 sm:py-4 pl-4 sm:pl-6">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold shadow-sm shrink-0 border bg-red-100 text-red-600 border-red-200">
                                        ${initials}
                                    </div>
                                    <div class="min-w-0">
                                        <div class="text-sm font-semibold truncate max-w-[100px] sm:max-w-none text-red-700">${l.userName}</div>
                                        <div class="flex items-center gap-1.5">
                                            <span class="text-[10px] font-mono text-red-400">${l._bDateStr} · ${l.duration}</span>
                                            ${nsToday ? '<span class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-full bg-red-500 text-white text-[9px] font-bold leading-none">Today</span>' : ''}
                                        </div>
                                    </div>
                                </div>
                            </td>
                            <!-- EQUIPMENT & PROCESS -->
                            <td class="py-3 sm:py-4 text-xs sm:text-sm whitespace-nowrap">
                                <div class="font-medium text-red-700">${l.equipmentName}</div>
                                <div class="text-[10px] truncate max-w-[120px] text-red-400">${l._process}</div>
                            </td>
                            <!-- SAMPLE -->
                            <td class="py-3 sm:py-4 text-xs text-center text-red-300">—</td>
                            <!-- ACTION badge -->
                            <td class="py-3 sm:py-4">
                                <span class="px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wide whitespace-nowrap bg-slate-100 text-slate-500 border border-slate-200">
                                    Booked
                                </span>
                            </td>
                            <!-- NO CHECK-IN remark -->
                            <td class="py-3 sm:py-4 pr-4 sm:pr-6 text-right">
                                <span class="inline-flex items-center gap-1 text-red-600 text-[11px] font-bold whitespace-nowrap">
                                    <i class="ph-bold ph-warning-circle"></i> No Check-in!
                                </span>
                            </td>
                        </tr>`;
                    }

                    // ── NORMAL LOG ROW ──
                    return `
                    <tr class="border-b last:border-0 transition
                        ${isToday
                            ? 'bg-emerald-50/60 border-emerald-100 hover:bg-emerald-50'
                            : 'bg-white border-slate-50 hover:bg-slate-50/50'}">
                        <!-- USER & TIME -->
                        <td class="py-3 sm:py-4 pl-4 sm:pl-6">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold shadow-sm shrink-0 border
                                    ${isToday ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-slate-100 text-slate-500 border-slate-200'}">
                                    ${initials}
                                </div>
                                <div class="min-w-0">
                                    <div class="text-sm font-semibold truncate max-w-[100px] sm:max-w-none
                                        ${isToday ? 'text-emerald-800' : 'text-slate-700'}">${l.userName}</div>
                                    <div class="flex items-center gap-1.5">
                                        <span class="text-[10px] font-mono ${isToday ? 'text-emerald-600' : 'text-slate-400'}">${dateTimeStr}</span>
                                        ${isToday ? '<span class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-full bg-emerald-500 text-white text-[9px] font-bold leading-none"><span class="w-1 h-1 rounded-full bg-white/80 inline-block"></span> Today</span>' : ''}
                                    </div>
                                </div>
                            </div>
                        </td>
                        <!-- EQUIPMENT & MATERIAL -->
                        <td class="py-3 sm:py-4 text-xs sm:text-sm whitespace-nowrap">
                            <div class="font-medium ${isToday ? 'text-emerald-800' : 'text-slate-700'}">${l.equipmentName}</div>
                            <div class="text-[10px] truncate max-w-[120px] ${isToday ? 'text-emerald-500' : 'text-slate-400'}">${l.materials || '-'}</div>
                        </td>
                        <!-- SAMPLE QTY -->
                        <td class="py-3 sm:py-4 text-xs sm:text-sm text-center ${isToday ? 'text-emerald-700' : 'text-slate-600'}">
                            ${l.samples || '-'}
                        </td>
                        <!-- ACTION -->
                        <td class="py-3 sm:py-4">
                            <span class="px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wide whitespace-nowrap
                                ${isReport ? 'bg-red-50 text-red-600 border border-red-100'
                                : isRejection ? 'bg-orange-50 text-orange-600 border border-orange-100'
                                : 'bg-emerald-50 text-emerald-600 border border-emerald-100'}">
                                ${l.action}
                            </span>
                        </td>
                        <!-- DURATION -->
                        <td class="py-3 sm:py-4 pr-4 sm:pr-6 text-right text-xs sm:text-sm truncate max-w-[100px] sm:max-w-xs
                            ${isToday ? 'text-emerald-600' : 'text-slate-500'}">

                    </tr>
                    `;
                }).join('')
                : `<tr><td colspan="5" class="py-10 text-center text-slate-400 text-sm">
                    <i class="ph-duotone ph-clipboard-text text-3xl block mb-2 text-slate-200"></i>
                    No activity or bookings recorded for ${_actView === 'month' ? 'this month' : _actView === 'year' ? 'this year' : 'this week'}.
                  </td></tr>`;

            // --- BOOKED SCHEDULE LOGIC (navigable month) ---
            const _bsTarget    = new Date(new Date().getFullYear(), new Date().getMonth() + state.bookingScheduleOffset, 1);
            const _bsStart     = new Date(_bsTarget.getFullYear(), _bsTarget.getMonth(), 1);
            _bsStart.setHours(0, 0, 0, 0);
            const _bsEnd       = new Date(_bsTarget.getFullYear(), _bsTarget.getMonth() + 1, 0);
            _bsEnd.setHours(23, 59, 59, 999);
            const _bsIsCurrent = state.bookingScheduleOffset === 0;
            const _bsLabel     = _bsStart.toLocaleDateString([], { month: 'long', year: 'numeric' });

            const scheduledBookings = state.bookings
                .filter(b =>
                    b.lab === state.selectedLab &&
                    b.status === 'Approved' &&
                    new Date(b.date) >= _bsStart &&
                    new Date(b.date) <= _bsEnd
                )
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            const scheduleRows = scheduledBookings.length > 0
                ? scheduledBookings.map(b => {
                    const rawDate = b.date.split('T')[0]; 
                    const [byr, bmo, bdy] = rawDate.split('-').map(Number);
                    const bookingDate = new Date(byr, bmo - 1, bdy);
                    const today = new Date();
                    bookingDate.setHours(0,0,0,0);
                    today.setHours(0,0,0,0);
                    
                    const diffTime = bookingDate - today;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                    
                    let percent = 0;
                    let barColor = 'bg-blue-500';
                    let text = `${diffDays} days away`;
                    let textClass = 'text-slate-500';

                    if (diffDays < 0) { percent = 100; barColor = 'bg-slate-400'; text = 'Completed'; textClass='text-slate-300'; }
                    else if (diffDays === 0) {
                        const nowH = new Date().getHours() + new Date().getMinutes() / 60;
                        const [slotStart, slotEnd] = getSlotHours(b.duration);
                        if (nowH >= slotEnd) {
                            percent = 100; barColor = 'bg-slate-400'; text = 'Slot Ended'; textClass = 'text-slate-400';
                        } else if (nowH < slotStart) {
                            percent = 70; barColor = 'bg-amber-400'; text = 'Upcoming Today'; textClass = 'text-amber-600 font-bold';
                        } else {
                            percent = 100; barColor = 'bg-emerald-500 animate-pulse'; text = 'Active Now'; textClass = 'text-emerald-600 font-bold animate-pulse';
                        }

                    else {
                        percent = Math.max(5, Math.min(100, 100 - ((diffDays / 30) * 100)));
                    }

                    return `
                    <tr class="border-b border-slate-50 last:border-0 hover:bg-slate-50/50 transition">
                        <!-- 1. USER -->
                        <td class="py-3 sm:py-4 pl-4 sm:pl-6 text-xs sm:text-sm text-slate-600 min-w-[100px]">
                            <div class="truncate max-w-[120px] font-semibold text-slate-700">${b.userName}</div>

                        <!-- 4. COUNTDOWN -->
                        <td class="py-3 sm:py-4 pr-4 sm:pr-6 w-1/3 align-middle min-w-[120px]">

                                <div class="${barColor} h-full rounded-full transition-all duration-1000" style="width: ${percent}%"></div>
                            </div>
                        </td>
                    </tr>
                    `;
                }).join('')
                : `<tr><td colspan="4" class="py-10 text-center text-slate-400 text-sm">
                    <i class="ph-duotone ph-calendar-x text-3xl block mb-2 text-slate-200"></i>

            return `
                <div class="fade-in">
                    <div class="flex flex-col md:flex-row md:items-end justify-between mb-8 gap-4">

                                <i class="ph-bold ph-x-circle"></i> My Bookings
                            </button>
                            <button onclick="setView('LabView'); state.selectedLab=null; renderApp()" class="text-sm font-semibold text-blue-600 hover:text-blue-800 flex items-center gap-1 whitespace-nowrap px-4 py-2 rounded-xl hover:bg-blue-50 transition w-full sm:w-auto justify-center">
                                Switch Lab <i class="ph-bold ph-caret-down"></i>
                            </button>` : ''}

                    </div>
                    
                    ${filteredEq.length === 0

                             <h3 class="text-xl font-bold text-slate-800">No Equipment Found</h3>
                             <p class="text-slate-500 text-sm mt-1">Try adjusting your search or contact admin.</p>
                            </div>` 
                        : `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-5">${cards}</div>`
                    }

                    <!-- Activity Log (Usage Records) -->
                    <div class="mt-16">
                        <!-- Title row -->
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-4 px-1 gap-3">

                                </button>
                                <button onclick="state.activityLogView='month'; renderApp()"

                                        ${_actView === 'month' ? 'bg-white shadow text-slate-800' : 'text-slate-500 hover:text-slate-700'}">

                                </button>
                                <button onclick="state.activityLogView='year'; renderApp()"

                                        ${_actView === 'year' ? 'bg-white shadow text-slate-800' : 'text-slate-500 hover:text-slate-700'}">

                            </div>
                        </div>

                        <!-- Navigator + Download row -->
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-5 px-1 gap-3">
                            <!-- Period navigator (week / month / year) -->
                            ${_actView === 'week' ? `
                            <div class="flex items-center gap-1 bg-slate-100 rounded-xl p-1">
                                <button onclick="state.weeklyActivityOffset--; renderApp()"
                                    class="p-1.5 rounded-lg hover:bg-white hover:shadow-sm text-slate-500 hover:text-slate-800 transition" title="Previous week">
                                    <i class="ph-bold ph-caret-left text-sm"></i>

                                <span class="text-xs font-semibold text-slate-600 px-2 whitespace-nowrap min-w-[160px] text-center">
                                    ${_weekLabel}${_isCurrentWeek ? ' <span class="text-indigo-500">· Now</span>' : ''}
                                </span>
                                <button onclick="if(state.weeklyActivityOffset < 0){ state.weeklyActivityOffset++; renderApp(); }"
                                    class="p-1.5 rounded-lg transition ${_isCurrentWeek ? 'text-slate-300 cursor-not-allowed' : 'hover:bg-white hover:shadow-sm text-slate-500 hover:text-slate-800'}"
                                    ${_isCurrentWeek ? 'disabled' : ''} title="Next week">
                                    <i class="ph-bold ph-caret-right text-sm"></i>
                                </button>
                            </div>
                            ` : _actView === 'month' ? `
                            <div class="flex items-center gap-1 bg-slate-100 rounded-xl p-1">

                                <button onclick="if(state.monthlyActivityOffset < 0){ state.monthlyActivityOffset++; renderApp(); }"

                                    <i class="ph-bold ph-caret-right text-sm"></i>

                                    class="p-1.5 rounded-lg hover:bg-white hover:shadow-sm text-slate-500 hover:text-slate-800 transition" title="Previous year">
                                    <i class="ph-bold ph-caret-left text-sm"></i>
                                </button>
                                <span class="text-xs font-semibold text-slate-600 px-2 whitespace-nowrap min-w-[80px] text-center">

                                    class="p-1.5 rounded-lg transition ${_isCurrentYear ? 'text-slate-300 cursor-not-allowed' : 'hover:bg-white hover:shadow-sm text-slate-500 hover:text-slate-800'}"

                                    <i class="ph-bold ph-caret-right text-sm"></i>
                                </button>

                            <div class="flex items-center gap-2">
                                ${_allActivityRows.length > 0 ? `

                                    ${labLogs.length} log${labLogs.length !== 1 ? 's' : ''}
                                    ${_noShowBookings.length > 0 ? `<span class="text-red-500 font-bold">· ${_noShowBookings.length} no-show${_noShowBookings.length !== 1 ? 's' : ''}</span>` : ''}
                                </span>` : ''}

                                    ${_allActivityRows.length === 0 ? 'disabled' : ''}
                                    class="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-red-50 border border-red-100 text-red-600 text-xs font-semibold hover:bg-red-100 transition disabled:opacity-40 disabled:cursor-not-allowed">
                                    <i class="ph-bold ph-file-pdf"></i> Download PDF
                                </button>
                            </div>
                        </div>
                        <div class="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden">
                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse min-w-[600px] sm:min-w-full">
                                    <thead>
                                        <tr class="border-b border-slate-100 bg-slate-50/80 backdrop-blur-sm">
                                            <th class="py-3 sm:py-4 pl-4 sm:pl-6 text-xs font-bold text-slate-400 uppercase tracking-wider">User</th>
                                            <th class="py-3 sm:py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Equipment/Mat</th>
                                            <th class="py-3 sm:py-4 text-xs font-bold text-slate-400 uppercase tracking-wider text-center">Sample</th>
                                            <th class="py-3 sm:py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Action</th>
                                            <th class="py-3 sm:py-4 pr-4 sm:pr-6 text-right text-xs font-bold text-slate-400 uppercase tracking-wider">Duration</th>
                                        </tr>
                                    </thead>
                                    <tbody class="bg-white">
                                        ${logRows}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Booked Schedule Table -->
                    <div class="mt-12">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-6 px-1 gap-3">
                            <div>
                                <h3 class="text-lg sm:text-xl font-bold text-slate-800">Booked Schedule</h3>
                                <p class="text-xs text-slate-400 mt-0.5">Approved bookings for the selected month</p>
                            </div>
                            <div class="flex items-center gap-2 self-start sm:self-auto">
                                <!-- Month navigator -->
                                <div class="flex items-center gap-1 bg-slate-100 rounded-xl p-1">
                                    <button onclick="state.bookingScheduleOffset--; renderApp()"

                                        title="Previous month">

                                    </button>
                                    <span class="text-xs font-semibold text-slate-600 px-2 whitespace-nowrap min-w-[120px] text-center">
                                        ${_bsLabel}${_bsIsCurrent ? ' <span class="text-indigo-500">· Now</span>' : ''}
                                    </span>
                                    <button onclick="if(state.bookingScheduleOffset < 0){ state.bookingScheduleOffset++; renderApp(); }"
                                        class="p-1.5 rounded-lg transition ${_bsIsCurrent ? 'text-slate-300 cursor-not-allowed' : 'hover:bg-white hover:shadow-sm text-slate-500 hover:text-slate-800'}"
                                        ${_bsIsCurrent ? 'disabled' : ''} title="Next month">
                                        <i class="ph-bold ph-caret-right text-sm"></i>
                                    </button>
                                </div>
                                ${scheduledBookings.length > 0 ? `
                                <span class="text-xs text-indigo-600 bg-indigo-50 border border-indigo-100 px-3 py-1.5 rounded-full font-semibold">
                                    ${scheduledBookings.length} booking${scheduledBookings.length !== 1 ? 's' : ''}
                                </span>` : ''}
                            </div>
                        </div>
                        <div class="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden">
                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse min-w-[600px] sm:min-w-full">
                                    <thead>
                                        <tr class="border-b border-slate-100 bg-slate-50/80 backdrop-blur-sm">
                                            <th class="py-3 sm:py-4 pl-4 sm:pl-6 text-xs font-bold text-slate-400 uppercase tracking-wider">User</th>
                                            <th class="py-3 sm:py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Equipment</th>
                                            <th class="py-3 sm:py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Date</th>
                                            <th class="py-3 sm:py-4 pr-4 sm:pr-6 text-xs font-bold text-slate-400 uppercase tracking-wider w-1/3">Countdown</th>

                        </div>

        }

        function renderMonitoring() {
            const labs = state.selectedLab
                ? [state.selectedLab]
                : [...new Set(state.equipment.map(e => e.lab))].sort();

            // ── Per-lab colour palette ──────────────────────────────────────────
            const LAB_PALETTE = {
                'Artificial Kidney':       { accent:'#f43f5e', light:'#fff1f2', border:'#fecdd3', text:'#be123c', icon:'ph-heartbeat' },
                'Biosensor & Lab-On-Chip': { accent:'#06b6d4', light:'#ecfeff', border:'#a5f3fc', text:'#0e7490', icon:'ph-git-branch' },
                'Cleanroom':               { accent:'#475569', light:'#f8fafc', border:'#cbd5e1', text:'#1e293b', icon:'ph-wind' },
                'MEMS/NEMS':               { accent:'#8b5cf6', light:'#f5f3ff', border:'#ddd6fe', text:'#5b21b6', icon:'ph-cpu' },
                'Microfluidics':           { accent:'#0ea5e9', light:'#f0f9ff', border:'#bae6fd', text:'#0369a1', icon:'ph-drop' },
                'MINES':                   { accent:'#ef4444', light:'#fef2f2', border:'#fecaca', text:'#b91c1c', icon:'ph-lightning' },
                'MIPAC':                   { accent:'#16a34a', light:'#f0fdf4', border:'#bbf7d0', text:'#14532d', icon:'ph-package' },
                'Nanophotonics':           { accent:'#9333ea', light:'#faf5ff', border:'#e9d5ff', text:'#6b21a8', icon:'ph-sparkle' },
                'OPEL':                    { accent:'#d97706', light:'#fffbeb', border:'#fde68a', text:'#92400e', icon:'ph-sun' },
                'Quantum Electronics':     { accent:'#4f46e5', light:'#eef2ff', border:'#c7d2fe', text:'#3730a3', icon:'ph-atom' },
                'Carbon Electronics':      { accent:'#059669', light:'#ecfdf5', border:'#a7f3d0', text:'#065f46', icon:'ph-hexagon' },
                'Semiconductor':           { accent:'#2563eb', light:'#eff6ff', border:'#bfdbfe', text:'#1e40af', icon:'ph-circuit-board' },
                'Thin Film':               { accent:'#db2777', light:'#fdf2f8', border:'#fbcfe8', text:'#9d174d', icon:'ph-stack' },
            };
            const DEFAULT_PALETTE = { accent:'#64748b', light:'#f8fafc', border:'#e2e8f0', text:'#334155', icon:'ph-flask' };

            // Global counters (populated inside the map, used in stats bar after)
            let gTotal = 0, gInUse = 0, gReserved = 0, gMaintenance = 0;

            // ── Build lab blocks ────────────────────────────────────────────────
            const content = labs.map(lab => {
                const eqs = state.equipment.filter(e => e.lab === lab);
                const pal = LAB_PALETTE[lab] || DEFAULT_PALETTE;

                let lInUse = 0, lReserved = 0, lMaint = 0, lIdle = 0;

                const eqHtml = eqs.map(eq => {
                    const activeBooking = getActiveBookingForToday(eq.name, eq.lab);
                    const recentLog = state.logs.find(l => {
                        if (l.equipmentId !== eq.id || l.action !== 'Usage' || l.sessionEnded) return false;
                        return new Date() < getSessionEndTime(l.timestamp, l.duration);
                    });

                    let status = 'Idle';
                    let sBg = 'bg-slate-100', sTx = 'text-slate-500', sDot = 'bg-slate-300', sDotPulse = '';
                    let cardBorderColor = '#e2e8f0', stripColor = '#cbd5e1';
                    let details = '';

                    if (eq.status === 'Maintenance') {
                        status = 'Maintenance';
                        sBg = 'bg-red-50'; sTx = 'text-red-600'; sDot = 'bg-red-500';
                        cardBorderColor = '#fecaca'; stripColor = '#ef4444';
                        details = `<div class="flex items-center gap-1 mt-2 text-[10px] text-red-500 font-semibold">
                                       <i class="ph-fill ph-warning-octagon"></i> Under Maintenance
                                   </div>`;
                        lMaint++; gMaintenance++;
                    } else if (recentLog) {
                        status = 'In Use';
                        sBg = 'bg-emerald-50'; sTx = 'text-emerald-700'; sDot = 'bg-emerald-500'; sDotPulse = 'animate-pulse';
                        cardBorderColor = '#6ee7b7'; stripColor = '#10b981';
                        const prog = calculateUsageProgress(recentLog.timestamp, recentLog.duration);
                        details = `<div class="mt-2 space-y-1">
                            <div class="flex justify-between text-[10px] font-semibold">
                                <span class="text-slate-600 truncate max-w-[90px]">${recentLog.userName}</span>
                                <span class="text-emerald-600 shrink-0">${prog.text}</span>
                            </div>
                            <div class="w-full bg-slate-100 rounded-full h-1 overflow-hidden">
                                <div class="bg-gradient-to-r from-emerald-400 to-emerald-600 h-full rounded-full transition-all duration-700"
                                     style="width:${prog.percent}%"></div>
                            </div>
                        </div>`;
                        lInUse++; gInUse++;
                    } else if (activeBooking) {
                        status = 'Reserved';
                        sBg = 'bg-indigo-50'; sTx = 'text-indigo-600'; sDot = 'bg-indigo-400';
                        cardBorderColor = '#c7d2fe'; stripColor = '#6366f1';
                        details = `<div class="mt-2 text-[10px] text-indigo-500 font-semibold truncate">
                                       <i class="ph-bold ph-calendar-check mr-0.5"></i>${activeBooking.userName}
                                   </div>`;
                        lReserved++; gReserved++;
                    } else {
                        lIdle++;
                    }
                    gTotal++;

                    return `
                    <div class="bg-white rounded-xl overflow-hidden transition-all duration-200 hover:shadow-lg hover:-translate-y-0.5"
                         style="border:1px solid ${cardBorderColor}; box-shadow:0 1px 4px rgba(0,0,0,0.05)">
                        <div class="flex items-stretch">
                            <!-- Status strip -->
                            <div class="w-1 shrink-0 rounded-l-xl" style="background:${stripColor}"></div>
                            <!-- Thumbnail -->
                            <div class="w-[68px] shrink-0 bg-slate-50 overflow-hidden relative" style="min-height:76px">
                                <img src="${eq.imageUrl || ''}" alt="${eq.name}"
                                     class="w-full h-full object-cover absolute inset-0"
                                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                                <div style="display:none"
                                     class="absolute inset-0 flex items-center justify-center bg-slate-50">
                                    <i class="ph-duotone ph-microscope text-2xl text-slate-300"></i>
                                </div>
                            </div>
                            <!-- Content -->
                            <div class="flex-1 p-3 min-w-0">
                                <div class="flex items-start justify-between gap-1.5">
