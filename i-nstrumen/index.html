        function executeCancel() {
            if (_cancelTargetBookingId === null) return;
            if (demoBlockWrite()) return;

            const reasonInput = getById('cancel-reason-input');
            const reason = (reasonInput.value || '').trim();
            if (!reason) { showToast('Please enter a cancellation reason.', 'error'); return; }

            const booking = state.bookings.find(b => b.id === _cancelTargetBookingId);
            if (!booking) { showToast('Booking not found.', 'error'); return; }

            // Client-side slot validation (for Approved bookings)
            if (booking.status === 'Approved') {
                const now = new Date();
                const rawDate = booking.date.split('T')[0];
                const [y, m, d] = rawDate.split('-').map(Number);
                const slotEnd = new Date(y, m - 1, d);
                if (booking.duration === '8am-1pm') slotEnd.setHours(13, 0, 0, 0);
                else if (booking.duration === '2pm-5pm' || booking.duration === '1pm-5pm') slotEnd.setHours(17, 0, 0, 0);
                else if (booking.duration === '1 Day') slotEnd.setHours(17, 0, 0, 0);
                else if (booking.duration === '2 Days') { slotEnd.setDate(slotEnd.getDate() + 1); slotEnd.setHours(17, 0, 0, 0); }
                else slotEnd.setHours(17, 0, 0, 0);

                if (now > slotEnd) {
                    showToast('Cannot cancel — the booking slot has already ended.', 'error');
                    return;
                }
            }

            const cancelledTimestamp = new Date().toISOString();

            // Update local state
            const idx = state.bookings.findIndex(b => b.id === _cancelTargetBookingId);
            if (idx > -1) {
                state.bookings[idx].status = 'Cancelled';
                state.bookings[idx].remarks = 'Cancelled by user: ' + reason;
                state.bookings[idx].timestampActioned = cancelledTimestamp;
            }

            // Also end any active session for this booking
            const activeLogIdx = state.logs.findIndex(l =>
                l.equipmentName === booking.equipmentName &&
                l.lab === booking.lab &&
                _sameBookingUser(l, booking) &&
                l.action === 'Usage' &&
                !l.sessionEnded
            );
            if (activeLogIdx > -1) {
                state.logs[activeLogIdx].sessionEnded = true;
                state.logs[activeLogIdx].action += ' (Cancelled)';
                backgroundSync('Usage', state.logs[activeLogIdx]);
            }

            // Sync to backend
            backgroundSync('CancelBooking', {
                bookingId: _cancelTargetBookingId,
                reason: reason,
                cancelledTimestamp: cancelledTimestamp
            });

            showToast(`Booking for ${booking.equipmentName} has been cancelled.`, 'success');
            _cancelTargetBookingId = null;
            closeModal();
            renderApp();
        }

        function verifyCheckIn(bookingId, equipmentId) {
            if (demoBlockWrite()) return;   // demo: no check-ins / overrides
            const phoneInput = getById('verify-phone-input');
            const inputVal = phoneInput.value;
            
            const booking = state.bookings.find(b => b.id === bookingId);
            
            if (!booking) {
                 showToast("Booking record not found.", "error");
                 return;
            }

            // --- STRICT SLOT VALIDATION ---
            const now = new Date();
            const rawDate = booking.date.split('T')[0]; // YYYY-MM-DD
            let bookingEnd = new Date(rawDate);

            // Set End Time based on Slot
            if (booking.duration === '8am-1pm') {
                bookingEnd.setHours(13, 0, 0, 0); // 1:00 PM
            } else if (booking.duration === '2pm-5pm' || booking.duration === '1pm-5pm') {
                // Supports both new and legacy bookings
                bookingEnd.setHours(17, 0, 0, 0); // 5:00 PM
            } else if (booking.duration === '1 Day') {
                bookingEnd.setHours(17, 0, 0, 0); // 5:00 PM
            } else if (booking.duration === '2 Days') {
                bookingEnd.setDate(bookingEnd.getDate() + 1); // Next Day
                bookingEnd.setHours(17, 0, 0, 0); // 5:00 PM
            }

            // Compare: Is NOW > End Time?
            if (now > bookingEnd) {
                // EXPIRED!
                showToast("Booking Expired. You missed the check-in window.", "error");
                closeModal();
                
                // Trigger 'Not Attend' Update
                backgroundSync('UpdateBooking', { 
                    id: bookingId, 
                    status: 'Not Attend', 
                    remarks: `Auto-rejected: Arrived late at ${now.toLocaleTimeString()}` 
                });
                return;
            }
            // -----------------------------

            // Phone Normalization
            const normalize = (val) => {
                if (!val) return '';
                let s = String(val).replace(/\D/g, ''); 
                if (s.startsWith('60')) s = s.substring(2); 
                if (s.startsWith('0')) s = s.substring(1); 
                return s;
            };
            
            const stored = normalize(booking.userPhone);
            const input = normalize(inputVal);
            
            if (stored && input && stored === input) {
                openModal(equipmentId, 'Usage_Authenticated');
            } else {
                showToast("Verification Failed. Phone mismatch.", "error");
                phoneInput.value = '';
                phoneInput.focus();
            }
        }

        // ══════════════════════════════════════════════════════════════════════
        // AI SMART MATCH CHAT — state, persistence, rendering, API
        // Per-browser session: localStorage + module-level history.
        // Backend is stateless — no server-side chat storage.
        // ══════════════════════════════════════════════════════════════════════

        const CHAT_STORAGE_KEY = 'instrumen_chat_v1';
        const CHAT_COUNT_KEY   = 'instrumen_chat_count';
        let _chatHistory = [];
        let _chatSending = false;
        let _chatMode = 'restricted';       // always defaults to restricted per session (privacy)
        let _chatProvider = 'Gemini';
        let _chatHealth = 'ok';

        function _chatLoadMode() {
            // Mode is session-only — no localStorage. Always starts as 'restricted'.
            _chatMode = 'restricted';
        }
        function _chatSetMode(mode) {
            _chatMode = mode;
            renderApp();
            _initChat();
            showToast(mode === 'advisory'
                ? 'Knowledge+ mode — questions go to external AI services this session.'
                : 'Inventory mode — fully local equipment matching.', 'info');
        }
        function _chatGetTodayCount() {
            try {
                const raw = localStorage.getItem(CHAT_COUNT_KEY);
                const data = raw ? JSON.parse(raw) : { date: '', count: 0 };
                const today = new Date().toISOString().slice(0, 10);
                return data.date === today ? data.count : 0;
            } catch(e) { return 0; }
        }
        function _chatBumpCount() {
            try {
                const today = new Date().toISOString().slice(0, 10);
                const raw = localStorage.getItem(CHAT_COUNT_KEY);
                const data = raw ? JSON.parse(raw) : { date: today, count: 0 };
                if (data.date !== today) { data.date = today; data.count = 0; }
                data.count++;
                localStorage.setItem(CHAT_COUNT_KEY, JSON.stringify(data));
            } catch(e) {}
        }
        function _chatUpdateHealth(provider, isFallback, isError) {
            _chatProvider = provider || 'Gemini';
            _chatHealth = isError ? 'error' : (isFallback ? 'fallback' : 'ok');
        }

        function _chatLoad() {
            try {
                const raw = localStorage.getItem(CHAT_STORAGE_KEY);
                if (raw) _chatHistory = JSON.parse(raw);
            } catch(e) { _chatHistory = []; }
        }
        function _chatSave() {
            try { localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(_chatHistory)); } catch(e) {}
        }
        function clearChat() {
            _chatHistory = [];
            _chatSave();
            renderChatMessages();
            const chips = document.getElementById('chat-chips');
            if (chips) chips.classList.remove('hidden');
            showToast('Chat cleared.', 'info');
        }
        function _chatEsc(s) {
            return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function sendQuickChip(text) {
            const input = document.getElementById('chat-input');
            if (input) { input.value = text; sendChatMessage(); }
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const text = (input.value || '').trim();
            if (!text || _chatSending) return;

            input.value = '';
            _chatSending = true;
            _chatSetLoading(true);

            // Hide chips after first message
            const chips = document.getElementById('chat-chips');
            if (chips) chips.classList.add('hidden');

            // Append user message
            _chatHistory.push({ role: 'user', text: text, ts: Date.now() });
            _chatSave();
            renderChatMessages();

            // Build payload with last 6 messages for multi-turn context
            const payload = {
                userPrompt: text,
                mode: _chatMode,
                conversationHistory: _chatHistory.slice(-6).map(function(m) {
                    return { role: m.role, text: m.text };
                })
            };

            google.script.run
                .withSuccessHandler(function(result) {
                    _chatSending = false;
                    _chatSetLoading(false);
                    if (result && !result.error) {
                        _chatHistory.push({
                            role: 'model',
                            text: result.reply || 'No response.',
                            matches: Array.isArray(result.matches) ? result.matches : [],
                            mode: result.mode || _chatMode,
                            ts: Date.now()
                        });
                        _chatUpdateHealth(result.provider || 'Gemini', result.fallbackUsed || false, false);
                        _chatBumpCount();
                    } else {
                        _chatHistory.push({
                            role: 'model',
                            text: (result && result.reply) || 'AI assistant is temporarily unavailable. Here are keyword matches instead:',
                            matches: _keywordFallback(text),
                            isFallback: true,
                            ts: Date.now()
                        });
                        _chatUpdateHealth('Gemini', false, true);
                    }
                    _chatSave();
                    renderChatMessages();
                })
                .withFailureHandler(function(err) {
                    _chatSending = false;
                    _chatSetLoading(false);
                    _chatHistory.push({
                        role: 'model',
                        text: 'Could not reach the AI service. Here are keyword matches instead:',
                        matches: _keywordFallback(text),
                        isFallback: true,
                        ts: Date.now()
                    });
                    _chatUpdateHealth('Gemini', false, true);
                    _chatSave();
                    renderChatMessages();
                })
                .handleFrontendAction('GetSmartMatch', payload);
        }

                const advisoryDisclaimer = msg.mode === 'advisory' ? `<div class="mt-2.5 px-3 py-2 bg-amber-50 border border-amber-200 rounded-xl text-[10px] text-amber-700 font-medium flex items-start gap-2"><i class="ph-bold ph-warning-circle text-amber-500 flex-shrink-0 mt-0.5"></i><span>Advisory: These suggestions and parameters are for reference only. Always verify procedures, settings, and safety protocols with your lab PIC or equipment manual before operating any instrument.</span></div>` : '';

        function _keywordFallback(query) {
            const terms = query.toLowerCase().split(/\s+/).filter(function(t) { return t.length > 1; });
            const scored = state.equipment.map(function(eq) {
                const capStr = Array.isArray(eq.processCapabilities)
                    ? eq.processCapabilities.map(function(c) { return (c.name || '') + ' ' + (c.options || []).map(function(o) { return typeof o === 'string' ? o : o.name || ''; }).join(' '); }).join(' ')
                    : '';
                const fields = [
                    { text: (eq.name || '').toLowerCase(), w: 6 },
                    { text: capStr.toLowerCase(), w: 4 },
                    { text: (eq.description || '').toLowerCase(), w: 2 },
                    { text: (eq.lab || '').toLowerCase(), w: 1 },
                ];
                let score = 0;
                terms.forEach(function(term) {
                    fields.forEach(function(f) { if (f.text.includes(term)) score += f.w; });
                });
                return { eq: eq, score: score };
            }).filter(function(s) { return s.score > 0; })
              .sort(function(a, b) { return b.score - a.score; })
              .slice(0, 6);
            return scored.map(function(s) {
                return { name: s.eq.name, lab: s.eq.lab, reason: 'Keyword match' };
            });
        }

        // ══════════════════════════════════════════════════════════════════════════
        // i-MENIAN CROSSBRIDGE — name search + identity confirmation strip
        // Strategy: HYBRID
        //   • Input is usable immediately — never blocked/disabled
        //   • Background pre-load runs silently after modal opens
        //   • If user types BEFORE pre-load finishes → targeted GAS search (debounced)
        //   • If user types AFTER pre-load finishes  → instant client-side filter
        //   • GAS-side CacheService means subsequent modals for same lab are fast
        // ══════════════════════════════════════════════════════════════════════════

        let _imenianUsers      = [];    // ALL users across all labs (cross-lab)
        let _imenianReady      = false; // true once background load completes
        let _imenianLoading    = false; // singleton flag — prevents double-load
        let _imenianSelected   = false;
        let _imenianDebounce   = null;
        let _imenianPendingQ   = null;  // query typed while pre-loading
        let _imenianPhotoCache = {};    // {matric: base64DataUrl}

        // ── Fuzzy match: all words in query must appear somewhere in the name.
        //    Strips connectors (bin/binti/bt/a/l etc.) before comparing so that
        //    "ahmad abu" matches "Ahmad bin Abu Bakar" correctly.
        function _imenianFuzzyMatch(query, name) {
            const strip = s => s.toLowerCase()
                .replace(/\b(bin|binti|bte|bt|b\.?|a\/l|a\/p)\b/gi, ' ')
                .replace(/\s+/g, ' ').trim();
            const qNorm   = strip(query);
            const nNorm   = strip(name);
            const qTokens = qNorm.split(' ').filter(t => t.length > 0);
            return qTokens.every(qt => nNorm.includes(qt));
        }

        // ── Singleton background loader — fires once, usually 2s after app loads.
        //    Calling it again while loading or after load completes is a no-op.
        function _imenianLoadAllUsers() {
            if (_imenianReady || _imenianLoading) return;
            _imenianLoading = true;

            google.script.run
                .withSuccessHandler(data => {
                    _imenianUsers   = Array.isArray(data) ? data : [];
                    _imenianReady   = true;
                    _imenianLoading = false;
                    // Update placeholder on any open search input
                    const inp = document.getElementById('imenian-search-input');
                    if (inp && inp.placeholder.includes('…'))
                        inp.placeholder = `Type at least 4 letters of your name…`;
                    // Re-run any query the user typed while loading
                    if (_imenianPendingQ) {
                        const pq = _imenianPendingQ;
                        _imenianPendingQ = null;
                        imenianSearch(pq, '');
                    }
                })
                .withFailureHandler(() => {
                    _imenianLoading = false; // allow retry next modal open
                })
                .handleFrontendAction('GetAllIMenianUsers', {});
        }

        // Thin wrapper so existing call-sites (openModal, selectLab) still work
        function _imenianLoadUsers(lab) { _imenianLoadAllUsers(); }

        // Called on every keystroke — cross-lab, fuzzy, 4-char minimum
        function imenianSearch(query, lab) {
            _imenianSelected = false;
            clearTimeout(_imenianDebounce);
            const dropdown = document.getElementById('imenian-dropdown');

            if (!query || query.trim().length < 4) {
                if (dropdown) dropdown.classList.add('hidden');
                _imenianClearStrip(false);
                return;
            }

            // ── Path A: list ready → instant fuzzy filter ──
            if (_imenianReady && _imenianUsers.length > 0) {
                const results = _imenianUsers
                    .filter(u => _imenianFuzzyMatch(query.trim(), u.name))
                    .slice(0, 12);
                _imenianShowDropdown(results, lab);
                return;
            }

            // ── Path B: still loading → show spinner, wait for background load ──
            //    No extra GAS call — _imenianLoadAllUsers is already in flight.
            _imenianPendingQ = query;
            if (dropdown) {
                dropdown.innerHTML = `<div class="p-3 text-xs text-slate-400 flex items-center gap-2">
                    <i class="ph-bold ph-spinner animate-spin"></i> Loading member list, please wait…</div>`;
                dropdown.classList.remove('hidden');
            }
            _imenianLoadAllUsers(); // no-op if already loading, triggers load if first call
        }

        // Renders the dropdown list of matching users
        function _imenianShowDropdown(results, lab) {
            const dropdown = document.getElementById('imenian-dropdown');
            if (!dropdown) return;
            if (!results || results.length === 0) {
                dropdown.innerHTML = `
                    <div class="p-4 text-center">
                        <i class="ph-duotone ph-user-x text-2xl text-slate-300 block mb-2"></i>
                        <p class="text-xs font-semibold text-slate-500">Not found in ${lab}</p>
                        <p class="text-[10px] text-slate-400 mt-0.5 mb-3">Not a registered member of this lab.</p>
                        <button type="button" onclick="_imenianShowManualForm('${lab}')"
                            class="w-full py-2 text-xs font-bold bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 rounded-lg transition flex items-center justify-center gap-1.5">
                            <i class="ph-bold ph-user-plus"></i> Enter as External / Guest
                        </button>
                    </div>`;
                dropdown.classList.remove('hidden');
                return;
            }
            dropdown.innerHTML = results.map(u => {
                const initials = u.name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
                const safeUser = encodeURIComponent(JSON.stringify(u));
                return `
                <button type="button"
                    onclick="_imenianPick(JSON.parse(decodeURIComponent('${safeUser}')), '${lab}')"
                    class="w-full text-left px-4 py-3 hover:bg-indigo-50 transition-colors flex items-center gap-3 border-b border-slate-100 last:border-0">
                    <div class="w-9 h-9 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-xs flex-shrink-0">
                        ${initials}
                    </div>
                    <div class="min-w-0 flex-1">

                        <div class="text-[10px] text-slate-400">${u.matric} · ${u.category}</div>
                    </div>

            dropdown.classList.remove('hidden');
        }

        // Called when user clicks a name in the dropdown
        // Returns true ONLY if the email is the PIC for the current lab (state.selectedLab).
        // Master admin emails are also granted priority across all labs.
        function _isLabPic(email) {
            if (state.demoMode) return true;   // demo: show PIC-only features (writes still blocked)
            if (!email) return false;
            const norm = email.trim().toLowerCase();
            // Master admins — full access
            const MASTER_EMAILS = ['imenmakmal@gmail.com', 'rhonira@ukm.edu.my'];
            if (MASTER_EMAILS.includes(norm)) return true;
            // Lab-specific: coordinator must be assigned to THIS lab
            return state.systemConfig.coordinators.some(c =>
                c.email && c.email.trim().toLowerCase() === norm &&
                c.lab   && c.lab.trim() === state.selectedLab
            );
        }

        // Applies or reverts the PIC same-day booking privilege based on email.
        // Uses both classList AND inline style so there is no way for CSS to override.
        // Called every time a user is picked OR cleared — state never sticks.
        function _imenianApplyPicRule(email) {
            const dateInput = document.getElementById('booking-date-input');
            const hintEl    = document.getElementById('booking-date-hint');
            const badge     = document.getElementById('pic-bypass-badge');

            if (_isLabPic(email)) {
                // ── PIC of this lab: unlock same-day ──
                if (dateInput) dateInput.min = localDayStr(new Date());
                if (hintEl)   { hintEl.classList.add('hidden');    hintEl.style.display    = 'none'; }
                if (badge)    { badge.classList.remove('hidden');   badge.style.display     = '';    }
            } else {
                // ── Everyone else: enforce 2-day advance ──
                const minDate = new Date();
                minDate.setDate(minDate.getDate() + 2);
                const minStr = localDayStr(minDate);
                if (dateInput) {
                    dateInput.min = minStr;
                    // If the already-chosen date is now too early, clear it
                    if (dateInput.value && dateInput.value < minStr) dateInput.value = '';
                }
                if (hintEl)  { hintEl.classList.remove('hidden');  hintEl.style.display    = '';    }
                if (badge)   { badge.classList.add('hidden');       badge.style.display     = 'none'; }
            }
        }

        // Shows the manual entry form for non-i-Menian (external/guest) users
        function _imenianShowManualForm(lab) {
            const dropdown = document.getElementById('imenian-dropdown');
            if (dropdown) dropdown.classList.add('hidden');
            const strip = document.getElementById('imenian-confirm-strip');
            if (!strip) return;
            strip.innerHTML = `
                <div class="mt-2 p-4 bg-amber-50 border border-amber-200 rounded-2xl space-y-2.5">
                    <div class="flex items-center gap-2 mb-1">
                        <i class="ph-bold ph-user-plus text-amber-600 text-sm"></i>
                        <span class="text-[11px] font-bold text-amber-700 uppercase tracking-wider">External / Guest Entry</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="col-span-2">
                            <input type="text" id="ext-name" placeholder="Full Name *"
                                class="w-full p-2.5 text-sm bg-white border border-amber-200 rounded-lg outline-none focus:ring-2 focus:ring-amber-400 placeholder-slate-400">
                        </div>
                        <div>
                            <input type="email" id="ext-email" placeholder="Email *"
                                class="w-full p-2.5 text-sm bg-white border border-amber-200 rounded-lg outline-none focus:ring-2 focus:ring-amber-400 placeholder-slate-400">
                        </div>
                        <div>
                            <input type="tel" id="ext-phone" placeholder="Phone Number"
                                class="w-full p-2.5 text-sm bg-white border border-amber-200 rounded-lg outline-none focus:ring-2 focus:ring-amber-400 placeholder-slate-400">
                        </div>
                        <div>
                            <input type="text" id="ext-id" placeholder="Student / Staff ID"
                                class="w-full p-2.5 text-sm bg-white border border-amber-200 rounded-lg outline-none focus:ring-2 focus:ring-amber-400 placeholder-slate-400">
                        </div>
                        <div>
                            <input type="text" id="ext-affiliation" placeholder="Affiliation / Dept *"
                                class="w-full p-2.5 text-sm bg-white border border-amber-200 rounded-lg outline-none focus:ring-2 focus:ring-amber-400 placeholder-slate-400">
                        </div>
                        <div class="col-span-2">
                            <input type="text" id="ext-supervisor" placeholder="Supervisor Name (optional)"
                                class="w-full p-2.5 text-sm bg-white border border-amber-200 rounded-lg outline-none focus:ring-2 focus:ring-amber-400 placeholder-slate-400">
                        </div>
                    </div>
                    <div class="flex gap-2 pt-1">
                        <button type="button" onclick="_imenianClearStrip(true)"
                            class="flex-1 py-2 text-xs font-bold text-slate-500 hover:bg-slate-100 rounded-lg transition">
                            Cancel
                        </button>
                        <button type="button" onclick="_imenianConfirmManual('${lab}')"
                            class="flex-1 py-2 text-xs font-bold bg-amber-500 hover:bg-amber-400 text-white rounded-lg shadow transition">
                            <i class="ph-bold ph-check mr-1"></i>Confirm
                        </button>
                    </div>
                </div>`;
            strip.classList.remove('hidden');
        }

        // Validates manual form and fills hidden inputs, then shows confirmation strip
        function _imenianConfirmManual(lab) {
            const gv = id => (document.getElementById(id)?.value || '').trim();
            const name        = gv('ext-name');
            const email       = gv('ext-email');
            const phone       = gv('ext-phone');
            const extId       = gv('ext-id');
            const affiliation = gv('ext-affiliation');
            const supervisor  = gv('ext-supervisor');

            if (!name)        { showToast('Full name is required.', 'error');        return; }
            if (!email)       { showToast('Email address is required.', 'error');    return; }
            if (!affiliation) { showToast('Affiliation / Dept is required.', 'error'); return; }

            // Fill same hidden inputs as _imenianPick — handleSubmit is untouched
            const h = id => document.getElementById(id);
            if (h('imenian-userName'))    h('imenian-userName').value    = name;
            if (h('imenian-userEmail'))   h('imenian-userEmail').value   = email;
            if (h('imenian-userPhone'))   h('imenian-userPhone').value   = phone;
            if (h('imenian-userId'))      h('imenian-userId').value      = extId;
            if (h('imenian-affiliation')) h('imenian-affiliation').value = affiliation;
            if (h('imenian-supervisor'))  h('imenian-supervisor').value  = supervisor;
            if (h('imenian-isExternal'))  h('imenian-isExternal').value  = 'true';

            // Update visible search input
            const input = document.getElementById('imenian-search-input');
            if (input) input.value = name;

            _imenianSelected = true;

            // Show amber-themed strip (no photo)
            _imenianShowStrip({ name, email, phone, matric: extId, category: affiliation, supervisor }, true);

            // External users never get PIC priority
            _imenianApplyPicRule('');
        }

        function _imenianPick(user, lab) {
            _imenianSelected = true;

            // 1. Fill all hidden form inputs
            const h = id => document.getElementById(id);
            if (h('imenian-userName'))    h('imenian-userName').value    = user.name       || '';
            if (h('imenian-userPhone'))   h('imenian-userPhone').value   = user.phone      || '';
            if (h('imenian-userEmail'))   h('imenian-userEmail').value   = user.email      || '';
            if (h('imenian-userId'))      h('imenian-userId').value      = user.matric     || '';
            if (h('imenian-affiliation')) h('imenian-affiliation').value = user.category   || '';
            if (h('imenian-supervisor'))  h('imenian-supervisor').value  = user.supervisor || '';

            // 2. Update the visible search input and close dropdown
            const input    = document.getElementById('imenian-search-input');
            const dropdown = document.getElementById('imenian-dropdown');
            if (input)    input.value = user.name;
            if (dropdown) dropdown.classList.add('hidden');

            // 3. Show confirmation strip (initials first, photo loads async)
            _imenianShowStrip(user);

            // 4. Apply or revert PIC date-bypass LAST — after strip renders —
            //    so nothing in the render pipeline can override it.
            _imenianApplyPicRule(user.email);

            // 5. Show photo — instant from cache, GAS fallback only if not pre-loaded
            const _applyPhoto = (photoB64) => {
                const imgEl  = document.getElementById('imenian-photo');
                const initEl = document.getElementById('imenian-initials');
                if (imgEl && photoB64 && photoB64.startsWith('data:image')) {
                    imgEl.src = photoB64;
                    imgEl.onload = () => {
                        imgEl.classList.remove('hidden');
                        if (initEl) initEl.classList.add('hidden');
                    };
                }
            };
            const cached = user.matric && _imenianPhotoCache[user.matric];
            if (cached) {
                _applyPhoto(cached); // instant — no network call
            } else {
                google.script.run
                    .withSuccessHandler(photoB64 => {
                        if (photoB64) {
                            if (user.matric) _imenianPhotoCache[user.matric] = photoB64; // store for reuse
                            _applyPhoto(photoB64);
                        }
                    })
                    .withFailureHandler(() => {}) // initials stay visible
                    .handleFrontendAction('GetIMenianPhoto', { matric: user.matric, lab: lab });
            }
        }

        // Renders the identity confirmation strip.
        // isExternal=true → amber theme, no photo, "External" badge.
        function _imenianShowStrip(user, isExternal = false) {
            const strip = document.getElementById('imenian-confirm-strip');
            if (!strip) return;
            const initials = user.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();

            if (isExternal) {
                strip.innerHTML = `
                    <div class="flex items-center gap-3 p-3.5 bg-gradient-to-r from-amber-50 to-orange-50 rounded-2xl border border-amber-200 shadow-sm">
                        <!-- Avatar: initials only, no photo for external users -->
                        <div class="flex-shrink-0 w-14 h-14 rounded-2xl bg-amber-500 flex items-center justify-center text-white font-bold text-lg shadow-md select-none">
                            ${initials}
                        </div>
                        <!-- Details -->
                        <div class="min-w-0 flex-1">
                            <div class="font-bold text-slate-800 text-sm leading-snug truncate">${user.name}</div>
                            <div class="text-[11px] text-slate-500 mt-0.5">
                                ${user.matric ? `<span class="font-mono">${user.matric}</span> &bull; ` : ''}
                                <span class="text-amber-600 font-semibold">${user.category}</span>
                            </div>
                            ${user.supervisor ? `<div class="text-[10px] text-slate-400 mt-0.5 truncate">
                                <i class="ph-bold ph-graduation-cap text-[9px]"></i> ${user.supervisor}</div>` : ''}
                            <div class="mt-1 inline-flex items-center gap-1 px-1.5 py-0.5 bg-amber-100 border border-amber-300 rounded text-[9px] font-bold text-amber-700 uppercase tracking-wide">
                                <i class="ph-bold ph-warning text-[8px]"></i> External User
                            </div>
                        </div>
                        <!-- Change button -->
                        <div class="flex-shrink-0">
                            <button type="button" onclick="_imenianClearStrip(true)"
                                class="text-[9px] font-bold text-slate-400 hover:text-red-500 transition leading-tight">
                                Change
                            </button>
                        </div>
                    </div>`;
            } else {
                strip.innerHTML = `
                    <div class="flex items-center gap-3 p-3.5 bg-gradient-to-r from-emerald-50 to-indigo-50 rounded-2xl border border-emerald-200 shadow-sm">
                        <!-- Avatar: initials shown first, replaced by photo on load -->
                        <div class="relative flex-shrink-0 w-14 h-14">
                            <div id="imenian-initials"
                                 class="w-14 h-14 rounded-2xl bg-indigo-600 flex items-center justify-center text-white font-bold text-lg shadow-md select-none">
                                ${initials}
                            </div>
                            <img id="imenian-photo" src="" alt="${user.name}"
                                 class="hidden w-14 h-14 rounded-2xl object-cover absolute inset-0 shadow-md border-2 border-white">
                        </div>
                        <!-- Details -->
                        <div class="min-w-0 flex-1">
                            <div class="font-bold text-slate-800 text-sm leading-snug truncate">${user.name}</div>
                            <div class="text-[11px] text-slate-500 mt-0.5">
                                <span class="font-mono">${user.matric}</span>
                                &bull; <span class="text-indigo-600 font-semibold">${user.category}</span>
                            </div>
                            ${user.supervisor ? `<div class="text-[10px] text-slate-400 mt-0.5 truncate">
                                <i class="ph-bold ph-graduation-cap text-[9px]"></i> ${user.supervisor}</div>` : ''}
                        </div>
                        <!-- Verified badge -->
                        <div class="flex-shrink-0 flex flex-col items-center gap-1.5">
                            <div class="w-7 h-7 rounded-full bg-emerald-100 border border-emerald-200 flex items-center justify-center">
                                <i class="ph-bold ph-check text-emerald-600 text-xs"></i>
                            </div>
                            <button type="button" onclick="_imenianClearStrip(true)"
                                class="text-[9px] font-bold text-slate-400 hover:text-red-500 transition leading-tight">
                                Change
                            </button>
                        </div>
                    </div>`;

            strip.classList.remove('hidden');
        }

        // Clears the selection — optionally also clears the search text
        function _imenianClearStrip(clearInput = true) {
            _imenianSelected = false;
            const strip = document.getElementById('imenian-confirm-strip');
            if (strip) { strip.innerHTML = ''; strip.classList.add('hidden'); }
            if (clearInput) {
                const input = document.getElementById('imenian-search-input');
                if (input) { input.value = ''; input.focus(); }
            }
            const dropdown = document.getElementById('imenian-dropdown');
            if (dropdown) dropdown.classList.add('hidden');
            ['imenian-userName','imenian-userPhone','imenian-userEmail',
             'imenian-userId','imenian-affiliation','imenian-supervisor','imenian-isExternal'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            // Always revert to 2-day rule when selection is cleared
            _imenianApplyPicRule('');
        }

        // --- BACKEND INTEGRATION: INITIAL LOAD ---
        // Stale-while-revalidate: the last successful getInitialData payload is
        // cached in localStorage so repeat visits paint instantly; a background
        // getInitialData then replaces state with live data (identical end state
        // to a normal load). The backend stays the sole source of truth — every
        // write still goes to Apps Script; this cache is display-only.
        const DATA_CACHE_KEY = 'instrumen_data_v1';
        let systemStarted = false; // ensures polling + member-load start exactly once

        function readDataCache() {
            try {
                const raw = localStorage.getItem(DATA_CACHE_KEY);
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                if (!parsed || parsed.v !== 1 || !parsed.data || !Array.isArray(parsed.data.equipment)) return null;
                return parsed.data;
            } catch (e) { return null; }
        }

        function writeDataCache(backendData) {
            try {
                localStorage.setItem(DATA_CACHE_KEY, JSON.stringify({ v: 1, savedAt: Date.now(), data: backendData }));
            } catch (e) {
                // Quota exceeded / storage disabled — caching must never break the app
                try { localStorage.removeItem(DATA_CACHE_KEY); } catch (e2) {}
            }
        }

        // Small non-blocking indicator shown while cached data is being refreshed
        function showRefreshBadge(show) {
            let badge = document.getElementById('data-refresh-badge');
            if (show) {
                if (!badge) {
                    badge = document.createElement('div');
                    badge.id = 'data-refresh-badge';
                    badge.className = 'fixed bottom-4 right-4 z-[70] flex items-center gap-2 bg-white/95 border border-slate-200 shadow-lg rounded-full px-3 py-1.5 text-xs text-slate-500';
                    badge.innerHTML = '<i class="ph-bold ph-spinner animate-spin text-brand-600"></i><span>Refreshing data…</span>';
                    document.body.appendChild(badge);
                }
            } else if (badge) {
                badge.remove();
            }
        }

        // Single place backend data enters state — used by both the cached
        // instant paint and the live refresh, so the end state is identical.
        function applyBackendData(backendData) {
            // Map backend data to frontend state
            state.labs = backendData.labs || [];
            state.equipment = backendData.equipment || [];
            state.bookings = backendData.bookings || [];
            state.logs = backendData.logs || [];
            state.systemConfig = backendData.config || state.systemConfig;
            if (backendData.config && backendData.config.settings) {
    state.systemConfig.officialEmail = backendData.config.settings.officialEmail;
}
            // Ensure techStaff array always exists
            if (!state.systemConfig.techStaff) state.systemConfig.techStaff = [];
            state.lastArchive = backendData.lastArchive;

            // >> NEW LINE: CAPTURE THE REAL URL <<
            state.appUrl = backendData.appUrl;
        }

        function initSystem() {
            const cached = readDataCache();
            if (cached) {
                // Instant paint from the last known data; live refresh follows below
                applyBackendData(cached);
                state.isLoading = false;
                checkUrlParams();
                renderApp();
                showRefreshBadge(true);
            } else {
                // First visit (or cleared storage): same loading screen as always
                document.getElementById('main-content').innerHTML = `
                    <div class="flex flex-col items-center justify-center h-96 text-slate-400">
                        <i class="ph-bold ph-spinner animate-spin text-4xl mb-4 text-brand-600"></i>
                        <p>Connecting to Lab Database...</p>
                    </div>`;
            }

            // Live data: reuse the early fetch started in <head> (GitHub Pages
            // mode) if it's still pending, else issue a normal call.
            if (window.__initialDataPromise) {
                const p = window.__initialDataPromise;
                window.__initialDataPromise = null; // one-shot; manual refresh uses a live call
                p.then(function (data) {
                    if (data && data.ok) onFreshData(data.result);
                    else onFreshError(new Error((data && data.error) || 'Unknown API error'));
                }).catch(onFreshError);
            } else {
                google.script.run
                    .withSuccessHandler(onFreshData)
                    .withFailureHandler(onFreshError)
                    .getInitialData();
            }
        }

        function onFreshData(backendData) {
            writeDataCache(backendData);
            const firstRender = state.isLoading; // true only when nothing painted yet
            applyBackendData(backendData);
            state.isLoading = false;
            showRefreshBadge(false);

            if (firstRender) {
                checkUrlParams();
                renderApp();
            } else {
                // Cached view already on screen — swap in fresh data, but don't
                // yank the UI out from under an active user (same guard as polling)
                const isModalOpen = !getById('modal-overlay').classList.contains('hidden');
                const regForm = getById('register-form');
                const isRegistering = regForm && !regForm.classList.contains('hidden');
                if (!isModalOpen && !isRegistering) renderApp();
            }

            if (!systemStarted) {
                systemStarted = true;
                startPolling();
                // Start background cross-lab member load after 2s — page is fully rendered by then
                setTimeout(_imenianLoadAllUsers, 2000);
            }
        }

        function onFreshError(error) {
            showRefreshBadge(false);
            if (state.isLoading) {
                // Nothing on screen yet — same offline screen as always
                onLoadError(error);
            } else {
                // Cached view is showing; keep it usable and just report the failure
                showToast("Database Connection Failed: " + ((error && error.message) || error), "error");
            }
        }

        function onLoadError(error) {
            showToast("Database Connection Failed: " + error.message, "error");
            document.getElementById('main-content').innerHTML = `
                <div class="text-center p-10 text-red-500">
                    <h3 class="font-bold">System Offline</h3>
                    <p>Could not retrieve data from Google Sheets.</p>
                </div>`;
        }

		// --- BACKEND INTEGRATION: POLLING ---
        let pollingInterval;

        function startPolling() {
			// Run every 60 seconds (60000 ms)
            pollingInterval = setInterval(() => {
                // Check if user is busy
                const isModalOpen = !getById('modal-overlay').classList.contains('hidden');
                const regForm = getById('register-form');
                const isRegistering = regForm && !regForm.classList.contains('hidden');

                // STOP polling if user is doing something
                if (isModalOpen || isRegistering) {
                    console.log("Polling paused: User is active.");
                    return; 
                }

                // If user is idle, go ahead and fetch
                google.script.run
                    .withSuccessHandler(onPollSuccess)
                    .fetchUpdates(state.logs[0]?.timestamp); 
            }, 60000);
		  }

        function onPollSuccess(updates) {if (!updates) return;

            // SAFETY CHECK: Double-check if user became busy while request was in-flight
            const isModalOpen = !getById('modal-overlay').classList.contains('hidden');
            const regForm = getById('register-form');
            const isRegistering = regForm && !regForm.classList.contains('hidden');

            // If user is now busy, DO NOT refresh the screen
            if (isModalOpen || isRegistering) {
                console.log("Update received but ignored: User is busy.");
                return;
            }

            let hasNewData = false;

            // 1. Merge new logs
            if (updates.newLogs && updates.newLogs.length > 0) {
                const newItems = updates.newLogs.filter(r => !state.logs.some(l => l.id === r.id));
                if (newItems.length > 0) {
                    state.logs = [...newItems, ...state.logs];
                    hasNewData = true;
                    showToast("New activity detected", "info");
                }
            }

            // 2. Update Bookings (if status changed)
            if (updates.updatedBookings && updates.updatedBookings.length > 0) {
                updates.updatedBookings.forEach(serverBooking => {
                    const idx = state.bookings.findIndex(b => b.id === serverBooking.id);
                    if (idx !== -1) {
                        state.bookings[idx] = serverBooking; 
                        hasNewData = true;
                    }
                });
            }

            // Only re-render if safe to do so
            if (hasNewData || state.currentView === 'Monitoring') {
                renderApp();
            }}
		
        // Start the system
        initSystem();

    </script>
