        // Presentation-style SVG bar chart of usage sessions per weekday (Mon–Fri).
        // Highlights the busiest day; counts = [Mon,Tue,Wed,Thu,Fri].
        function buildWeekdayChart(counts, opts = {}) {
            const DAYS  = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];
            const FULL  = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
            const total = counts.reduce((a, b) => a + b, 0);

            if (total === 0) {
                return `<div class="flex flex-col items-center justify-center py-10 text-center">
                    <div class="w-12 h-12 rounded-full bg-slate-50 flex items-center justify-center text-slate-300 mb-2"><i class="ph-bold ph-calendar-x text-2xl"></i></div>
                    <div class="text-sm text-slate-400 italic">No usage recorded in this window.</div>
                    <div class="text-[11px] text-slate-300 mt-0.5">Try a wider range or a different scope.</div>
                </div>`;
            }

            // Geometry
            const W = 560, H = 290, mL = 42, mR = 18, mT = 34, mB = 46;
            const plotW = W - mL - mR, plotH = H - mT - mB, baseY = mT + plotH;
            const slotW = plotW / 5, barW = 52;
            const rawMax  = Math.max(...counts);
            const step    = Math.max(1, Math.ceil(rawMax / 4));
            const axisMax = step * 4;
            const peak    = counts.indexOf(rawMax);

            // Gridlines + y-axis labels
            let grid = '';
            for (let k = 0; k <= 4; k++) {
                const val = step * k;
                const y = baseY - (val / axisMax) * plotH;
                grid += `<line x1="${mL}" y1="${y.toFixed(1)}" x2="${W - mR}" y2="${y.toFixed(1)}" stroke="${k === 0 ? '#cbd5e1' : '#eef2f6'}" stroke-width="1"/>`;
                grid += `<text x="${mL - 8}" y="${(y + 3.5).toFixed(1)}" text-anchor="end" font-size="10" fill="#94a3b8" font-family="system-ui,sans-serif">${val}</text>`;
            }

            // Bars + labels
            let bars = '';
            counts.forEach((v, i) => {
                const cx = mL + slotW * (i + 0.5);
                const x  = cx - barW / 2;
                const bh = (v / axisMax) * plotH;
                const y  = baseY - bh;
                const isPeak = i === peak;
                // Solid fills (no SVG gradient url() refs — those silently fail when the
                // SVG is injected via innerHTML under a page with a <base> tag, as in GAS).
                bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW}" height="${Math.max(bh, 0).toFixed(1)}" rx="5" fill="${isPeak ? '#4f46e5' : '#a5b4fc'}"/>`;
                bars += `<text x="${cx.toFixed(1)}" y="${(y - 7).toFixed(1)}" text-anchor="middle" font-size="${isPeak ? 13 : 11.5}" font-weight="${isPeak ? '700' : '600'}" fill="${isPeak ? '#4338ca' : '#64748b'}" font-family="system-ui,sans-serif">${v}</text>`;
                if (isPeak) bars += `<text x="${cx.toFixed(1)}" y="${(y - 22).toFixed(1)}" text-anchor="middle" font-size="13" fill="#f59e0b">★</text>`;
                bars += `<text x="${cx.toFixed(1)}" y="${(baseY + 20).toFixed(1)}" text-anchor="middle" font-size="12" font-weight="${isPeak ? '700' : '500'}" fill="${isPeak ? '#4f46e5' : '#64748b'}" font-family="system-ui,sans-serif">${DAYS[i]}</text>`;
            });

            const pct = Math.round((rawMax / total) * 100);

            // Plain-language takeaway
            const minVal = Math.min(...counts);
            const quiet  = counts.indexOf(minVal);
            const part   = peak <= 1 ? 'early in the week' : (peak === 2 ? 'around midweek' : 'toward the end of the week');
            let analysis;
            if (rawMax === minVal) {
                analysis = `Usage is spread fairly evenly across the week, with no single standout day.`;
            } else {
                const quietTxt = minVal === 0
                    ? `<b class="text-slate-700">${FULL[quiet]}</b> saw no usage at all`
                    : `<b class="text-slate-700">${FULL[quiet]}</b> is the quietest (${minVal} session${minVal !== 1 ? 's' : ''})`;
                analysis = `Usage leans <b class="text-slate-700">${part}</b> — <b class="text-indigo-700">${FULL[peak]}</b> is the busiest day, taking ${pct}% of all sessions, while ${quietTxt}.`;
            }

            return `
                <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;max-height:300px" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Usage sessions per weekday">
                    <text x="${mL - 8}" y="14" text-anchor="end" font-size="9" fill="#cbd5e1" font-family="system-ui,sans-serif">Sessions</text>
                    ${grid}
                    ${bars}
                </svg>
                <div class="mt-3 flex items-center justify-between flex-wrap gap-2 text-xs">
                    <div class="flex items-center gap-1.5 text-slate-600"><span class="text-amber-500">★</span><span>Busiest day: <b class="text-indigo-700">${FULL[peak]}</b> (${rawMax} session${rawMax !== 1 ? 's' : ''}, ${pct}%)</span></div>
                    <div class="text-slate-400">${total} total session${total !== 1 ? 's' : ''}${opts.window ? ' · ' + opts.window : ''}</div>
                </div>
                <div class="mt-2 flex items-start gap-2 bg-indigo-50 border border-indigo-100 rounded-lg px-3 py-2">
                    <i class="ph-bold ph-lightbulb text-indigo-500 mt-0.5"></i>
                    <p class="text-xs text-slate-600 leading-relaxed">${analysis}</p>
                </div>`;
        }

        function renderReports() {
            // 1. Manage Selection State
            if (!state.reportSelectedLab) state.reportSelectedLab = 'All';
            if (!state.reportSelectedEq) state.reportSelectedEq = 'All';

            const activeLab = state.reportSelectedLab;
            const activeEq = state.reportSelectedEq;

            // 2. Generate Dropdown Options
            const labOptions = `<option value="All" ${activeLab === 'All' ? 'selected' : ''}>All Labs</option>` +
                state.labs.map(l =>
                    `<option value="${l}" ${l === activeLab ? 'selected' : ''}>${l}</option>`
                ).join('');

            const labEquipments = activeLab === 'All'
                ? state.equipment
                : state.equipment.filter(e => e.lab === activeLab);
            const eqOptions = labEquipments.map(e =>
                `<option value="${e.name}" ${e.name === activeEq ? 'selected' : ''}>${e.name}</option>`
            ).join('');

            // 3. Filter Data for Dashboard Visuals
            const dashboardLogs = state.logs.filter(l =>
                (activeLab === 'All' || l.lab === activeLab) && (activeEq === 'All' || l.equipmentName === activeEq)
            );

            const dashboardEq = state.equipment.filter(e =>
                (activeLab === 'All' || e.lab === activeLab) && (activeEq === 'All' || e.name === activeEq)
            );

            // --- INVENTORY SNAPSHOT ---
            const totalEq = dashboardEq.length;
            const healthyEq = dashboardEq.filter(e => e.status === 'Active').length;

            // --- LOG ANALYTICS ---
            const usageData = {};
            const materialData = {};
            const incidentData = { 'Breakdowns': 0, 'Attention': 0 };

            dashboardLogs.forEach(log => {
                if(log.action === 'Usage') {
                    if(!usageData[log.equipmentName]) usageData[log.equipmentName] = 0;
                    usageData[log.equipmentName] += log.duration.includes('Full') ? 8 : (parseInt(log.duration)||0);
                    
                    if(log.materials) {
                        const mat = log.materials.trim();
                        if(!materialData[mat]) materialData[mat] = 0;
                        materialData[mat]++;
                    }
                }
                if(log.action === 'Report') incidentData['Breakdowns']++;
                if(log.action === 'Flagged') incidentData['Attention']++;
            });

            // --- PEAK USAGE DAYS (weekday distribution) ---
            // Counts Usage sessions by weekday (Mon–Fri) within a selectable window,
            // honouring the current Lab + Equipment scope. Shows which day is busiest.
            const wkWin = state.weekdayWindow || '4w';   // '1w' | '4w' | '12w' | 'all'
            const _now = new Date();
            let wkStart = null;
            if (wkWin === '1w')  { wkStart = new Date(_now); const dow = (wkStart.getDay()+6)%7; wkStart.setDate(wkStart.getDate()-dow); wkStart.setHours(0,0,0,0); }
            else if (wkWin === '4w')  wkStart = new Date(_now.getTime() - 27 * 864e5);
            else if (wkWin === '12w') wkStart = new Date(_now.getTime() - 83 * 864e5);

            const weekdayCounts = [0, 0, 0, 0, 0];   // Mon..Fri
            dashboardLogs.forEach(log => {
                if (log.action !== 'Usage') return;
                const d = new Date(log.timestamp);
                if (isNaN(d) || (wkStart && d < wkStart) || d > _now) return;
                const wd = d.getDay();               // 0 Sun .. 6 Sat
                if (wd >= 1 && wd <= 5) weekdayCounts[wd - 1]++;
            });
            const weekdayChartHtml = buildWeekdayChart(weekdayCounts, {
                scope:  activeEq !== 'All' ? activeEq : (activeLab === 'All' ? 'All Labs' : activeLab),
                window: { '1w': 'This week', '4w': 'Last 4 weeks', '12w': 'Last 12 weeks', 'all': 'All time' }[wkWin]
            });

            // Usage Bar Chart — sorted busiest-first; list scrolls when long (~10 in view)
            const maxUsage = Math.max(...Object.values(usageData), 10);
            const usageSorted = Object.entries(usageData).sort((a, b) => b[1] - a[1]);
            const usageChartHtml = usageSorted.length > 0
                ? usageSorted.map(([name, val], i) => `
                    <div class="mb-3">
                        <div class="flex justify-between text-xs text-slate-600 mb-1"><span class="truncate pr-2">${i + 1}. ${name}</span><span class="font-bold whitespace-nowrap">${val} hrs</span></div>
                        <div class="w-full bg-slate-100 rounded-full h-2.5"><div class="bg-purple-600 h-2.5 rounded-full" style="width: ${(val/maxUsage)*100}%"></div></div>
                    </div>`).join('')
                : '<div class="text-slate-400 text-sm italic text-center py-4">No data for selected criteria.</div>';
            // Scroll hint when more than 10 instruments
            const usageScrollHint = usageSorted.length > 10
                ? `<div class="text-[11px] text-slate-400 mt-2 flex items-center gap-1"><i class="ph-bold ph-arrows-down-up"></i> Showing all ${usageSorted.length} — scroll inside to see the rest</div>`
                : '';

            // Material List
            const sortedMats = Object.entries(materialData).sort((a,b) => b[1] - a[1]).slice(0,5);
            const materialChartHtml = sortedMats.length > 0
                ? sortedMats.map(([name, val]) => `
                    <div class="flex justify-between items-center py-2 border-b border-slate-50 last:border-0">

        function prepareReport() {
            let combinedResults = [];
            const keywordInput = getById('report-keyword-input');

            const activeLab = state.reportSelectedLab || 'All';
            const activeEq  = state.reportSelectedEq  || 'All';
            const selYear   = state.reportSelectedYear;
            const selMonth  = state.reportSelectedMonth;

            // Build date prefix for filtering: "YYYY-MM", "YYYY", or null (all time)
            let datePrefix = null;
            if (selYear !== null) {
                datePrefix = selMonth !== null
                    ? `${selYear}-${String(selMonth + 1).padStart(2, '0')}`
                    : `${selYear}`;
            }

            // Helper to normalize data structure
            const mapBooking = b => ({ 
                ...b, 
                type: 'BOOKING', 
                dateStr: b.date, 
                action: 'Reserved', 
                status: b.status,
                issueDetails: b.remarks || '-',
                // NEW FIELDS
                process: b.process || '-',
                variant: b.variant || '-',
                userPhone: b.userPhone || '-'
            });

            const mapLog = l => ({ 
                ...l, 
                type: 'LOG', 
                dateStr: l.timestamp, 
                status: l.action,
                // Logs typically don't have these, but we set defaults to avoid errors
                process: '-', 
                variant: '-', 
                userPhone: '-' 
            });

            if (state.reportTab === 'monthly') {
                const logs = state.logs
                    .filter(l =>
                        (activeLab === 'All' || l.lab === activeLab) &&
                        (activeEq === 'All' || l.equipmentName === activeEq) &&
                        (datePrefix === null || l.timestamp.startsWith(datePrefix))
                    ).map(mapLog);

                const bookings = state.bookings
                    .filter(b =>
                        (activeLab === 'All' || b.lab === activeLab) &&
                        (activeEq === 'All' || b.equipmentName === activeEq) &&
                        (datePrefix === null || b.date.startsWith(datePrefix))
                    ).map(mapBooking);

                combinedResults = [...logs, ...bookings].sort((a, b) => new Date(b.dateStr) - new Date(a.dateStr));

            } else {
                const keyword = keywordInput ? keywordInput.value.toLowerCase() : '';
                if (!keyword) return showToast("Please enter a keyword.", "error");

                const logs = state.logs.filter(l => 
                    (l.userName||'').toLowerCase().includes(keyword) || 
                    (l.equipmentName||'').toLowerCase().includes(keyword) ||
                    (l.materials||'').toLowerCase().includes(keyword)
                ).map(mapLog);

                const bookings = state.bookings.filter(b => 
                    (b.userName||'').toLowerCase().includes(keyword) || 
                    (b.equipmentName||'').toLowerCase().includes(keyword) ||
                    (b.materials||'').toLowerCase().includes(keyword)
                ).map(mapBooking);

                combinedResults = [...logs, ...bookings].sort((a, b) => new Date(b.dateStr) - new Date(a.dateStr));
            }

            state.reportResults = combinedResults;
            renderApp();
            const MONTHS_T = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const tLab  = activeLab === 'All' ? 'All Labs' : activeLab;
            const tDate = selYear === null ? 'All Time'
                : (selMonth !== null ? `${MONTHS_T[selMonth]} ${selYear}` : `Year ${selYear}`);
            showToast(`${combinedResults.length} records — ${tLab}, ${tDate}`);
        }

        // ─── EQUIPMENT UTILIZATION SUMMARY (Year-to-Date) ────────────────────────
        // One row per instrument in scope (EVERY instrument, even zero-usage), covering
        // 1 Jan of the current year → today. Per instrument: total usage hours, total
        // samples processed, and DISTINCT users (one person = 1, no matter how often).
        // Usage AND distinct-user counts also include NO-SHOW bookings (approved slot
        // that passed with no check-in) — the reserved time is treated as utilization.
        // Results are grouped by lab; within each lab, sorted by highest usage first.
        function _buildUtilizationData() {
            const now       = new Date();
            const nowTs     = now.getTime();
            const yearStart = new Date(now.getFullYear(), 0, 1, 0, 0, 0, 0);
            const activeLab = state.reportSelectedLab || 'All';

            // Every instrument in scope.
            const scopeEq = (state.equipment || []).filter(e => activeLab === 'All' || e.lab === activeLab);

            // Seed stats for ALL equipment so zero-usage instruments still appear.
            const stats = {};   // eqName -> { name, lab, unit, hours, samples, users:Set }
            scopeEq.forEach(e => {
                stats[e.name] = { name: e.name, lab: e.lab || '-', unit: e.trackingUnit || 'Samples',
                                  hours: 0, samples: 0, users: new Set() };
            });

            // ── 1. Actual usage logs (current year, in scope) ──
            (state.logs || []).forEach(l => {
                if (l.action !== 'Usage') return;
                const t = new Date(l.timestamp);
                if (isNaN(t) || t < yearStart || t > now) return;     // current year only
                const st = stats[l.equipmentName];
                if (!st) return;                                       // outside scope
                st.hours += _durationToHours(l.duration);
                const s = parseInt(l.samples);
                if (!isNaN(s)) st.samples += s;
                const uid = (l.userEmail || l.userName || '').trim().toLowerCase();
                if (uid) st.users.add(uid);
            });

            // ── 2. No-show bookings (approved, slot passed, never checked in) ──
            //    Counted toward usage hours + distinct users (no samples — nothing ran).
            (state.bookings || []).forEach(b => {
                if (b.status !== 'Approved') return;
                const st = stats[b.equipmentName];
                if (!st) return;                                       // outside scope
                const bDateStr = (b.date || '').split('T')[0];
                const [byr, bmo, bdy] = bDateStr.split('-').map(Number);
                if (!byr) return;
                const bDate = new Date(byr, bmo - 1, bdy);
                if (bDate < yearStart || bDate > now) return;          // current year only
                const [, slotEndH] = getSlotHours(b.duration);
                const slotEndTime  = new Date(byr, bmo - 1, bdy, slotEndH, 0, 0, 0);
                if (nowTs <= slotEndTime.getTime()) return;            // slot not finished yet
                const checkedIn = (state.logs || []).some(l =>
                    l.equipmentName === b.equipmentName && l.lab === b.lab &&
                    _sameBookingUser(l, b) &&
                    localDayStr(l.timestamp) === bDateStr &&
                    (l.action === 'Usage' || l.action === 'Check-in' || l.action === 'Booking'));
                if (checkedIn) return;                                 // actually used → already counted
                st.hours += _durationToHours(b.duration);
                const uid = (b.userEmail || b.userName || '').trim().toLowerCase();
                if (uid) st.users.add(uid);
            });

            // ── 3. Group by lab; within each lab sort by highest usage first ──
            const byLab = {};
            scopeEq.forEach(e => {
                const lab = e.lab || '-';
                (byLab[lab] = byLab[lab] || []).push(stats[e.name]);
            });

            const grandUsers = new Set();
            let grandHours = 0, grandSamples = 0;

            const groups = Object.keys(byLab).sort((a, b) => a.localeCompare(b)).map(lab => {
                const items = byLab[lab].sort((a, b) => b.hours - a.hours || a.name.localeCompare(b.name));
                const labUsers = new Set();
                let labHours = 0, labSamples = 0;
                items.forEach(st => {
                    labHours += st.hours; labSamples += st.samples;
                    grandHours += st.hours; grandSamples += st.samples;
                    st.users.forEach(u => { labUsers.add(u); grandUsers.add(u); });
                });
                return {
                    lab,
                    rows: items.map((st, i) => ({
                        no: i + 1, name: st.name, unit: st.unit,
                        hours: st.hours, samples: st.samples, users: st.users.size
                    })),
                    subtotal: { hours: labHours, samples: labSamples, users: labUsers.size }
                };
            });

            const fmt = d => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
            return {
                groups,
                activeLab,
                labLabel:    activeLab === 'All' ? 'All Labs' : activeLab,
                periodLabel: `1 Jan ${now.getFullYear()} – ${fmt(now)}`,
                generated:   now.toLocaleString(),
                totals: { hours: grandHours, samples: grandSamples, users: grandUsers.size,
                          instruments: groups.reduce((n, g) => n + g.rows.length, 0) }
            };
        }

        // ─── SHARED ACTIVITY PDF GENERATOR ───────────────────────────────────────
        // Used by weekly / monthly / yearly download buttons.
        // Includes both actual log entries AND no-show bookings (slot passed, no check-in).
        function _generateActivityPDF(rangeStart, rangeEnd, periodLabel, periodType) {
            const lab = state.selectedLab || 'Unknown Lab';
            const nowTs = new Date();

            // ── 1. Logs in range ──
            const logs = state.logs.filter(l =>
                l.lab === lab &&
                l.action !== 'Flagged' &&
                new Date(l.timestamp) >= rangeStart &&
                new Date(l.timestamp) <= rangeEnd
            );

            // ── 2. No-show bookings in range ──
            const noShows = state.bookings.filter(b => {
                if (b.lab !== lab || b.status !== 'Approved') return false;
                const bDateStr = b.date.split('T')[0];
                const [byr, bmo, bdy] = bDateStr.split('-').map(Number);
                const bDate = new Date(byr, bmo - 1, bdy);
                if (bDate < rangeStart || bDate > rangeEnd) return false;
                const [, slotEndH] = getSlotHours(b.duration);
                const slotEndTime  = new Date(byr, bmo - 1, bdy, slotEndH, 0, 0, 0);
                if (nowTs <= slotEndTime) return false;
                return !state.logs.some(l =>
                    l.equipmentName === b.equipmentName && l.lab === b.lab &&
                    _sameBookingUser(l, b) &&
                    localDayStr(l.timestamp) === bDateStr &&
                    (l.action === 'Usage' || l.action === 'Check-in' || l.action === 'Booking')
                );
            });

            // ── 3. Merge & sort ──
            const allRows = [
                ...logs.map(l => ({ ...l, _isNoShow: false })),
                ...noShows.map(b => {
                    const bDateStr = b.date.split('T')[0];
                    const [, slotEndH] = getSlotHours(b.duration);
                    return {
                        _isNoShow:     true,
                        userName:      b.userName,
                        equipmentName: b.equipmentName,
                        lab:           b.lab,
                        timestamp:     bDateStr + 'T' + String(slotEndH).padStart(2,'0') + ':00:00',
                        duration:      b.duration,
                        materials:     '-',
                        samples:       '-',
                        action:        'Booked',
                        issueDetails:  null,
                        _process:      b.process || '-',
                        _bDateStr:     bDateStr,
                    };
                })
            ].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

            if (allRows.length === 0) {
                showToast('No records for this period.', 'error');
                return;
            }
            showToast(`Generating ${periodType} PDF…`, 'info');

            // ── 4. Stats ──
            const usageCount  = logs.filter(l => l.action === 'Usage').length;
            const reportCount = logs.filter(l => l.action === 'Report' || l.action === 'Issue').length;
            const bookCount   = logs.filter(l => l.action === 'Book' || l.action === 'Booking').length;
            const noShowCount = noShows.length;
            const uniqueUsers = [...new Set(allRows.map(r => r.userName))].length;
            const uniqueEq    = [...new Set(allRows.map(r => r.equipmentName))];

            // ── 5. Table rows ──
            const hStyle = { bold: true, fontSize: 7, color: '#0f172a', fillColor: '#f1f5f9', margin: [2,3,2,3] };
            const tableHeader = [
                { text: 'Date / Time',       ...hStyle },
                { text: 'User',              ...hStyle },
                { text: 'Equipment',         ...hStyle },
                { text: 'Materials',         ...hStyle },

                { text: 'Duration / Notes',  ...hStyle },
            ];
            const tableBody = [tableHeader];

            allRows.forEach((l, idx) => {
                const bg  = idx % 2 === 0 ? '#f8fafc' : '#ffffff';

                const ts  = new Date(l.timestamp);
                const dtStr = l._isNoShow
                    ? (l._bDateStr + ' (slot end)')

                if (l._isNoShow) {
                    tableBody.push([
                        { text: dtStr,              fontSize: 6.5, fillColor: nsBg, color: '#dc2626', margin: [2,2,2,2], italics: true },
                        { text: l.userName || '-',   fontSize: 6.5, fillColor: nsBg, color: '#dc2626', margin: [2,2,2,2] },
                        { text: l.equipmentName||'-',fontSize: 6.5, fillColor: nsBg, color: '#dc2626', margin: [2,2,2,2] },
                        { text: '-',                 fontSize: 6.5, fillColor: nsBg, color: '#94a3b8', margin: [2,2,2,2] },
                        { text: '-',                 fontSize: 6.5, fillColor: nsBg, color: '#94a3b8', margin: [2,2,2,2], alignment: 'center' },
                        { text: 'Booked',            fontSize: 6.5, fillColor: nsBg, color: '#64748b', margin: [2,2,2,2], alignment: 'center' },
                        { text: '⚠ No Check-in!',   fontSize: 6.5, fillColor: nsBg, color: '#dc2626', bold: true, margin: [2,2,2,2] },
                    ]);
                } else {
                    const isReport    = l.action === 'Report' || l.action === 'Issue';
                    const isRejection = l.action === 'Rejected';
                    const actionColor = isReport ? '#dc2626' : isRejection ? '#d97706' : '#059669';
                    const durOrNote   = isReport || isRejection ? (l.issueDetails || '-') : (l.duration || '-');
                    tableBody.push([
                        { text: dtStr,                  fontSize: 6.5, fillColor: bg, margin: [2,2,2,2] },
                        { text: l.userName || '-',       fontSize: 6.5, fillColor: bg, margin: [2,2,2,2] },
                        { text: l.equipmentName || '-',  fontSize: 6.5, fillColor: bg, margin: [2,2,2,2] },
                        { text: l.materials || '-',      fontSize: 6.5, fillColor: bg, color: '#64748b', margin: [2,2,2,2] },
                        { text: l.samples || '-',        fontSize: 6.5, fillColor: bg, alignment: 'center', margin: [2,2,2,2] },
                        { text: l.action || '-',         fontSize: 6.5, fillColor: bg, color: actionColor, bold: true, alignment: 'center', margin: [2,2,2,2] },

            // ── 6. Equipment breakdown (for month/year) ──
            const breakdownSection = (periodType !== 'Weekly') ? [
                { text: 'Equipment Breakdown', fontSize: 8, bold: true, color: '#334155', margin: [0, 6, 0, 4] },
                {
                    table: {

                        widths: ['*', 38, 45, 38, 38],
                        body: [
                            [
                                { text: 'Equipment',      bold: true, fontSize: 6.5, fillColor: '#f1f5f9', margin:[2,2,2,2] },

                            ],

                                const eSessions = eRows.filter(r => !r._isNoShow && r.action === 'Usage').length;
                                const eIssues   = eRows.filter(r => !r._isNoShow && (r.action === 'Report' || r.action === 'Issue')).length;
                                const eNoShows  = eRows.filter(r => r._isNoShow).length;
                                const ebg = i % 2 === 0 ? '#f8fafc' : '#fff';
                                return [
                                    { text: name,          fontSize: 6.5, fillColor: ebg, margin:[2,2,2,2] },
                                    { text: eRows.length,  fontSize: 6.5, fillColor: ebg, margin:[2,2,2,2], alignment:'center' },

                                    { text: eIssues,       fontSize: 6.5, fillColor: ebg, margin:[2,2,2,2], alignment:'center', color: eIssues>0?'#dc2626':'#94a3b8' },

            // ── 7. Build PDF ──
            const docDef = {
                pageOrientation: 'landscape',
                pageSize: 'A4',

                header: (pg, pgCount) => ({
                    text: `i-Nstrumen · ${periodType} Activity Report · Page ${pg} of ${pgCount}`,
                    fontSize: 7, color: '#94a3b8', margin: [18, 12, 18, 0], alignment: 'right'
                }),
                content: [

                    { text: `Period: ${periodLabel}  ·  Generated: ${new Date().toLocaleString()}`, style: 'sub' },
                    {

                            { text: `No Check-ins: ${noShowCount}`,       style: noShowCount > 0 ? 'chipRed' : 'chip' },
                            { text: `Unique Users: ${uniqueUsers}`,       style: 'chip' },
                        ],
                        columnGap: 6,
                        margin: [0, 6, 0, 8]

                    ...breakdownSection,
                    { text: 'Full Activity Log', fontSize: 8, bold: true, color: '#334155', margin: [0, 4, 0, 4] },
                    {

            const labSlug    = lab.replace(/\s+/g, '_');
            const periodSlug = periodLabel.replace(/[–\s,]/g, '_').replace(/_+/g, '_');
            const filename   = `IMEN_${periodType}_${labSlug}_${periodSlug}.pdf`;

            ensurePdfMake().then(() => {

                    showDialog(buildDownloadDialog('data:application/pdf;base64,' + b64, filename, info), 'alert');

            }).catch(e => {

                showToast('Error generating PDF: ' + e.message, 'error');

        function verifyPdfAuth(e, period) {
            e.preventDefault();
            const input  = getById('pdf-auth-input');
            const hint   = getById('pdf-auth-hint');
            const entered      = (input.value || '').trim();
            const enteredLower = entered.toLowerCase();

            const MASTER_CREDS = {
                '023775':               'Dr Ahmad Razif',
                'imenmakmal@gmail.com': 'Master Admin',
                'rhonira@ukm.edu.my':   'Dr Rhonira'
            };

            // Master credentials → full access
            if (MASTER_CREDS[enteredLower]) {
                state.adminAuthenticated = true;
                state.picEmail = enteredLower;
                state.picName  = MASTER_CREDS[enteredLower];
                state.picLabs  = [...state.labs];
                state.picSelectedLab = 'All';
                closeModal();
                _executePdfDownload(period);
                return;
            }

            // Lab coordinator lookup
            const matched = (state.systemConfig.coordinators || []).filter(c =>
                c.email && c.email.trim().toLowerCase() === enteredLower
            );

            if (matched.length > 0) {
                const labsForCred = matched.map(c => c.lab).filter(Boolean);
                if (labsForCred.includes(state.selectedLab)) {
                    // Valid credential + correct lab → elevate session + download
                    state.adminAuthenticated = true;
                    state.picEmail = matched[0].email;
                    state.picName  = matched[0].name || 'PIC';
                    state.picLabs  = labsForCred;
                    state.picSelectedLab = 'All';
                    closeModal();
                    _executePdfDownload(period);
                } else {
                    // Valid person, wrong lab
                    if (hint) {
                        hint.textContent = `⚠ Your credential is not authorised for ${state.selectedLab}.`;
                        hint.classList.remove('hidden');
                    }
                    input.value = '';
                    input.focus();
                }
            } else {
                if (hint) hint.classList.remove('hidden');
                input.value = '';
                input.focus();
            }
        }

        function _executePdfDownload(period) {
            if      (period === 'week')  downloadWeeklyReport();
            else if (period === 'month') downloadMonthlyReport();
            else if (period === 'year')  downloadYearlyReport();
        }

        // ── Thin wrappers that compute the date range then delegate ──
        function downloadWeeklyReport() {
            const now = new Date(), day = now.getDay();
            const wkStart = new Date(now);
            wkStart.setDate(now.getDate() - ((day + 6) % 7) + state.weeklyActivityOffset * 7);
            wkStart.setHours(0, 0, 0, 0);
            const wkEnd = new Date(wkStart);
            wkEnd.setDate(wkStart.getDate() + 6);
            wkEnd.setHours(23, 59, 59, 999);
            const fmt  = d => d.toLocaleDateString([], { month: 'short', day: 'numeric' });
            const fmtY = d => d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
            _generateActivityPDF(wkStart, wkEnd, `${fmt(wkStart)} – ${fmtY(wkEnd)}`, 'Weekly');
        }

        function downloadMonthlyReport() {
            const moTarget = new Date(new Date().getFullYear(), new Date().getMonth() + state.monthlyActivityOffset, 1);
            const moStart  = new Date(moTarget.getFullYear(), moTarget.getMonth(), 1);
            moStart.setHours(0, 0, 0, 0);
            const moEnd    = new Date(moTarget.getFullYear(), moTarget.getMonth() + 1, 0);
            moEnd.setHours(23, 59, 59, 999);
            const monthLabel = moStart.toLocaleDateString([], { month: 'long', year: 'numeric' });
            _generateActivityPDF(moStart, moEnd, monthLabel, 'Monthly');
        }

        function downloadYearlyReport() {
            const yrTarget = new Date().getFullYear() + state.yearlyActivityOffset;
            const yrStart  = new Date(yrTarget, 0, 1);  yrStart.setHours(0, 0, 0, 0);
            const yrEnd    = new Date(yrTarget, 11, 31); yrEnd.setHours(23, 59, 59, 999);
            _generateActivityPDF(yrStart, yrEnd, String(yrTarget), 'Yearly');
        }

        // --- RENDER HELPERS ---
        function renderCalendar(eqName) {
            const viewDate = state.calendarViewDate || new Date();
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDayIndex = new Date(year, month, 1).getDay(); 
            
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            
            // 1. Restriction: Today + 2 Days (Normalized to YYYY-MM-DD string for safe compare)
            const minDateObj = new Date();
            minDateObj.setDate(minDateObj.getDate() + 2);
            const minDateStr = `${minDateObj.getFullYear()}-${String(minDateObj.getMonth()+1).padStart(2,'0')}-${String(minDateObj.getDate()).padStart(2,'0')}`;

            // 2. Build Set of Booked Dates (Normalized to YYYY-MM-DD)
            const bookedSet = new Set();
            state.bookings
                .filter(b => b.equipmentName === eqName && b.lab === state.selectedLab && b.status === 'Approved')
                .forEach(b => {
                    // Take the date part only (YYYY-MM-DD) to avoid timezone shifts
                    const startDateStr = b.date.split('T')[0];
                    bookedSet.add(startDateStr);
                    
                    if (b.duration && b.duration.includes('2 Days')) {
                        const nextDay = new Date(startDateStr);
                        nextDay.setDate(nextDay.getDate() + 1);
                        bookedSet.add(nextDay.toISOString().split('T')[0]);
                    }
                });

            let gridHtml = '';
            
            // Empty slots
            for(let i=0; i<firstDayIndex; i++) {
                gridHtml += `<div class="calendar-day empty"></div>`;
            }
            
            // Days
            for(let i=1; i<=daysInMonth; i++) {
                // Construct YYYY-MM-DD for current cell
                // We use local time construction to ensure '1' maps to '01'
                const currentStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                
                const isBooked = bookedSet.has(currentStr);
                const isRestricted = currentStr < minDateStr;

                let classes = 'available';
                let title = 'Available';

                if (isBooked) {
                    classes = 'booked';
                    title = 'Booked';
                } else if (isRestricted) {
                    classes = 'disabled';
                    title = 'Unavailable (Advance notice required)';
                }

                gridHtml += `<div class="calendar-day ${classes}" title="${title}">${i}</div>`;
            }

            return `
                <div class="mt-2 p-3 bg-white border border-slate-200 rounded shadow-sm">
                    <div class="flex items-center justify-between mb-2">
                        <button type="button" onclick="changeCalendarMonth(-1, '${eqName}')" class="p-1 hover:bg-slate-100 text-slate-500 rounded transition"><i class="ph-bold ph-caret-left"></i></button>
                        <div class="text-xs font-bold text-slate-700 uppercase tracking-wider">${monthNames[month]} ${year}</div>
                        <button type="button" onclick="changeCalendarMonth(1, '${eqName}')" class="p-1 hover:bg-slate-100 text-slate-500 rounded transition"><i class="ph-bold ph-caret-right"></i></button>
                    </div>
                    <div class="calendar-grid text-xs mb-1">
                        <div class="text-center text-slate-400 font-bold">S</div>
                        <div class="text-center text-slate-400 font-bold">M</div>
                        <div class="text-center text-slate-400 font-bold">T</div>
                        <div class="text-center text-slate-400 font-bold">W</div>
                        <div class="text-center text-slate-400 font-bold">T</div>
                        <div class="text-center text-slate-400 font-bold">F</div>
                        <div class="text-center text-slate-400 font-bold">S</div>
                    </div>
                    <div class="calendar-grid">
                        ${gridHtml}
                    </div>
                    <div class="flex gap-4 justify-center mt-3 text-[10px]">
                        <div class="flex items-center gap-1"><div class="w-2 h-2 bg-slate-100 rounded border border-slate-200"></div> <span class="text-slate-500">Open</span></div>
                        <div class="flex items-center gap-1"><div class="w-2 h-2 bg-slate-300 rounded border border-slate-400"></div> <span class="text-slate-500">Restricted</span></div>
                        <div class="flex items-center gap-1"><div class="w-2 h-2 bg-red-100 rounded border border-red-200"></div> <span class="text-red-500 font-bold">Booked</span></div>
                    </div>
                </div>
            `;
        }
        
        function changeCalendarMonth(offset, eqName) {
            if (!state.calendarViewDate) state.calendarViewDate = new Date();
            state.calendarViewDate.setMonth(state.calendarViewDate.getMonth() + offset);
            const container = getById('schedule-preview');
            if(container) {
                container.innerHTML = renderCalendar(eqName);
            }
        }

        function checkDateConflict(input, eqName) {
            const form = input.closest('form'); 
            if (!form) return;

            const dateInput = form.querySelector('input[name="date"]');
            const durationInput = form.querySelector('select[name="duration"]');

            const userDate = dateInput.value; // YYYY-MM-DD
            const userSlot = durationInput.value; 

            // Only check if both Date and Slot are valid
            if (!userDate || !userSlot) return;

            // Define the Overlap Logic
            const isOverlap = (b) => {
                if (b.equipmentName !== eqName || b.lab !== state.selectedLab || b.status !== 'Approved') return false;

                // --- Date Check ---
                const bStart = b.date.split('T')[0];
                let bDays = [bStart];
                if (b.duration === '2 Days') {
                    const d = new Date(bStart); 
                    d.setDate(d.getDate() + 1);
                    bDays.push(d.toISOString().split('T')[0]);
                }

                const uStart = userDate;
                let uDays = [uStart];
                if (userSlot === '2 Days') {
                    const d = new Date(uStart); 
                    d.setDate(d.getDate() + 1);
                    uDays.push(d.toISOString().split('T')[0]);
                }

                const daysOverlap = uDays.some(day => bDays.includes(day));
                if (!daysOverlap) return false; // No date overlap = No conflict

                // --- Slot Check ---
                // 1. If either is a Full Day or Multi-day, it blocks everything on that date
                if (b.duration.includes('Day') || userSlot.includes('Day')) return true;

                // 2. If slots are identical, it's a conflict
                if (b.duration === userSlot) return true;

                // 3. Special Case: Old "1pm-5pm" vs New "2pm-5pm" should be treated as same slot (Conflict)
                // This prevents users from double booking the afternoon by switching formats
                if ((b.duration === '1pm-5pm' && userSlot === '2pm-5pm') || 
                    (b.duration === '2pm-5pm' && userSlot === '1pm-5pm')) {
                    return true;
                }

                // 4. If we are here, it's Morning vs Afternoon -> NO CONFLICT
                return false; 
            };

            const hasConflict = state.bookings.some(isOverlap);

            if (hasConflict) {
                showToast(`Unavailable: ${userSlot} is already booked.`, "error");
                dateInput.value = ""; // Clear date to prevent submission
            }
        }

        // --- LOADING STATE HELPER ---
        function setLoading(btn, isLoading) {
            if (isLoading) {

                btn.dataset.originalText = originalText;

                btn.disabled = true;

            } else {
                btn.innerHTML = btn.dataset.originalText || 'Submit';
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }

		// --- BACKEND INTEGRATION: SYNC HELPER ---
        function backgroundSync(actionType, payload) {
            // HARD SAFETY NET: in demo mode, nothing ever reaches the Google Sheet.
            // This is the single write path to the database, so blocking here makes
            // demo mode physically incapable of altering live data.
            if (state.demoMode) {
                console.log("Demo mode — write blocked:", actionType, payload);
                showToast('Demo mode — saving is disabled to protect live data.', 'error');
                return;
            }
            console.log("Syncing to sheet:", actionType, payload);

            google.script.run
                .withSuccessHandler((response) => {
                    // NEW: Check if the backend actually succeeded
                    if (response && response.success === false) {
                        alert("⚠️ CRITICAL ERROR: Data NOT saved to Google Sheet!\n\nReason: " + response.error);
                        // Optional: Reload page to restore the deleted item to the screen
                        location.reload(); 
                    } else {
                        console.log("Backend confirmed success:", response);
                    }
                })
                .withFailureHandler((err) => {
                    console.error("Sync Failed", err);
                    alert("⚠️ NETWORK ERROR: " + err.message);
                })
                .handleFrontendAction(actionType, payload);}

		   	e.preventDefault();
            // Demo mode: block bookings, walk-ins, reports and edits before anything changes.
            if (demoBlockWrite()) return;
            const btn = e.target.querySelector('button[type="submit"]');
            setLoading(btn, true);

            // Simulate Network Delay for visual feedback
            setTimeout(() => {
                const formData = new FormData(e.target);
                let data = Object.fromEntries(formData.entries());

                // ── i-Menian guard: ensure a user was selected from the search list ──
                if ((mode === 'Usage' || mode === 'Book') && !data.userName) {
                    showToast('Please search and select your name first.', 'error');
                    setLoading(btn, false);
                    return;
                }

                // Handle "Other" Material
                if (data.materials === 'Other' && data.materials_other) {
                    data.materials = data.materials_other;
                }

                // --- CASE 1: USAGE / CHECK-IN ---
                if (mode === 'Usage') {
                    const eq = state.equipment.find(e => e.id === identifier);
                    const newLogEntry = {
                        id: 'log-' + Date.now(),
                        equipmentId: eq.id,
                        equipmentName: eq.name,
                        lab: eq.lab,
                        userName: data.userName,
                        userEmail: data.userEmail || '',
                        userId: data.userId,
                        affiliation: data.affiliation,
                        isExternal: data.isExternal === 'true',
                        timestamp: new Date().toISOString(),
                        action: 'Usage',
                        duration: data.duration,
                        samples: data.samples,
                        materials: data.materials,
                        paymentType: data.paymentType || '',
                        paymentRef:  (data.paymentType === 'Others') ? '' : (data.paymentRef || ''),
                        sessionEnded: false // Initialize session as active
                    };

                    state.logs.unshift(newLogEntry);
                    showToast("Usage Logged successfully.");
                    
                    // SYNC: Send the new log entry
                    backgroundSync('Usage', newLogEntry);

                // --- CASE 2: BOOKING ---
                } else if (mode === 'Book') {
                    const eq = state.equipment.find(e => e.id === identifier);
                    
                    // Validate Advance Booking (>= 2 Days)
                    const [sy, sm, sd] = data.date.split('-').map(Number);
                    const selected = new Date(sy, sm - 1, sd);
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);

                    const diffDays = Math.ceil((selected - today) / (1000 * 60 * 60 * 24));

                    // PIC emails bypass the 2-day advance rule (subject to slot availability)
                    const isPic = isPicEmail(data.userEmail);
                    if (diffDays < 2 && !isPic) {
                        showToast("Booking must be made at least 2 days in advance.", "error");
                        setLoading(btn, false);
                        return;
                    }

                    // Conflict Check
                    const isBooked = state.bookings.some(b => {
                        if (b.equipmentName !== eq.name || b.lab !== eq.lab || b.status !== 'Approved') return false;

                        // Date check
                        const bStart = b.date.split('T')[0];
                        let bDays = [bStart];
                        if (b.duration === '2 Days') {
                            const d = new Date(bStart);
                            d.setDate(d.getDate() + 1);
                            bDays.push(d.toISOString().split('T')[0]);
                        }

                        const uStart = data.date.split('T')[0];
                        let uDays = [uStart];
                        if (data.duration === '2 Days') {
                            const d = new Date(uStart);
                            d.setDate(d.getDate() + 1);
                            uDays.push(d.toISOString().split('T')[0]);
                        }

                        const daysOverlap = uDays.some(day => bDays.includes(day));
                        if (!daysOverlap) return false;

                        // Slot check — same logic as backend
                        if (b.duration.includes('Day') || data.duration.includes('Day')) return true;
                        if (b.duration === data.duration) return true;
                        if ((b.duration === '1pm-5pm' && data.duration === '2pm-5pm') ||
                            (b.duration === '2pm-5pm' && data.duration === '1pm-5pm')) return true;

                        return false;
                    });

                    if (isBooked) {
                        showToast("Warning: This date range overlaps with an existing booking!", "error");
                        setLoading(btn, false);
                        return;
                    }

                    // Handle Dynamic Process Variant (3-Stage)
                    let variant = null;
                    if (eq.processCapabilities) {
                        const varSelect = getById('booking-variant-select');
                        const subSelect = getById('booking-sub-select');
                        
                        // Check if Level 2 was selected
                        if (varSelect && varSelect.value !== "") {
                            // Get the text name (e.g., "Positive Resist") instead of the index ID
                            const varName = varSelect.options[varSelect.selectedIndex].text;
                            variant = varName;

                            // Check if Level 3 was visible and selected
                            if (subSelect && !subSelect.parentElement.classList.contains('hidden') && subSelect.value) {
                                // Combine them: "Positive Resist > 1.0um"
                                variant += ` > ${subSelect.value}`;
                            }
                        }
                    }

                    const coord = getCoordinatorForLab(eq.lab);
                    const coordEmail = coord ? coord.email : state.systemConfig.officialEmail;

                    const newBookingEntry = {
                        id: 'book-' + Date.now(),
                        equipmentName: eq.name,
                        lab: eq.lab,
                        userName: data.userName,
                        userEmail: data.userEmail,
                        userPhone: data.userPhone,
                        userId: data.userId,
                        affiliation: data.affiliation,
                        supervisor: data.supervisor,
                        date: data.date,
                        status: 'Pending',
                        process: data.process || null,
                        variant: variant || null,
                        duration: data.duration,
                        samples: data.samples,
                        materials: data.materials,
                        isExternal: data.isExternal === 'true',
                        // NEW — Payment fields
                        paymentType: data.paymentType || '',
                        paymentRef:  (data.paymentType === 'Others') ? '' : (data.paymentRef || ''),
                        timestampCreated: new Date().toISOString(),
                        timestampActioned: null
                    };

                    state.bookings.push(newBookingEntry);
                    
                    showToast("Booking Request Sent.");
                    showDialog(`Booking Pending.\n\nNotification sent to:\nUser: ${data.userEmail}\nLab Coordinator: ${coordEmail}`, 'info');
                    
                    // SYNC: Send the new booking
                    backgroundSync('Book', newBookingEntry);

                // --- CASE 3: REPORT / INCIDENT ---
                } else if (mode === 'Report') {
                    const eqIndex = state.equipment.findIndex(e => e.id === identifier);
                    const eq = state.equipment[eqIndex];

                    let actionType = 'Report';
                    let statusMsg = "Incident Reported.";

                    if (data.issueType === 'breakdown') {
                        // Collect selected process flows from checkboxes
                        const allCb = document.getElementById('all-processes-cb');
                        const individualCbs = [...document.querySelectorAll('.affected-process-cb')];
                        const isWholeEquipment = !allCb || allCb.checked || individualCbs.length === 0;
                        const selectedProcesses = individualCbs.filter(cb => cb.checked).map(cb => cb.value);
                        const allProcessNames = (eq.processCapabilities || []).map(c => c.name);
                        const allSelected = isWholeEquipment || selectedProcesses.length === allProcessNames.length;

                        if (allSelected || selectedProcesses.length === 0) {
                            // Full equipment breakdown
                            state.equipment[eqIndex].status = 'Maintenance';
                            state.equipment[eqIndex].maintenanceReason = data.issue;
                            statusMsg = "Equipment marked for Maintenance.";
                        } else {
                            // Partial: only specific processes are down
                            state.equipment[eqIndex].status = 'Active';
                            state.equipment[eqIndex].maintenanceReason = JSON.stringify({
                                processes: selectedProcesses,
                                reason: data.issue
                            });
                            statusMsg = `Process maintenance flagged: ${selectedProcesses.join(', ')}.`;
                        }
                    } else if (data.issueType === 'misconduct') {
                        // Collect selected process flows (same as breakdown)
                        const allCbM = document.getElementById('all-processes-cb');
                        const individualCbsM = [...document.querySelectorAll('.affected-process-cb')];
                        const selectedProcessesM = (allCbM && allCbM.checked)
                            ? (eq.processCapabilities || []).map(c => c.name)
                            : individualCbsM.filter(cb => cb.checked).map(cb => cb.value);

                        state.equipment[eqIndex].status = 'Attention';
                        actionType = 'Flagged';
                        statusMsg = selectedProcessesM.length > 0
                            ? `Misconduct flagged for: ${selectedProcessesM.join(', ')}.`
                            : "Misconduct Flagged to PIC.";
                        // Store which processes were flagged in the reason field (for PIC awareness)
                        if (selectedProcessesM.length > 0) {
                            state.equipment[eqIndex].maintenanceReason = JSON.stringify({
                                processes: selectedProcessesM,
                                reason: data.issue
                            });
                        }
                    }

                    // Build a human-readable issueDetails for the log
                    const maintInfo = parseMaintenanceInfo(state.equipment[eqIndex]);
                    const logDesc = maintInfo.isPartial
                        ? `[Processes: ${maintInfo.processes.join(', ')}] ${data.issue}`
                        : data.issue;

                    const newIncidentLog = {
                         id: 'log-' + Date.now(),
                         equipmentId: eq.id,
                         equipmentName: eq.name,
                         lab: eq.lab,
                         action: actionType,
                         issueDetails: logDesc,
                         timestamp: new Date().toISOString(),
                         userName: data.reporterName + " (" + data.reporterEmail + ")",
                         duration: '-', samples: '-', materials: '-'
                    };

                    state.logs.unshift(newIncidentLog);
                    showToast(statusMsg, data.issueType === 'breakdown' ? 'error' : 'info');

                    // SYNC: Send log + explicit equipment update (backend applies the correct status)
                    backgroundSync('Report', {
                        log: newIncidentLog,
                        equipmentUpdate: {
                            id: eq.id,
                            status: state.equipment[eqIndex].status,
                            maintenanceReason: state.equipment[eqIndex].maintenanceReason
                        }
                    });

                // --- CASE 4: EDIT EQUIPMENT ---
                } else if (mode === 'EditEquipment') {
                      const eqIndex = state.equipment.findIndex(e => e.id === identifier);

                      // Duplicate asset ID check (exclude self)
                      if (isAssetIdTaken(data.assetId, identifier)) {
                          showToast(`Equipment ID "${data.assetId}" is already assigned to another equipment.`, 'error');
                          return;
                      }

                      const updatedEq = { ...state.equipment[eqIndex], ...data };

                      // Attach complex objects from temp state
                      updatedEq.processCapabilities = [...state.tempProcessConfig];
                      updatedEq.materialsOptions = [...state.tempMaterialConfig];

                      state.equipment[eqIndex] = updatedEq;
                      showToast("Equipment Updated.");
                      
                      // SYNC: Send the full updated equipment object
                      backgroundSync('EditEquipment', updatedEq);

                // --- CASE 5: EDIT LAB NAME ---
                } else if (mode === 'EditLab') {
                    const oldName = state.labs[identifier];
                    const newName = data.newLabName;
                    
                    if (newName && newName !== oldName) {
                        state.labs[identifier] = newName;
                        // Cascade updates locally so UI reflects change immediately
                        state.equipment.forEach(e => { if(e.lab === oldName) e.lab = newName; });
                        state.bookings.forEach(b => { if(b.lab === oldName) b.lab = newName; });
                        state.logs.forEach(l => { if(l.lab === oldName) l.lab = newName; });
                        state.systemConfig.coordinators.forEach(c => { if(c.lab === oldName) c.lab = newName; });
                        
                        showToast(`Lab renamed to ${newName}`);
                        
                        // SYNC: Send rename command
                        backgroundSync('EditLab', { oldName: oldName, newName: newName });
                    }

                // --- CASE 6: EDIT COORDINATOR ---
                } else if (mode === 'EditCoordinator') {
                    const newCoordData = {
                        name: data.coordName,
                        email: data.coordEmail,
                        lab: data.coordLab
                    };
                    state.systemConfig.coordinators[identifier] = newCoordData;
                    showToast("Coordinator Updated");
                    backgroundSync('EditCoordinator', { 
                        index: identifier, 
                        coordinator: newCoordData,
                        allCoordinators: state.systemConfig.coordinators 
                    });
                } else if (mode === 'EditTechStaff') {
                    state.systemConfig.techStaff[identifier] = {
                        name:  data.techName,
                        email: data.techEmail
                    };
                    showToast("Technical Staff Updated");
                    backgroundSync('EditTechStaff', {
                        allTechStaff: state.systemConfig.techStaff
                    });
                }

                setLoading(btn, false);
                closeModal();
                renderApp();
            }, 1000);
        }

        // 4. Updated revokeBooking with Sync
        function revokeBooking(id) {
            if (demoBlockWrite()) return;   // demo: no revoke / override
            showDialog("Revoke decision? This will stop any active sessions and return request to Pending.", 'confirm', () => {
                const idx = state.bookings.findIndex(b => b.id === id);
                if(idx > -1) {
                    const booking = state.bookings[idx];
                    booking.status = 'Pending';
                    booking.remarks = "Decision Revoked - Returned to Pending";
                    booking.timestampActioned = new Date().toISOString();
                    
                    // Cancel active sessions locally
                    const activeLogIdx = state.logs.findIndex(l => 
                        l.equipmentName === booking.equipmentName && 
                        l.userName === booking.userName && 
                        l.action === 'Usage' && 
                        !l.sessionEnded &&
                        (new Date() - new Date(l.timestamp) < 3600000*8)
                    );
                    
                    if (activeLogIdx > -1) {
                        state.logs[activeLogIdx].sessionEnded = true; 
                        state.logs[activeLogIdx].action += ' (Revoked)'; 
                        // Sync the session end to the Logs sheet
                        backgroundSync('Usage', state.logs[activeLogIdx]);
                    }

                    showToast("Booking returned to Pending", "success");
                    renderApp();

                    // SYNC TO BACKEND
                    backgroundSync('UpdateBooking', { id: id, status: 'Pending', remarks: 'Decision Revoked' });
                }
            });
        }
		
		
		function validateBookingForm() {
            const btn = getById('btn-submit-booking');
            if (!btn) return;

            // 1. Check if Process Group exists
            const processGroup = getById('booking-process-group');
            if (!processGroup) {
                btn.disabled = false; // No process config needed
                return;
            }

            // 2. Check Level 1 (Process Radio)
            const radio = document.querySelector('input[name="process"]:checked');
            if (!radio) {
                btn.disabled = true;
                btn.innerText = "Select a Process";
                return;
            }

            // 3. Check Level 2 (Variant)
            const level2Container = getById('booking-level-2-container');
            const level2Select = getById('booking-variant-select');
            
            if (!level2Container.classList.contains('hidden')) {
                if (level2Select.value === "") {
                    btn.disabled = true;
                    btn.innerText = "Select Configuration";
                    return;
                }
            }

            // 4. Check Level 3 (Sub-variant)
            const level3Container = getById('booking-level-3-container');
            const level3Select = getById('booking-sub-select');

            if (!level3Container.classList.contains('hidden')) {
                if (level3Select.value === "") {
                    btn.disabled = true;
                    btn.innerText = "Select Specifics";
                    return;
                }
            }

            // All Valid
            btn.disabled = false;
            btn.innerText = "Send Request";
        }

        // --- GENERIC PROCESS BUILDER LOGIC ---
        // Works for both Registration Form and Edit Modal.
        // Each process card has inline status toggle pills:
        //   Active | Attention | Maintenance | Disabled

        // Maps a process status string → visual config
        function _procStatusCfg(s) {
            const map = {
                active:      { dot:'bg-emerald-500', hBg:'#f0fdf4', border:'#86efac', labelCls:'bg-emerald-100 text-emerald-700 border-emerald-300', label:'Active'       },
                attention:   { dot:'bg-amber-500',   hBg:'#fffbeb', border:'#fcd34d', labelCls:'bg-amber-100  text-amber-700  border-amber-300',   label:'Attention'    },
                maintenance: { dot:'bg-red-500',     hBg:'#fff1f2', border:'#fca5a5', labelCls:'bg-red-100    text-red-600    border-red-300',     label:'Maintenance'  },
                disabled:    { dot:'bg-slate-400',   hBg:'#f8fafc', border:'#cbd5e1', labelCls:'bg-slate-100  text-slate-500  border-slate-300',   label:'Disabled'     },
            };
            return map[s] || map.active;
        }

        // Builds the process list HTML without touching the DOM.
        // Called by renderProcessList() AND embedded directly in modal innerHTML.
        function buildProcessListHtml(targetId) {
            if (state.tempProcessConfig.length === 0) {
                return '<div class="text-slate-400 text-xs italic p-2">No processes added yet.</div>';
            }
            return state.tempProcessConfig.map((p, pIdx) => {
                const pStatus = p.status || 'active';
                const sc = _procStatusCfg(pStatus);

                // 4-way status pill buttons
                const statusBtns = ['active','attention','maintenance','disabled'].map(s => {
                    const c = _procStatusCfg(s);
                    const sel = pStatus === s;
                    return `<button type="button" onclick="setProcessStatus(${pIdx},'${s}','${targetId}')"
                        class="px-2 py-0.5 rounded-full text-[9px] font-bold border transition whitespace-nowrap
                               ${sel ? c.labelCls : 'bg-white text-slate-400 border-slate-200 hover:border-slate-300 hover:text-slate-600'}">
                        ${c.label}
                    </button>`;
                }).join('');

                // Render Variants
                const variantsHtml = p.options.map((opt, vIdx) => {
                    // Handle old string data vs new object data
                    const vName = typeof opt === 'string' ? opt : opt.name;
                    const subs = (typeof opt === 'object' && opt.subs && opt.subs.length > 0)
                        ? opt.subs : [];
                    const subsHtml = subs.length > 0
                        ? `<div class="mt-1 flex flex-wrap gap-1">
                             ${subs.map(s => `<span class="text-[9px] bg-indigo-50 text-indigo-600 px-1.5 py-0.5 rounded border border-indigo-100">${s}</span>`).join('')}
                           </div>`
                        : '';
                    return `
                    <div class="ml-3 pl-3 border-l-2 border-slate-100 py-1 relative group/variant">
                        <div class="text-xs font-medium flex items-center gap-1
                            ${pStatus === 'disabled' ? 'line-through text-slate-400' : 'text-slate-600'}">
                            <i class="ph-bold ph-git-commit text-slate-300 shrink-0"></i> ${vName}
                        </div>
                        ${subsHtml}
                        <button type="button" onclick="removeTempVariant(${pIdx}, ${vIdx}, '${targetId}')"
                            class="hidden group-hover/variant:block absolute top-0 right-0 text-red-400 hover:text-red-600 bg-white px-1 rounded shadow-sm">
                            <i class="ph-bold ph-x"></i>
                        </button>
                    </div>`;
                }).join('');

                return `
                <div class="rounded-xl border-2 mb-2.5 overflow-hidden ${pStatus === 'disabled' ? 'opacity-60' : ''}"
                     style="border-color:${sc.border}">
                    <!-- Process header: name + status pills + delete -->
                    <div class="flex items-center gap-2 px-3 py-2.5 flex-wrap" style="background:${sc.hBg}">
                        <span class="w-2 h-2 rounded-full ${sc.dot} shrink-0"></span>
                        <span class="font-bold text-xs flex-1 min-w-0 truncate
                            ${pStatus === 'disabled' ? 'line-through text-slate-400' : 'text-slate-800'}">${p.name}</span>
                        <div class="flex items-center gap-1 flex-wrap">
                            ${statusBtns}
                            <button type="button" onclick="removeTempProcess(${pIdx}, '${targetId}')"
                                class="ml-1 p-1 rounded-lg text-red-400 hover:text-red-600 hover:bg-red-50 transition" title="Remove process">
                                <i class="ph-bold ph-trash text-xs"></i>
                            </button>
                        </div>
                    </div>
                    <!-- Variants list -->
                    ${variantsHtml ? `<div class="px-3 py-2 bg-white">${variantsHtml}</div>` : ''}
                </div>`;
            }).join('');
        }

        function renderProcessList(targetId) {
            const container = getById(targetId);
            if (!container) return;
            container.innerHTML = buildProcessListHtml(targetId);
        }

        // Called from the status pill onclick — updates state and refreshes the list
        function setProcessStatus(pIdx, newStatus, targetId) {
            if (state.tempProcessConfig[pIdx]) {
                state.tempProcessConfig[pIdx].status = newStatus;
                renderProcessList(targetId);
            }
        }

       function addTempProcess(targetId, nameId, varId, subId) {
            const nameInput = getById(nameId); // Level 1
            const varInput = getById(varId);   // Level 2
            const subInput = getById(subId);   // Level 3
            
            if (!nameInput || !varInput) {
                console.error("Inputs not found:", nameId, varId);
                return;
            }

            const pName = nameInput.value.trim();
            const vName = varInput.value.trim();
            const sText = subInput ? subInput.value.trim() : '';

            // Validation Alert
            if(!pName || !vName) {
                showToast("Missing Info: Process Name and Variant are required.", "error");
                if(!pName) nameInput.focus();
                else varInput.focus();
                return;
            }

            // Create the new option object
            const newOption = {
                name: vName,
                subs: sText ? sText.split(',').map(s => s.trim()).filter(s => s) : []
            };

            // 1. Check if the Process (Level 1) exists
            const existingProcIndex = state.tempProcessConfig.findIndex(p => p.name.toLowerCase() === pName.toLowerCase());

            if (existingProcIndex > -1) {
                // Process Exists -> Look for Variant (Level 2)
                let currentOptions = state.tempProcessConfig[existingProcIndex].options;
                
                // Convert any legacy string options to objects to avoid crashes
                currentOptions = currentOptions.map(o => typeof o === 'string' ? { name: o, subs: [] } : o);

                const existingVarIndex = currentOptions.findIndex(o => o.name.toLowerCase() === vName.toLowerCase());

                if (existingVarIndex > -1) {
                    // Variant Exists -> MERGE Subs
                    const existingSubs = currentOptions[existingVarIndex].subs || [];
                    const combinedSubs = [...new Set([...existingSubs, ...newOption.subs])];
                    currentOptions[existingVarIndex].subs = combinedSubs;
                    showToast(`Updated "${vName}" with new sub-options.`);
                } else {
                    // Variant New -> ADD it
                    currentOptions.push(newOption);
                    showToast(`Added variant "${vName}" to ${pName}.`);
                }
                
                state.tempProcessConfig[existingProcIndex].options = currentOptions;

            } else {
                // Process New -> Create completely new entry
                state.tempProcessConfig.push({
                    name: pName,
                    options: [newOption]
                });
                showToast("Created new process tree.");
            }

            // Clear inputs intelligently
            // We KEEP Process Name populated so you can quickly add Variant 2, Variant 3, etc.
            varInput.value = '';
            if(subInput) subInput.value = '';
            varInput.focus();
            
            renderProcessList(targetId);
        }

        // --- PROCESS MAINTENANCE HELPERS ---
        // Parses maintenanceReason: if it's JSON with a `processes` array, it's process-specific.
        function parseMaintenanceInfo(eq) {
            if (!eq || !eq.maintenanceReason) return { isPartial: false, processes: [], reason: '' };
            try {
                const parsed = JSON.parse(eq.maintenanceReason);
                if (parsed && Array.isArray(parsed.processes)) {
                    return { isPartial: true, processes: parsed.processes, reason: parsed.reason || '' };
                }
            } catch(e) {}
            return { isPartial: false, processes: [], reason: eq.maintenanceReason };
        }

        // Returns the per-process status string ('active'|'attention'|'maintenance'|'disabled')
        // Checks the new cap.status field first, then falls back to old maintenanceReason JSON.
        function getProcessStatus(eq, processName) {
            if (eq.status === 'Maintenance') return 'maintenance'; // whole equipment down
            if (eq.status === 'Attention')   return 'attention';   // whole equipment attention
            if (Array.isArray(eq.processCapabilities)) {
                const cap = eq.processCapabilities.find(c => c.name === processName);
                if (cap && cap.status && cap.status !== 'active') return cap.status;
            }
            // Backward compat: old maintenanceReason JSON
            const info = parseMaintenanceInfo(eq);
            if (info.isPartial && info.processes.includes(processName)) return 'maintenance';
            return 'active';
        }

        function isProcessUnderMaintenance(eq, processName) {
            return getProcessStatus(eq, processName) === 'maintenance';
        }

        function isProcessDisabled(eq, processName) {
            return getProcessStatus(eq, processName) === 'disabled';
        }

        function isProcessAttention(eq, processName) {
            return getProcessStatus(eq, processName) === 'attention';
        }

        // Returns the list of processes on an equipment that are still available
        function getAvailableProcesses(eq) {
            if (!eq.processCapabilities || eq.processCapabilities.length === 0) return [];
            if (eq.status === 'Maintenance') return [];
            const info = parseMaintenanceInfo(eq);
            if (!info.isPartial) return eq.processCapabilities.map(c => c.name);
            return eq.processCapabilities.map(c => c.name).filter(n => !info.processes.includes(n));
        }

        // Returns true if ALL processes are under maintenance (i.e. equipment is effectively down)
        function isFullyDown(eq) {
            if (eq.status === 'Maintenance') return true;
            const info = parseMaintenanceInfo(eq);
            if (!info.isPartial) return false;
            if (!eq.processCapabilities || eq.processCapabilities.length === 0) return false;
            return eq.processCapabilities.every(c => info.processes.includes(c.name));
        }

        // Returns the slot time window [startHour, endHour] for a given duration string
        function getSlotHours(duration) {
            if (duration === '8am-1pm')  return [8, 13];
            if (duration === '2pm-5pm')  return [14, 17];
            if (duration === '1pm-5pm')  return [13, 17];
            if (duration === '1 Day')    return [8, 17];
            if (duration === '2 Days')   return [8, 17]; // spans two days; day logic handled separately
            return [8, 17]; // fallback
        }

        // Returns the single most-relevant booking for today for a given equipment,
        // picking the slot whose time window contains NOW; falls back to earliest upcoming.
        function getActiveBookingForToday(eqName, eqLab) {
            const now = new Date();
            const today = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
            const nowH = now.getHours() + now.getMinutes() / 60;

            const todayBookings = state.bookings.filter(b =>
                b.equipmentName === eqName &&
                b.lab === eqLab &&
                b.status === 'Approved' &&
                b.date.startsWith(today)
            );

            if (todayBookings.length === 0) return null;
            if (todayBookings.length === 1) return todayBookings[0];

            // Multiple slots today — prefer the one whose window contains NOW
            const active = todayBookings.find(b => {
                const [s, e] = getSlotHours(b.duration);
                return nowH >= s && nowH < e;
            });
            if (active) return active;

            // No active slot right now — return the earliest upcoming slot
            const upcoming = todayBookings.filter(b => {
                const [s] = getSlotHours(b.duration);
                return nowH < s;
            }).sort((a, b) => getSlotHours(a.duration)[0] - getSlotHours(b.duration)[0]);
            return upcoming[0] || todayBookings[0];
        }

        function isAssetIdTaken(assetId, excludeEqId) {
            const val = String(assetId || '').trim();
            if (!val || val === '-') return false;
            const norm = val.toLowerCase();
            return state.equipment.some(e => {
                if (excludeEqId && e.id === excludeEqId) return false;
                const existing = String(e.assetId || '').trim().toLowerCase();
                return existing && existing !== '-' && existing === norm;
